<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Catalog - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        .lcc-lookup-results { max-height: 350px; overflow-y: auto; }
        .lcc-result-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px;
            border-bottom: 1px solid var(--light-gray); cursor: pointer; transition: background 0.15s; }
        body.dark-mode .lcc-result-row { border-bottom-color: #2a2a40; }
        .lcc-result-row:hover { background: rgba(15,52,96,0.04); }
        body.dark-mode .lcc-result-row:hover { background: #252540; }
        .lcc-result-row:last-child { border-bottom: none; }
        .lcc-result-title { font-size: 13px; font-weight: 600; color: var(--primary-navy); max-width: 280px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        body.dark-mode .lcc-result-title { color: #e0e4ec; }
        .lcc-result-call { background: rgba(15,52,96,0.08); color: var(--primary-blue); padding: 3px 10px;
            border-radius: 6px; font-size: 11px; font-weight: 700; font-family: 'Consolas', monospace; white-space: nowrap; }
        body.dark-mode .lcc-result-call { background: rgba(100,181,246,0.15); color: #64b5f6; }
        .spinner-sm { width: 24px; height: 24px; border: 3px solid var(--light-gray); border-top-color: var(--primary-red);
            border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; display: block; }
        body.dark-mode .spinner-sm { border-color: #2a2a40; border-top-color: var(--primary-red); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .call-number-row { display: flex; gap: 8px; align-items: flex-end; }
        .call-number-row .form-group { flex: 1; margin-bottom: 0; }
        .btn-lcc { padding: 8px 14px; font-size: 12px; white-space: nowrap; }
    </style>
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="page-header">
            <h1><i class="fas fa-book me-2"></i>Book Catalog</h1>
            <button class="btn btn-primary" id="btn-add" style="display:none"><i class="fas fa-plus me-1"></i> Add Book</button>
        </div>
        <div class="filter-bar">
            <div class="search-input-wrap"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="Search books..."></div>
            <select class="form-select" id="filter-cat" style="max-width:180px"><option value="">All Categories</option></select>
        </div>
        <div class="card"><div class="card-body p-0"><div class="table-responsive">
            <table class="table">
                <thead><tr><th>#</th><th>Title</th><th>Author</th><th>Publisher</th><th>Category</th><th>ISBN</th><th>Call #</th><th>Year</th><th>Copies</th><th>Available</th><th>Actions</th></tr></thead>
                <tbody id="data-table"></tbody>
            </table>
        </div></div></div>
    </main>
    <div class="modal-overlay" id="modal-form">
        <div class="modal-box">
            <div class="modal-header"><h3 id="modal-title">Add Book</h3><button class="modal-close">&times;</button></div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-group"><label>Title</label><input class="form-control" id="f-title"></div>
                <div class="form-group"><label>ISBN</label><input class="form-control" id="f-isbn"></div>
                <div class="form-group"><label>Author</label><select class="form-select" id="f-author"></select></div>
                <div class="form-group"><label>Publisher</label><select class="form-select" id="f-publisher"></select></div>
                <div class="form-group"><label>Category</label><select class="form-select" id="f-category"></select></div>
                <div class="row"><div class="col-md-4"><div class="form-group"><label>Year</label><input class="form-control" id="f-year" type="number"></div></div>
                <div class="col-md-4"><div class="form-group"><label>Copies</label><input class="form-control" id="f-copies" type="number" min="0"></div></div>
                <div class="col-md-4"><div class="form-group"><label>Available</label><input class="form-control" id="f-available" type="number" min="0"></div></div></div>
                <div class="call-number-row">
                    <div class="form-group"><label>LCC Call Number</label><input class="form-control" id="f-callnumber" placeholder="e.g. QA76.76.D47"></div>
                    <button type="button" class="btn btn-outline-primary btn-lcc" id="btn-lcc-lookup"><i class="fas fa-search me-1"></i>Assign LCC</button>
                </div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary modal-close">Cancel</button><button class="btn btn-success" id="btn-save"><i class="fas fa-save me-1"></i> Save</button></div>
        </div>
    </div>
    <!-- LCC Lookup Modal -->
    <div class="modal-overlay" id="modal-lcc">
        <div class="modal-box" style="max-width:520px">
            <div class="modal-header"><h3>Assign LCC Call Number</h3><button class="modal-close">&times;</button></div>
            <div class="modal-body">
                <div class="form-group"><label>Search LOC by title or keyword</label>
                    <div style="display:flex;gap:8px"><input class="form-control" id="lcc-search-input" placeholder="Enter book title..."><button class="btn btn-primary btn-sm" id="btn-lcc-search"><i class="fas fa-search"></i></button></div>
                </div>
                <div id="lcc-loading" style="display:none"><div class="spinner-sm"></div></div>
                <div class="lcc-lookup-results" id="lcc-results"></div>
                <div id="lcc-empty" class="text-center text-muted small py-3" style="display:none">No results. Try a different search term.</div>
            </div>
        </div>
    </div>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init(); App.bindModalCloses();
        if (Auth.hasPermission('can_add_books')) document.getElementById('btn-add').style.display='';
        var authors = Store.getAll('authors'), publishers = Store.getAll('publishers'), categories = Store.getAll('categories');
        var asel=document.getElementById('f-author'), psel=document.getElementById('f-publisher'), csel=document.getElementById('f-category'), fcat=document.getElementById('filter-cat');
        authors.forEach(function(a){asel.innerHTML+='<option value="'+a.id+'">'+a.name+'</option>';});
        publishers.forEach(function(p){psel.innerHTML+='<option value="'+p.id+'">'+p.name+'</option>';});
        categories.forEach(function(c){csel.innerHTML+='<option value="'+c.id+'">'+c.name+'</option>'; fcat.innerHTML+='<option value="'+c.id+'">'+c.name+'</option>';});
        function load() {
            var items = Store.getAll('books'), s = document.getElementById('search-input').value.toLowerCase(), cf = document.getElementById('filter-cat').value;
            if (s) items = items.filter(function(i) { return i.title.toLowerCase().indexOf(s)!==-1 || i.isbn.toLowerCase().indexOf(s)!==-1; });
            if (cf) items = items.filter(function(i) { return i.category_id === cf; });
            var tbody = document.getElementById('data-table');
            if (!items.length) { tbody.innerHTML='<tr><td colspan="11" class="text-center text-muted py-4">No books found.</td></tr>'; return; }
            var canEdit = Auth.hasPermission('can_edit_books'), canDel = Auth.hasPermission('can_delete_books');
            tbody.innerHTML = items.map(function(b,i) {
                var acts = '';
                if (canEdit) acts += '<button class="btn btn-sm btn-outline-primary btn-edit" data-id="'+b.id+'"><i class="fas fa-edit"></i></button> ';
                if (canDel) acts += '<button class="btn btn-sm btn-danger btn-del" data-id="'+b.id+'" data-name="'+b.title+'"><i class="fas fa-trash"></i></button>';
                if (!acts) acts = '<span class="text-muted small">View only</span>';
                var cn = b.call_number || '';
                return '<tr><td>'+(i+1)+'</td><td class="fw-semibold">'+b.title+'</td><td>'+App.getAuthorName(b.author_id)+'</td><td>'+App.getPublisherName(b.publisher_id)+'</td><td><span class="badge bg-info">'+App.getCategoryName(b.category_id)+'</span></td><td><code>'+b.isbn+'</code></td><td>'+(cn?'<code style="font-size:11px">'+cn+'</code>':'<span class="text-muted small">—</span>')+'</td><td>'+b.year+'</td><td>'+b.copies+'</td><td><span class="badge '+(b.available>0?'bg-success':'bg-danger')+'">'+b.available+'</span></td><td>'+acts+'</td></tr>';
            }).join('');
            bindActions();
        }
        function bindActions() {
            document.querySelectorAll('.btn-edit').forEach(function(btn){btn.addEventListener('click',function(){
                var b=Store.getById('books',this.dataset.id); if(!b) return;
                document.getElementById('modal-title').textContent='Edit Book'; document.getElementById('edit-id').value=b.id;
                document.getElementById('f-title').value=b.title; document.getElementById('f-isbn').value=b.isbn;
                document.getElementById('f-author').value=b.author_id; document.getElementById('f-publisher').value=b.publisher_id;
                document.getElementById('f-category').value=b.category_id; document.getElementById('f-year').value=b.year;
                document.getElementById('f-copies').value=b.copies; document.getElementById('f-available').value=b.available;
                document.getElementById('f-callnumber').value=b.call_number||'';
                App.openModal('modal-form');
            });});
            document.querySelectorAll('.btn-del').forEach(function(btn){btn.addEventListener('click',function(){
                var id=this.dataset.id,name=this.dataset.name;
                App.confirmDelete(name).then(function(r){if(r.isConfirmed){Store.remove('books',id);App.showAlert('success','Book deleted.');load();}});
            });});
        }
        document.getElementById('btn-add').addEventListener('click',function(){
            document.getElementById('modal-title').textContent='Add Book'; document.getElementById('edit-id').value='';
            ['f-title','f-isbn','f-year','f-copies','f-available','f-callnumber'].forEach(function(id){document.getElementById(id).value='';});
            App.openModal('modal-form');
        });
        document.getElementById('btn-save').addEventListener('click',function(){
            var title=document.getElementById('f-title').value.trim(), isbn=document.getElementById('f-isbn').value.trim(),
                authorId=document.getElementById('f-author').value, pubId=document.getElementById('f-publisher').value,
                catId=document.getElementById('f-category').value, year=parseInt(document.getElementById('f-year').value)||0,
                copies=parseInt(document.getElementById('f-copies').value)||0, avail=parseInt(document.getElementById('f-available').value)||0,
                callNum=document.getElementById('f-callnumber').value.trim();
            if(!title||!isbn){App.showAlert('danger','Title and ISBN required.');return;}
            var data={title:title,isbn:isbn,author_id:authorId,publisher_id:pubId,category_id:catId,call_number:callNum,year:year,copies:copies,available:avail,status:'active'};
            var eid=document.getElementById('edit-id').value;
            if(eid){Store.update('books',eid,data);App.showAlert('success','Book updated.');}
            else{Store.create('books',data);App.showAlert('success','Book added.');}
            App.closeModal('modal-form'); load();
        });
        document.getElementById('search-input').addEventListener('input',load);
        document.getElementById('filter-cat').addEventListener('change',load);

        // LCC Lookup Modal
        document.getElementById('btn-lcc-lookup').addEventListener('click', function() {
            var title = document.getElementById('f-title').value.trim();
            document.getElementById('lcc-search-input').value = title;
            document.getElementById('lcc-results').innerHTML = '';
            document.getElementById('lcc-empty').style.display = 'none';
            App.openModal('modal-lcc');
            if (title) lccSearch(title);
        });
        document.getElementById('btn-lcc-search').addEventListener('click', function() {
            lccSearch(document.getElementById('lcc-search-input').value.trim());
        });
        document.getElementById('lcc-search-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') lccSearch(this.value.trim());
        });

        function lccSearch(query) {
            if (!query) return;
            var loading = document.getElementById('lcc-loading');
            var results = document.getElementById('lcc-results');
            var empty = document.getElementById('lcc-empty');
            loading.style.display = ''; results.innerHTML = ''; empty.style.display = 'none';

            axios.get('https://www.loc.gov/books/', { params: { q: query, fo: 'json', c: 10, sp: 1 } })
            .then(function(resp) {
                loading.style.display = 'none';
                var items = resp.data.results || [];
                var withCall = items.filter(function(r) { return r.item && r.item.call_number && r.item.call_number.length > 0; });
                if (!withCall.length) { empty.style.display = ''; return; }
                results.innerHTML = withCall.map(function(r) {
                    var t = (r.item && r.item.title) || r.title || 'Untitled';
                    var cn = r.item.call_number[0];
                    return '<div class="lcc-result-row" data-call="' + cn.replace(/"/g,'&quot;') + '">' +
                        '<span class="lcc-result-title" title="' + t.replace(/"/g,'&quot;') + '">' + t + '</span>' +
                        '<span class="lcc-result-call">' + cn + '</span></div>';
                }).join('');
                results.querySelectorAll('.lcc-result-row').forEach(function(row) {
                    row.addEventListener('click', function() {
                        document.getElementById('f-callnumber').value = this.dataset.call;
                        App.closeModal('modal-lcc');
                        Swal.fire({ icon: 'success', title: 'Call Number Applied', text: this.dataset.call, timer: 1500, showConfirmButton: false, toast: true, position: 'top-end' });
                    });
                });
            }).catch(function() {
                loading.style.display = 'none';
                empty.style.display = ''; empty.textContent = 'Error connecting to LOC API.';
            });
        }

        load();
    </script>
</body>
</html>
