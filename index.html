<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEATI-LMS | AklatBayon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { DEFAULT: '#3211d4', 700: '#3211d4', 800: '#2e14a8' },
                        accent: '#e94560',
                    }
                }
            }
        }
    </script>
    <style>
        /* Time-based background gradients */
        body.time-night     { background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f3460 100%); }
        body.time-dawn      { background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 30%, #e07040 70%, #f4a460 100%); }
        body.time-morning   { background: linear-gradient(135deg, #1565c0 0%, #42a5f5 50%, #90caf9 100%); }
        body.time-afternoon { background: linear-gradient(135deg, #0d47a1 0%, #1976d2 50%, #64b5f6 100%); }
        body.time-dusk      { background: linear-gradient(135deg, #1a1a2e 0%, #4a1942 30%, #c0392b 70%, #e67e22 100%); }

        /* Morning mode - dark text overrides */
        body.time-morning .text-hero { color: #0d2137; text-shadow: 0 0 30px rgba(13,33,55,0.2); }
        body.time-morning .text-sub  { color: rgba(13,33,55,0.6); }
        body.time-morning .text-dim  { color: rgba(13,33,55,0.5); }
        body.time-morning .ring-scan { border-color: rgba(13,33,55,0.3); }
        body.time-morning .line-scan { background: linear-gradient(90deg, transparent, rgba(13,33,55,0.6), transparent); box-shadow: 0 0 15px rgba(13,33,55,0.3); }
        body.time-morning .particle  { background: rgba(255,255,255,0.25); }
        body.time-afternoon .particle { background: rgba(255,255,255,0.25); }

        /* Scan ring pulse */
        @keyframes scan-pulse { 0% { width: 200px; height: 200px; opacity: 0.8; } 100% { width: 320px; height: 320px; opacity: 0; } }
        .ring-scan { animation: scan-pulse 2.5s ease-out infinite; }
        .ring-scan:nth-child(2) { animation-delay: 0.5s; }
        .ring-scan:nth-child(3) { animation-delay: 1s; }

        /* Scan line sweep */
        @keyframes scan-sweep { 0% { top: 15px; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 200px; opacity: 0; } }
        .line-scan { animation: scan-sweep 2.5s ease-in-out infinite; }

        /* Glow pulse */
        @keyframes glow-pulse { 0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%,-50%) scale(1.2); opacity: 1; } }

        /* Floating particles */
        @keyframes float-up { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
        .particle { position: absolute; border-radius: 50%; background: rgba(224,230,240,0.2); animation: float-up linear infinite; }

        /* Status dot pulse */
        @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Welcome toast animations */
        @keyframes slide-up { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        @keyframes fade-out { to { opacity: 0; pointer-events: none; } }
        .toast-anim { animation: slide-up 0.5s ease-out, fade-out 0.5s ease-in 4.5s forwards; }

        /* Fade in */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Faculty sub toggle */
        .faculty-sub { display: none; }
        .faculty-sub.visible { display: block; }
    </style>
</head>
<body class="time-night font-sans min-h-screen flex flex-col overflow-hidden text-white transition-[background] duration-1000">
    <!-- Particles -->
    <div id="particles" class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>

    <!-- Status Bar -->
    <div class="flex justify-between items-center px-8 py-4 absolute top-0 left-0 right-0 z-10">
        <div class="flex items-center gap-2 text-xs font-semibold uppercase tracking-[1.5px] text-white/70">
            <div class="w-2 h-2 rounded-full bg-emerald-500" style="animation: pulse-dot 2s ease-in-out infinite"></div>
            SYSTEM ONLINE
        </div>
        <div class="text-right">
            <div id="clock" class="text-2xl font-bold tracking-wide text-white/90">12:00:00 PM</div>
            <div class="text-[11px] text-white/50 tracking-wide text-dim">FEATI-LMS STATION 01</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col items-center justify-center px-5 z-[1]">
        <!-- Logo Container -->
        <div class="relative w-[220px] h-[220px] mb-8">
            <div class="ring-scan absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[200px] h-[200px] rounded-full border-2 border-white/30"></div>
            <div class="ring-scan absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[200px] h-[200px] rounded-full border-2 border-white/30"></div>
            <div class="ring-scan absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[200px] h-[200px] rounded-full border-2 border-white/30"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[180px] h-[180px] rounded-full z-[1]" style="background: radial-gradient(circle, rgba(224,230,240,0.1) 0%, transparent 70%); animation: glow-pulse 3s ease-in-out infinite"></div>
            <div class="line-scan absolute left-1/2 -translate-x-1/2 w-[180px] h-[3px] rounded z-[4] bg-gradient-to-r from-transparent via-white/70 to-transparent shadow-[0_0_15px_rgba(224,230,240,0.3)]"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[3] flex items-center justify-center">
                <img src="images/logo.png" alt="AklatBayon" class="w-[140px] h-[140px] object-contain drop-shadow-[0_0_20px_rgba(224,230,240,0.3)]">
            </div>
        </div>

        <!-- Tap Section -->
        <div id="tap-section">
            <h1 class="text-5xl font-black uppercase tracking-[3px] text-center mb-0 text-hero text-[#e0e6f0]" style="text-shadow: 0 0 30px rgba(224,230,240,0.2)">TAP RFID</h1>
            <h2 class="text-[42px] font-black uppercase tracking-[3px] text-center text-hero text-[#e0e6f0] mb-4" style="text-shadow: 0 0 30px rgba(224,230,240,0.2)">TO ENTER</h2>
            <div class="flex items-center gap-2.5 text-base text-white/60 mb-6 tracking-wide justify-center text-sub">
                <span class="material-symbols-outlined">auto_stories</span> Welcome to FEATI University Library
            </div>
            <div class="relative mb-6 flex justify-center">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-lg text-white/50 z-10">badge</span>
                <input type="text" id="rfid-input" placeholder="Scan or type RFID" autofocus
                    class="w-[340px] py-3.5 px-5 pl-12 text-lg font-semibold tracking-[2px] border-2 border-white/30 rounded-xl bg-white/10 text-white text-center transition-all backdrop-blur-lg placeholder:text-white/40 placeholder:tracking-wide placeholder:font-normal focus:outline-none focus:border-white/70 focus:bg-white/15 focus:shadow-[0_0_30px_rgba(255,255,255,0.1)]">
            </div>
            <div class="flex gap-8 mt-3 justify-center">
                <a href="/pages/auth/login.html" class="flex items-center gap-1.5 text-white/50 text-[13px] font-semibold uppercase tracking-wide hover:text-white transition-colors">
                    <span class="material-symbols-outlined text-base">login</span> Manual Login
                </a>
                <a href="/pages/management/catalog/catalog.html" class="flex items-center gap-1.5 text-white/50 text-[13px] font-semibold uppercase tracking-wide hover:text-white transition-colors">
                    <span class="material-symbols-outlined text-base">search</span> Browse Catalog
                </a>
            </div>
        </div>

        <!-- Register Section -->
        <div id="register-section" style="display:none">
            <div class="bg-white/[.08] border border-white/20 rounded-2xl p-7 w-[380px] backdrop-blur-xl" style="animation: fadeIn 0.3s ease">
                <h4 class="text-lg font-bold mb-4 text-center flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">person_add</span>New User Registration
                </h4>
                <div class="mb-3">
                    <label class="block text-xs font-semibold mb-1 text-white/70 uppercase tracking-wide">Full Name</label>
                    <input type="text" id="reg-name" placeholder="e.g. Juan Dela Cruz"
                        class="w-full py-2.5 px-3.5 border border-white/25 rounded-lg bg-white/[.08] text-white text-sm font-sans focus:outline-none focus:border-white/50">
                </div>
                <div class="mb-3">
                    <label class="block text-xs font-semibold mb-1 text-white/70 uppercase tracking-wide">Email</label>
                    <input type="email" id="reg-email" placeholder="email@aklatbayon.edu"
                        class="w-full py-2.5 px-3.5 border border-white/25 rounded-lg bg-white/[.08] text-white text-sm font-sans focus:outline-none focus:border-white/50">
                </div>
                <div class="mb-3">
                    <label class="block text-xs font-semibold mb-1 text-white/70 uppercase tracking-wide">Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username"
                        class="w-full py-2.5 px-3.5 border border-white/25 rounded-lg bg-white/[.08] text-white text-sm font-sans focus:outline-none focus:border-white/50">
                </div>
                <div class="mb-3">
                    <label class="block text-xs font-semibold mb-1 text-white/70 uppercase tracking-wide">Password</label>
                    <input type="password" id="reg-password" placeholder="Choose a password"
                        class="w-full py-2.5 px-3.5 border border-white/25 rounded-lg bg-white/[.08] text-white text-sm font-sans focus:outline-none focus:border-white/50">
                </div>
                <div class="mb-3">
                    <label class="block text-xs font-semibold mb-1 text-white/70 uppercase tracking-wide">Role</label>
                    <select id="reg-role" class="w-full py-2.5 px-3.5 border border-white/25 rounded-lg bg-white/[.08] text-white text-sm font-sans focus:outline-none focus:border-white/50 [&>option]:text-gray-800 [&>option]:bg-white">
                        <option value="">Select Role</option>
                        <option value="r5">Student</option>
                        <option value="r4">Faculty</option>
                        <option value="r6">Student Assistant</option>
                        <option value="r7">Guest</option>
                    </select>
                </div>
                <div class="faculty-sub mb-3" id="faculty-sub-group">
                    <label class="block text-xs font-semibold mb-1 text-white/70 uppercase tracking-wide">Faculty Subtype</label>
                    <select id="reg-faculty-sub" class="w-full py-2.5 px-3.5 border border-white/25 rounded-lg bg-white/[.08] text-white text-sm font-sans focus:outline-none focus:border-white/50 [&>option]:text-gray-800 [&>option]:bg-white">
                        <option value="Teaching">Teaching</option>
                        <option value="Non-Teaching">Non-Teaching</option>
                        <option value="Department Chair">Department Chair</option>
                        <option value="Department Head">Department Head</option>
                    </select>
                </div>
                <div id="reg-rfid-display" class="text-center text-xs text-white/50 mb-2"></div>
                <button id="btn-register" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 border-none rounded-lg text-white text-[15px] font-bold cursor-pointer mt-2 transition-colors flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-base">check_circle</span> Register & Enter
                </button>
                <button id="btn-reg-cancel" class="w-full py-2.5 bg-transparent border border-white/30 rounded-lg text-white/70 text-[13px] cursor-pointer mt-2 hover:border-white hover:text-white transition-all">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Time Indicator -->
    <div class="absolute bottom-5 right-8 z-10 text-xs text-white/40 tracking-wide flex items-center gap-1.5 text-dim">
        <span class="material-symbols-outlined text-sm" id="time-icon">dark_mode</span>
        <span id="time-label">Night</span>
    </div>

    <!-- Welcome Toast -->
    <div class="toast-anim fixed bottom-3 left-1/2 -translate-x-1/2 max-w-[460px] w-[90%] bg-[rgba(15,52,96,0.95)] border border-emerald-500/50 rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.4)] py-4 px-5 flex items-center gap-3.5 z-[100]">
        <div class="w-9 h-9 rounded-full bg-emerald-500/20 flex items-center justify-center shrink-0">
            <span class="material-symbols-outlined text-emerald-500 text-lg">check_circle</span>
        </div>
        <div class="flex-1">
            <div class="text-[11px] font-bold text-emerald-500 tracking-[1.5px] uppercase mb-0.5">SYSTEM READY</div>
            <div class="text-[15px] font-bold text-white">Welcome to FEATI-LMS</div>
            <div class="text-xs text-white/50">System <span class="text-emerald-500 font-bold">ONLINE</span></div>
        </div>
        <div class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center shrink-0">
            <img src="images/logo.png" alt="" class="w-8 h-8 object-contain">
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        var scannedRfid = '';

        function updateClock() {
            var now = new Date();
            var h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0'), s = String(now.getSeconds()).padStart(2,'0');
            var ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('clock').textContent = h + ':' + m + ':' + s + ' ' + ampm;
        }
        updateClock();
        setInterval(updateClock, 1000);

        function updateBackground() {
            var hour = new Date().getHours();
            var body = document.body, icon = document.getElementById('time-icon'), label = document.getElementById('time-label');
            body.classList.remove('time-night','time-dawn','time-morning','time-afternoon','time-dusk');
            if (hour >= 5 && hour < 7) { body.classList.add('time-dawn'); icon.textContent='partly_cloudy_day'; label.textContent='Dawn'; }
            else if (hour >= 7 && hour < 12) { body.classList.add('time-morning'); icon.textContent='light_mode'; label.textContent='Morning'; }
            else if (hour >= 12 && hour < 17) { body.classList.add('time-afternoon'); icon.textContent='light_mode'; label.textContent='Afternoon'; }
            else if (hour >= 17 && hour < 19) { body.classList.add('time-dusk'); icon.textContent='partly_cloudy_day'; label.textContent='Dusk'; }
            else { body.classList.add('time-night'); icon.textContent='dark_mode'; label.textContent='Night'; }
        }
        updateBackground();
        setInterval(updateBackground, 60000);

        (function() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 30; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random()*100 + '%';
                p.style.animationDuration = (8+Math.random()*12) + 's';
                p.style.animationDelay = Math.random()*10 + 's';
                p.style.width = p.style.height = (1+Math.random()*3) + 'px';
                container.appendChild(p);
            }
        })();

        document.getElementById('rfid-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var rfid = this.value.trim();
                if (!rfid) return;
                var result = Auth.loginByRfid(rfid);
                if (result.success) {
                    Store.create('attendance', {
                        user_id: result.user.id,
                        user_name: result.user.name,
                        role_name: result.user.role_name,
                        rfid_id: result.user.rfid_id,
                        tap_time: new Date().toISOString()
                    });
                    window.location.href = '/pages/auth/welcome.html';
                } else {
                    scannedRfid = rfid;
                    document.getElementById('tap-section').style.display = 'none';
                    document.getElementById('register-section').style.display = 'block';
                    document.getElementById('reg-rfid-display').textContent = 'RFID: ' + rfid;
                }
            }
        });

        document.getElementById('reg-role').addEventListener('change', function() {
            var group = document.getElementById('faculty-sub-group');
            if (this.value === 'r4') { group.classList.add('visible'); }
            else { group.classList.remove('visible'); }
        });

        document.getElementById('btn-register').addEventListener('click', function() {
            var name = document.getElementById('reg-name').value.trim();
            var email = document.getElementById('reg-email').value.trim();
            var username = document.getElementById('reg-username').value.trim();
            var password = document.getElementById('reg-password').value.trim();
            var roleId = document.getElementById('reg-role').value;
            if (!name || !email || !username || !password || !roleId) { alert('Please fill in all fields.'); return; }
            var facultySub = null;
            if (roleId === 'r4') { facultySub = document.getElementById('reg-faculty-sub').value; }
            Store.create('users', {
                name: name, username: username, password: password, email: email,
                role_id: roleId, faculty_subtype: facultySub,
                rfid_id: scannedRfid, status: 'active'
            });
            var loginResult = Auth.loginByRfid(scannedRfid);
            var regUser = loginResult.success ? loginResult.user : Auth.login(username, password).user;
            if (regUser) {
                Store.create('attendance', {
                    user_id: regUser.id,
                    user_name: regUser.name,
                    role_name: regUser.role_name,
                    rfid_id: regUser.rfid_id,
                    tap_time: new Date().toISOString()
                });
            }
            window.location.href = '/pages/auth/welcome.html';
        });

        document.getElementById('btn-reg-cancel').addEventListener('click', function() {
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('tap-section').style.display = 'block';
            document.getElementById('rfid-input').value = '';
            document.getElementById('rfid-input').focus();
        });
    </script>
</body>
</html>
