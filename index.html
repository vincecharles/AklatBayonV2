<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEATI-LMS | AklatBayon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #fff;
            transition: background 1s ease;
        }
        body.time-night { background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f3460 100%); }
        body.time-dawn { background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 30%, #e07040 70%, #f4a460 100%); }
        body.time-morning { background: linear-gradient(135deg, #1565c0 0%, #42a5f5 50%, #90caf9 100%); }
        body.time-afternoon { background: linear-gradient(135deg, #0d47a1 0%, #1976d2 50%, #64b5f6 100%); }
        body.time-dusk { background: linear-gradient(135deg, #1a1a2e 0%, #4a1942 30%, #c0392b 70%, #e67e22 100%); }
        body.time-morning .main-title, body.time-morning .sub-title { color: #0d2137; text-shadow: 0 0 30px rgba(13,33,55,0.2); }
        body.time-morning .system-status { color: rgba(13,33,55,0.7); }
        body.time-morning .status-dot { background-color: #1b5e20; }
        body.time-morning .clock { color: #0d2137; }
        body.time-morning .station-label { color: rgba(13,33,55,0.5); }
        body.time-morning .instruction-text { color: rgba(13,33,55,0.6); }
        body.time-morning .time-indicator { color: rgba(13,33,55,0.5); }
        body.time-morning .scan-ring { border-color: rgba(13,33,55,0.3); }
        body.time-morning .scan-line { background: linear-gradient(90deg, transparent, rgba(13,33,55,0.6), transparent); box-shadow: 0 0 15px rgba(13,33,55,0.3); }
        body.time-morning .logo-glow { background: radial-gradient(circle, rgba(13,33,55,0.1) 0%, transparent 70%); }
        body.time-morning .particle { background: rgba(255,255,255,0.25); }
        body.time-afternoon .particle { background: rgba(255,255,255,0.25); }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; position: absolute; top: 0; left: 0; right: 0; z-index: 10; }
        .system-status { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.7); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #28a745; animation: pulse-dot 2s ease-in-out infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .clock { font-size: 24px; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,0.9); }
        .station-label { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-align: right; }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 1; }
        .logo-container { position: relative; width: 220px; height: 220px; margin-bottom: 30px; }
        .logo-container .logo-icon { width: 180px; height: 180px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3; display: flex; align-items: center; justify-content: center; }
        .logo-container .logo-icon img { width: 140px; height: 140px; object-fit: contain; filter: drop-shadow(0 0 20px rgba(224,230,240,0.3)); }
        .scan-ring { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; border-radius: 50%; border: 2px solid rgba(224,230,240,0.3); animation: scan-pulse 2.5s ease-out infinite; }
        .scan-ring:nth-child(2) { animation-delay: 0.5s; }
        .scan-ring:nth-child(3) { animation-delay: 1s; }
        @keyframes scan-pulse { 0% { width: 200px; height: 200px; opacity: 0.8; } 100% { width: 320px; height: 320px; opacity: 0; } }
        .scan-line { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 180px; height: 3px; background: linear-gradient(90deg, transparent, rgba(224,230,240,0.7), transparent); border-radius: 2px; animation: scan-sweep 2.5s ease-in-out infinite; z-index: 4; box-shadow: 0 0 15px rgba(224,230,240,0.3); }
        @keyframes scan-sweep { 0% { top: 15px; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 200px; opacity: 0; } }
        .logo-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(224,230,240,0.1) 0%, transparent 70%); z-index: 1; animation: glow-pulse 3s ease-in-out infinite; }
        @keyframes glow-pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } }
        .main-title { font-size: 48px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; text-align: center; margin-bottom: 0; color: #e0e6f0; text-shadow: 0 0 30px rgba(224,230,240,0.2); }
        .sub-title { font-size: 42px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; text-align: center; color: #e0e6f0; margin-bottom: 16px; text-shadow: 0 0 30px rgba(224,230,240,0.2); }
        .instruction-text { display: flex; align-items: center; gap: 10px; font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 24px; letter-spacing: 0.5px; }
        .rfid-input-wrap { position: relative; margin-bottom: 24px; }
        .rfid-input-wrap input { width: 340px; padding: 14px 20px 14px 48px; font-size: 18px; font-weight: 600; letter-spacing: 2px; border: 2px solid rgba(255,255,255,0.3); border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; text-align: center; transition: all 0.3s; backdrop-filter: blur(8px); }
        .rfid-input-wrap input::placeholder { color: rgba(255,255,255,0.4); letter-spacing: 1px; font-weight: 400; }
        .rfid-input-wrap input:focus { outline: none; border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.15); box-shadow: 0 0 30px rgba(255,255,255,0.1); }
        .rfid-input-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 18px; color: rgba(255,255,255,0.5); }
        .bottom-links { display: flex; gap: 32px; margin-top: 12px; }
        .bottom-links a { color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.3s; }
        .bottom-links a:hover { color: #fff; }
        .reg-form { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 28px; width: 380px; backdrop-filter: blur(12px); animation: fadeIn 0.3s ease; }
        .reg-form h4 { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; }
        .reg-form .form-group { margin-bottom: 12px; }
        .reg-form label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 1px; }
        .reg-form input, .reg-form select { width: 100%; padding: 10px 14px; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff; font-size: 14px; font-family: inherit; }
        .reg-form input:focus, .reg-form select:focus { outline: none; border-color: rgba(255,255,255,0.5); }
        .reg-form select option { color: #333; background: #fff; }
        .reg-form .btn-register { width: 100%; padding: 12px; background: #28a745; border: none; border-radius: 8px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
        .reg-form .btn-register:hover { background: #218838; }
        .reg-form .btn-cancel { width: 100%; padding: 10px; background: none; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; color: rgba(255,255,255,0.7); font-size: 13px; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
        .reg-form .btn-cancel:hover { border-color: #fff; color: #fff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .faculty-sub { display: none; }
        .faculty-sub.visible { display: block; }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle { position: absolute; width: 2px; height: 2px; background: rgba(224,230,240,0.2); border-radius: 50%; animation: float-up linear infinite; }
        @keyframes float-up { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
        .time-indicator { position: absolute; bottom: 20px; right: 32px; z-index: 10; font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
        .welcome-toast { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); max-width: 460px; width: 90%; background: rgba(15,52,96,0.95); border: 1px solid rgba(40,167,69,0.5); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); padding: 16px 20px; display: flex; align-items: center; gap: 14px; animation: slide-up 0.5s ease-out, fade-out 0.5s ease-in 4.5s forwards; z-index: 100; }
        @keyframes slide-up { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        @keyframes fade-out { to { opacity: 0; pointer-events: none; } }
        .toast-icon { width: 36px; height: 36px; border-radius: 50%; background: rgba(40,167,69,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .toast-icon i { color: #28a745; font-size: 18px; }
        .toast-content { flex: 1; }
        .toast-label { font-size: 11px; font-weight: 700; color: #28a745; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px; }
        .toast-title { font-size: 15px; font-weight: 700; color: #fff; }
        .toast-detail { font-size: 12px; color: rgba(255,255,255,0.5); }
        .toast-detail .text-green { color: #28a745; font-weight: 700; }
        .toast-avatar { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .toast-avatar i { font-size: 20px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body class="time-night">
    <div class="particles" id="particles"></div>
    <div class="status-bar">
        <div class="system-status"><div class="status-dot"></div> SYSTEM ONLINE</div>
        <div class="text-end" style="text-align:right">
            <div class="clock" id="clock">12:00:00 PM</div>
            <div class="station-label">FEATI-LMS STATION 01</div>
        </div>
    </div>
    <div class="main-content">
        <div class="logo-container">
            <div class="scan-ring"></div>
            <div class="scan-ring"></div>
            <div class="scan-ring"></div>
            <div class="logo-glow"></div>
            <div class="scan-line"></div>
            <div class="logo-icon"><img src="images/logo.png" alt="AklatBayon"></div>
        </div>
        <div id="tap-section">
            <h1 class="main-title">TAP RFID</h1>
            <h2 class="sub-title">TO ENTER</h2>
            <div class="instruction-text"><i class="fas fa-book-reader"></i> Welcome to FEATI University Library</div>
            <div class="rfid-input-wrap">
                <i class="fas fa-id-card"></i>
                <input type="text" id="rfid-input" placeholder="Scan or type RFID" autofocus>
            </div>
            <div class="bottom-links">
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> Manual Login</a>
                <a href="catalog.html"><i class="fas fa-search"></i> Browse Catalog</a>
            </div>
        </div>
        <div id="register-section" style="display:none">
            <div class="reg-form">
                <h4><i class="fas fa-user-plus" style="margin-right:8px"></i>New User Registration</h4>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="e.g. Juan Dela Cruz">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="email@aklatbayon.edu">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Choose a password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="reg-role">
                        <option value="">Select Role</option>
                        <option value="r5">Student</option>
                        <option value="r4">Faculty</option>
                        <option value="r6">Student Assistant</option>
                        <option value="r7">Guest</option>
                    </select>
                </div>
                <div class="form-group faculty-sub" id="faculty-sub-group">
                    <label>Faculty Subtype</label>
                    <select id="reg-faculty-sub">
                        <option value="Teaching">Teaching</option>
                        <option value="Non-Teaching">Non-Teaching</option>
                        <option value="Department Chair">Department Chair</option>
                        <option value="Department Head">Department Head</option>
                    </select>
                </div>
                <div id="reg-rfid-display" style="text-align:center; font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:8px;"></div>
                <button class="btn-register" id="btn-register"><i class="fas fa-check"></i> Register & Enter</button>
                <button class="btn-cancel" id="btn-reg-cancel">Cancel</button>
            </div>
        </div>
    </div>
    <div class="time-indicator">
        <i class="fas fa-moon" id="time-icon"></i>
        <span id="time-label">Night</span>
    </div>
    <div class="welcome-toast">
        <div class="toast-icon"><i class="fas fa-check-circle"></i></div>
        <div class="toast-content">
            <div class="toast-label">SYSTEM READY</div>
            <div class="toast-title">Welcome to FEATI-LMS</div>
            <div class="toast-detail">System <span class="text-green">ONLINE</span></div>
        </div>
        <div class="toast-avatar"><img src="images/logo.png" alt="" style="width:32px;height:32px;object-fit:contain"></div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        var scannedRfid = '';

        function updateClock() {
            var now = new Date();
            var h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0'), s = String(now.getSeconds()).padStart(2,'0');
            var ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            document.getElementById('clock').textContent = h + ':' + m + ':' + s + ' ' + ampm;
        }
        updateClock();
        setInterval(updateClock, 1000);

        function updateBackground() {
            var hour = new Date().getHours();
            var body = document.body, icon = document.getElementById('time-icon'), label = document.getElementById('time-label');
            body.classList.remove('time-night','time-dawn','time-morning','time-afternoon','time-dusk');
            if (hour >= 5 && hour < 7) { body.classList.add('time-dawn'); icon.className='fas fa-cloud-sun'; label.textContent='Dawn'; }
            else if (hour >= 7 && hour < 12) { body.classList.add('time-morning'); icon.className='fas fa-sun'; label.textContent='Morning'; }
            else if (hour >= 12 && hour < 17) { body.classList.add('time-afternoon'); icon.className='fas fa-sun'; label.textContent='Afternoon'; }
            else if (hour >= 17 && hour < 19) { body.classList.add('time-dusk'); icon.className='fas fa-cloud-sun'; label.textContent='Dusk'; }
            else { body.classList.add('time-night'); icon.className='fas fa-moon'; label.textContent='Night'; }
        }
        updateBackground();
        setInterval(updateBackground, 60000);

        (function() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 30; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random()*100 + '%';
                p.style.animationDuration = (8+Math.random()*12) + 's';
                p.style.animationDelay = Math.random()*10 + 's';
                p.style.width = p.style.height = (1+Math.random()*3) + 'px';
                container.appendChild(p);
            }
        })();

        document.getElementById('rfid-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var rfid = this.value.trim();
                if (!rfid) return;
                var result = Auth.loginByRfid(rfid);
                if (result.success) {
                    Store.create('attendance', {
                        user_id: result.user.id,
                        user_name: result.user.name,
                        role_name: result.user.role_name,
                        rfid_id: result.user.rfid_id,
                        tap_time: new Date().toISOString()
                    });
                    window.location.href = 'welcome.html';
                } else {
                    scannedRfid = rfid;
                    document.getElementById('tap-section').style.display = 'none';
                    document.getElementById('register-section').style.display = 'block';
                    document.getElementById('reg-rfid-display').textContent = 'RFID: ' + rfid;
                }
            }
        });

        document.getElementById('reg-role').addEventListener('change', function() {
            var group = document.getElementById('faculty-sub-group');
            if (this.value === 'r4') { group.classList.add('visible'); }
            else { group.classList.remove('visible'); }
        });

        document.getElementById('btn-register').addEventListener('click', function() {
            var name = document.getElementById('reg-name').value.trim();
            var email = document.getElementById('reg-email').value.trim();
            var username = document.getElementById('reg-username').value.trim();
            var password = document.getElementById('reg-password').value.trim();
            var roleId = document.getElementById('reg-role').value;
            if (!name || !email || !username || !password || !roleId) { alert('Please fill in all fields.'); return; }
            var facultySub = null;
            if (roleId === 'r4') { facultySub = document.getElementById('reg-faculty-sub').value; }
            Store.create('users', {
                name: name, username: username, password: password, email: email,
                role_id: roleId, faculty_subtype: facultySub,
                rfid_id: scannedRfid, status: 'active'
            });
            var loginResult = Auth.loginByRfid(scannedRfid);
            var regUser = loginResult.success ? loginResult.user : Auth.login(username, password).user;
            if (regUser) {
                Store.create('attendance', {
                    user_id: regUser.id,
                    user_name: regUser.name,
                    role_name: regUser.role_name,
                    rfid_id: regUser.rfid_id,
                    tap_time: new Date().toISOString()
                });
            }
            window.location.href = 'welcome.html';
        });

        document.getElementById('btn-reg-cancel').addEventListener('click', function() {
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('tap-section').style.display = 'block';
            document.getElementById('rfid-input').value = '';
            document.getElementById('rfid-input').focus();
        });
    </script>
</body>
</html>
