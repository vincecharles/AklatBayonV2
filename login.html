<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f6f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .login-card { width: 100%; max-width: 420px; background: #fff; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.1); overflow: hidden; }
        .login-header { background: #1a1a2e; padding: 44px 20px; text-align: center; }
        .login-icon { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; border: 2px solid rgba(255,255,255,0.1); overflow: hidden; }
        .login-icon img { width: 60px; height: 60px; object-fit: contain; }
        .login-header h2 { color: #fff; font-size: 22px; font-weight: 700; }
        .login-header p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 4px; }
        .login-body { padding: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; display: block; }
        .input-icon { position: relative; }
        .input-icon i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #6c757d; font-size: 14px; }
        .input-icon input { width: 100%; padding: 12px 14px 12px 42px; font-size: 14px; border-radius: 8px; border: 1px solid #dee2e6; background: #f8f9fa; font-family: inherit; transition: all 0.2s; }
        .input-icon input:focus { outline: none; border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,0.12); background: #fff; }
        .btn-login { width: 100%; padding: 13px; background: #e94560; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; font-family: inherit; }
        .btn-login:hover { background: #d63851; }
        .login-footer { text-align: center; padding: 0 32px 28px; }
        .login-footer p { font-size: 13px; color: #6c757d; }
        .login-footer a { color: #0f3460; font-weight: 600; text-decoration: none; }
        .login-footer a:hover { text-decoration: underline; }
        .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .demo-creds { background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 12px; color: #4338ca; }
        .demo-creds strong { display: block; margin-bottom: 4px; }
        .demo-creds code { background: rgba(67,56,202,0.1); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon"><img src="images/logo.png" alt="AklatBayon"></div>
            <h2>AklatBayon</h2>
            <p>Library Management System</p>
        </div>
        <div class="login-body">
            <div class="alert" id="error-alert"></div>
            <div class="demo-creds">
                <strong><i class="fas fa-info-circle"></i> Demo Credentials</strong>
                Admin: <code>admin</code> / <code>admin123</code> &nbsp;|&nbsp;
                Librarian: <code>librarian</code> / <code>lib123</code><br>
                Faculty: <code>faculty1</code> / <code>fac123</code> &nbsp;|&nbsp;
                Student: <code>student1</code> / <code>stud123</code>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" id="username" placeholder="Enter username" required autofocus>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" id="password" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt" style="margin-right:8px"></i>LOGIN</button>
            </form>
        </div>
        <div class="login-footer">
            <p><a href="index.html"><i class="fas fa-id-card"></i> Use RFID Tap</a> &nbsp;&bull;&nbsp; <a href="catalog.html"><i class="fas fa-search"></i> Guest Catalog</a></p>
        </div>
    </div>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();
            var result = Auth.login(username, password);
            if (result.success) {
                window.location.href = 'welcome.html';
            } else {
                var alert = document.getElementById('error-alert');
                alert.className = 'alert alert-danger';
                alert.innerHTML = '<i class="fas fa-exclamation-circle" style="margin-right:6px"></i>' + result.message;
            }
        });
    </script>
</body>
</html>
