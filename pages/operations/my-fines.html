<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Fines - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#3211d4', 50: '#eef0ff', 700: '#3211d4', 800: '#2e14a8', 900: '#281689' },
            accent: '#e94560',
            'bg-light': '#f6f6f8',
            'bg-dark': '#131022',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">
  <div class="flex min-h-screen">
    <header id="top-header"></header>
    <nav id="sidebar-nav"></nav>
    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
      <div id="alert-container"></div>

      <!-- Page Header -->
      <div class="flex items-center gap-3 mb-6">
        <span class="material-symbols-outlined text-3xl text-primary dark:text-primary-50">request_quote</span>
        <h1 class="text-2xl font-bold">My Fines</h1>
      </div>

      <!-- Stat Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
        <!-- Pending Fines -->
        <div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-2">
            <span class="material-symbols-outlined text-red-500 bg-red-500/10 p-2 rounded-lg">error</span>
          </div>
          <p class="text-sm text-slate-500">Pending Fines</p>
          <p class="text-2xl font-bold" id="stat-pending">0</p>
        </div>
        <!-- Total Pending Amount -->
        <div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-2">
            <span class="material-symbols-outlined text-amber-500 bg-amber-500/10 p-2 rounded-lg">currency_exchange</span>
          </div>
          <p class="text-sm text-slate-500">Total Pending Amount</p>
          <p class="text-2xl font-bold" id="stat-total">&#8369;0</p>
        </div>
        <!-- Resolved Fines -->
        <div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-2">
            <span class="material-symbols-outlined text-green-500 bg-green-500/10 p-2 rounded-lg">check_circle</span>
          </div>
          <p class="text-sm text-slate-500">Resolved Fines</p>
          <p class="text-2xl font-bold" id="stat-resolved">0</p>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="flex flex-wrap items-center gap-3 mb-6">
        <select id="filter-status" class="w-40 px-3 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="paid">Paid</option>
          <option value="waived">Waived</option>
        </select>
      </div>

      <!-- Data Table -->
      <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left">
            <thead class="bg-slate-50 dark:bg-slate-800/60 text-xs uppercase tracking-wider text-slate-500 dark:text-slate-400">
              <tr>
                <th class="px-4 py-3 font-semibold">#</th>
                <th class="px-4 py-3 font-semibold">Reason</th>
                <th class="px-4 py-3 font-semibold">Amount</th>
                <th class="px-4 py-3 font-semibold">Status</th>
                <th class="px-4 py-3 font-semibold">Date</th>
              </tr>
            </thead>
            <tbody id="data-table" class="divide-y divide-slate-200 dark:divide-slate-800"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) { window.location.href = '/pages/auth/login.html'; throw ''; }
    App.init();
    const user = Auth.getCurrentUser();
    if (!user.student_id) {
        document.getElementById('data-table').innerHTML = '<tr><td colspan="5" class="text-center text-slate-400 dark:text-slate-500 py-8">No linked student record. Contact a librarian if you believe this is an error.</td></tr>';
    } else {
        const load = () => {
            const allFines = Store.getAll('fines');
            const myFines = allFines.filter((f) => f.student_id === user.student_id);
            const pending = myFines.filter((f) => f.status === 'pending');
            const resolved = myFines.filter((f) => f.status !== 'pending');
            const totalPending = pending.reduce((sum, f) => sum + Number(f.amount), 0);
            document.getElementById('stat-pending').textContent = pending.length;
            document.getElementById('stat-total').innerHTML = `&#8369;${totalPending}`;
            document.getElementById('stat-resolved').textContent = resolved.length;
            const sf = document.getElementById('filter-status').value;
            let items = myFines;
            if (sf) items = items.filter((f) => f.status === sf);
            const tbody = document.getElementById('data-table');
            if (!items.length) { tbody.innerHTML = '<tr><td colspan="5" class="text-center text-slate-400 dark:text-slate-500 py-8">No fines found.</td></tr>'; return; }
            const statusMap = {
                pending: 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400',
                paid: 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400',
                waived: 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400'
            };
            const defaultBadge = 'bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400';
            tbody.innerHTML = items.map((f, i) => {
                return `<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors"><td class="px-4 py-3 text-slate-500">${i+1}</td><td class="px-4 py-3">${f.reason}</td><td class="px-4 py-3 font-semibold">&#8369;${f.amount}</td><td class="px-4 py-3"><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${statusMap[f.status] || defaultBadge}">${f.status}</span></td><td class="px-4 py-3 text-slate-500">${App.formatDate(f.created_at)}</td></tr>`;
            }).join('');
        };
        document.getElementById('filter-status').addEventListener('change', load);
        load();
    }
  </script>
</body>
</html>
