<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Reservations - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#3211d4', 50: '#ede9ff', 100: '#d9d0ff', 200: '#b3a1ff', 300: '#8d72ff', 400: '#6744ff', 500: '#3211d4', 600: '#280db0', 700: '#1e0a8c', 800: '#140668', 900: '#0a0344' },
            accent: '#e94560',
            'bg-light': '#f6f6f8',
            'bg-dark': '#131022'
          }
        }
      }
    }
  </script>
  <style>
    .nav-tab {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 0.5rem;
      transition: all 0.15s;
      color: #64748b;
      background: transparent;
      border: none;
      cursor: pointer;
    }
    .nav-tab:hover { color: #334155; background: rgba(0,0,0,0.04); }
    .nav-tab.active { background: #3211d4; color: #fff; }
    .dark .nav-tab { color: #94a3b8; }
    .dark .nav-tab:hover { color: #e2e8f0; background: rgba(255,255,255,0.06); }
    .dark .nav-tab.active { background: #3211d4; color: #fff; }
  </style>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">
  <div class="flex min-h-screen">
    <header id="top-header"></header>
    <nav id="sidebar-nav"></nav>
    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
      <div id="alert-container"></div>

      <!-- Page Header -->
      <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-200 dark:border-slate-800">
        <h1 class="text-2xl font-black tracking-tight flex items-center gap-2">
          <span class="material-symbols-outlined text-primary dark:text-primary-50">bookmark</span>
          Book Reservations
        </h1>
      </div>

      <!-- Tabs -->
      <div class="flex items-center gap-2 mb-5" id="nav-tabs"></div>

      <!-- Tab 1: Reserve a Book -->
      <div class="tab-pane active" id="tab-reserve">
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
          <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center gap-2 text-sm font-semibold">
            <span class="material-symbols-outlined text-primary text-[20px]">add_circle</span>
            Reserve a Book
          </div>
          <div class="p-5">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <div>
                <label class="block text-sm font-medium mb-1.5">Student</label>
                <select class="h-10 w-full px-3 text-sm rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary outline-none" id="reserve-student">
                  <option value="">-- Select Student --</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium mb-1.5">Book</label>
                <select class="h-10 w-full px-3 text-sm rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary focus:ring-1 focus:ring-primary outline-none" id="reserve-book">
                  <option value="">-- Select Book --</option>
                </select>
              </div>
            </div>
            <button class="inline-flex items-center gap-1.5 px-4 py-2.5 text-sm font-semibold rounded-lg transition-colors bg-emerald-600 hover:bg-emerald-700 text-white" id="btn-reserve">
              <span class="material-symbols-outlined text-[18px]">bookmark_add</span>
              Place Reservation
            </button>
          </div>
        </div>
      </div>

      <!-- Tab 2: My Reservations -->
      <div class="tab-pane" id="tab-my">
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
          <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center gap-2 text-sm font-semibold">
            <span class="material-symbols-outlined text-primary text-[20px]">list</span>
            My Reservations
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead class="bg-slate-50 dark:bg-slate-800/50">
                <tr>
                  <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">#</th>
                  <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Book</th>
                  <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Status</th>
                  <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Position in Queue</th>
                  <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Reserved Date</th>
                  <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Expires At</th>
                  <th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Actions</th>
                </tr>
              </thead>
              <tbody id="my-reservations-table" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Tab 3: Reservation Queue -->
      <div class="tab-pane" id="tab-queue">
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
          <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center gap-2 text-sm font-semibold">
            <span class="material-symbols-outlined text-primary text-[20px]">layers</span>
            Reservation Queue
          </div>
          <div id="queue-container"></div>
        </div>
      </div>

    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
      if (!Auth.requireAuth()) throw '';
      App.init();

      var user = Auth.getCurrentUser();
      var canReserve = Auth.hasPermission('can_reserve_books');
      var canIssue = Auth.hasPermission('can_issue_books');

      // ── Build tabs dynamically based on permissions ──
      var tabsHtml = '';
      if (canReserve) {
          tabsHtml += '<button class="nav-tab active" data-tab="reserve">Reserve a Book</button>';
      }
      tabsHtml += '<button class="nav-tab' + (!canReserve ? ' active' : '') + '" data-tab="my">My Reservations</button>';
      if (canIssue) {
          tabsHtml += '<button class="nav-tab" data-tab="queue">Reservation Queue</button>';
      }
      document.getElementById('nav-tabs').innerHTML = tabsHtml;

      // If user cannot reserve, hide the reserve tab and make My Reservations active
      if (!canReserve) {
          document.getElementById('tab-reserve').style.display = 'none';
          document.getElementById('tab-reserve').classList.remove('active');
          document.getElementById('tab-my').classList.add('active');
      }
      // Hide queue tab pane if no permission
      if (!canIssue) {
          document.getElementById('tab-queue').style.display = 'none';
      }

      // ── Tab switching ──
      document.querySelectorAll('.nav-tab').forEach(function(tab) {
          tab.addEventListener('click', function() {
              document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
              document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
              this.classList.add('active');
              document.getElementById('tab-' + this.dataset.tab).classList.add('active');
              if (this.dataset.tab === 'my') loadMyReservations();
              if (this.dataset.tab === 'queue') loadQueue();
          });
      });

      // ── Tab 1: Reserve a Book ──
      if (canReserve) {
          var students = Store.getAll('students');
          var books = Store.getAll('books');
          var ssel = document.getElementById('reserve-student');
          var bsel = document.getElementById('reserve-book');

          students.forEach(function(s) {
              ssel.innerHTML += '<option value="' + s.id + '">' + s.student_id + ' — ' + s.name + '</option>';
          });

          books.forEach(function(b) {
              var label = b.available > 0
                  ? b.title + ' (Available: ' + b.available + ')'
                  : b.title + ' (All copies out — reservable)';
              bsel.innerHTML += '<option value="' + b.id + '" data-available="' + b.available + '">' + label + '</option>';
          });

          document.getElementById('btn-reserve').addEventListener('click', function() {
              var studentId = document.getElementById('reserve-student').value;
              var bookId = document.getElementById('reserve-book').value;
              if (!studentId || !bookId) { App.showAlert('danger', 'Please select both a student and a book.'); return; }

              // Check: only allow reservation if ALL copies are currently checked out
              var book = Store.getById('books', bookId);
              if (!book) { App.showAlert('danger', 'Book not found.'); return; }
              if (book.available > 0) {
                  App.showAlert('danger', 'This book still has available copies (' + book.available + '). Reservations are only allowed when all copies are checked out.');
                  return;
              }

              // Check max reservation limit based on role
              var roleKey = Store.getBorrowerRoleKey(studentId);
              var isFaculty = roleKey.indexOf('faculty') !== -1;
              var maxSetting = isFaculty ? 'reservation_max_faculty' : 'reservation_max_student';
              var maxReservations = parseInt(Store.getSetting(maxSetting)) || (isFaculty ? 5 : 2);
              var activeCount = Store.getActiveReservationCount(studentId);

              if (activeCount >= maxReservations) {
                  App.showAlert('danger', 'This ' + (isFaculty ? 'faculty member' : 'student') + ' has reached the maximum reservation limit (' + maxReservations + ').');
                  return;
              }

              // Check no duplicate reservation for same student+book combo
              var allReservations = Store.getAll('reservations');
              var duplicate = allReservations.find(function(r) {
                  return r.student_id === studentId && r.book_id === bookId && (r.status === 'active' || r.status === 'available');
              });
              if (duplicate) {
                  App.showAlert('danger', 'This student already has an active reservation for this book.');
                  return;
              }

              // Create reservation
              Store.create('reservations', {
                  student_id: studentId,
                  book_id: bookId,
                  status: 'active',
                  notified_at: null,
                  expires_at: null
              }).then(function(result) {
                  App.showAlert('success', 'Reservation placed successfully!');
                  var studentName = App.getStudentName(studentId);
                  var bookTitle = App.getBookTitle(bookId);
                  var queue = Store.getReservationQueue(bookId);
                  Swal.fire({
                      icon: 'success',
                      title: 'Reservation Placed!',
                      text: bookTitle + ' reserved for ' + studentName + '. Position in queue: #' + queue.length,
                      timer: 3000,
                      showConfirmButton: false
                  });
                  // Refresh book dropdown to reflect updated data
                  refreshBookDropdown();
              }).catch(function(err) {
                  App.showAlert('danger', err.message || 'Failed to create reservation.');
              });
          });
      }

      function refreshBookDropdown() {
          var bsel = document.getElementById('reserve-book');
          if (!bsel) return;
          var books = Store.getAll('books');
          bsel.innerHTML = '<option value="">-- Select Book --</option>';
          books.forEach(function(b) {
              var label = b.available > 0
                  ? b.title + ' (Available: ' + b.available + ')'
                  : b.title + ' (All copies out — reservable)';
              bsel.innerHTML += '<option value="' + b.id + '" data-available="' + b.available + '">' + label + '</option>';
          });
      }

      // ── Tab 2: My Reservations ──
      function loadMyReservations() {
          // Auto-expire any past-due reservations
          var expiredCount = Store.expireReservations();
          if (expiredCount > 0) {
              App.showAlert('info', expiredCount + ' reservation(s) expired automatically.');
          }

          var allReservations = Store.getAll('reservations');
          var items;

          // Staff with can_issue_books see ALL reservations; otherwise only own
          if (canIssue) {
              items = allReservations;
          } else {
              items = allReservations.filter(function(r) {
                  return r.student_id === user.student_id;
              });
          }

          // Sort by created_at descending (newest first)
          items.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });

          var tbody = document.getElementById('my-reservations-table');
          if (!items.length) {
              tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-sm text-slate-400">No reservations found.</td></tr>';
              return;
          }

          var statusClasses = {
              active: 'bg-primary-50 text-primary dark:bg-primary/20 dark:text-primary-50',
              available: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400',
              claimed: 'bg-sky-100 text-sky-700 dark:bg-sky-900/30 dark:text-sky-400',
              expired: 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400',
              cancelled: 'bg-slate-100 text-slate-600 dark:bg-slate-700/40 dark:text-slate-300'
          };

          tbody.innerHTML = items.map(function(r, i) {
              var queue = Store.getReservationQueue(r.book_id);
              var position = '—';
              for (var q = 0; q < queue.length; q++) {
                  if (queue[q].id === r.id) { position = '#' + (q + 1); break; }
              }
              if (r.status === 'claimed' || r.status === 'expired' || r.status === 'cancelled') {
                  position = '—';
              }

              var badgeClass = statusClasses[r.status] || 'bg-slate-100 text-slate-600 dark:bg-slate-700/40 dark:text-slate-300';
              var statusLabel = r.status.charAt(0).toUpperCase() + r.status.slice(1);

              var bookLabel = App.getBookTitle(r.book_id);
              if (canIssue) {
                  bookLabel = App.getStudentName(r.student_id) + ' — ' + bookLabel;
              }

              var actions = '';
              if (r.status === 'active' || r.status === 'available') {
                  actions = '<button class="btn-cancel-my inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg transition-colors bg-red-600 hover:bg-red-700 text-white" data-id="' + r.id + '"><span class="material-symbols-outlined text-[16px]">close</span>Cancel</button>';
              } else {
                  actions = '<span class="text-xs text-slate-400">No actions</span>';
              }

              return '<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors">' +
                  '<td class="px-4 py-3 text-sm text-slate-500">' + (i + 1) + '</td>' +
                  '<td class="px-4 py-3 text-sm font-medium">' + bookLabel + '</td>' +
                  '<td class="px-4 py-3"><span class="inline-block px-2.5 py-1 rounded-full text-[11px] font-semibold ' + badgeClass + '">' + statusLabel + '</span></td>' +
                  '<td class="px-4 py-3 text-sm font-semibold">' + position + '</td>' +
                  '<td class="px-4 py-3 text-sm text-slate-500">' + App.formatDate(r.created_at) + '</td>' +
                  '<td class="px-4 py-3 text-sm text-slate-500">' + App.formatDateTime(r.expires_at) + '</td>' +
                  '<td class="px-4 py-3">' + actions + '</td>' +
                  '</tr>';
          }).join('');

          // Bind cancel buttons
          document.querySelectorAll('.btn-cancel-my').forEach(function(btn) {
              btn.addEventListener('click', function() {
                  var resId = this.dataset.id;
                  Swal.fire({
                      title: 'Cancel Reservation?',
                      text: 'Are you sure you want to cancel this reservation?',
                      icon: 'warning',
                      showCancelButton: true,
                      confirmButtonColor: '#e94560',
                      cancelButtonColor: '#6c757d',
                      confirmButtonText: 'Yes, cancel it'
                  }).then(function(result) {
                      if (result.isConfirmed) {
                          Store.update('reservations', resId, { status: 'cancelled' }).then(function() {
                              App.showAlert('success', 'Reservation cancelled.');
                              loadMyReservations();
                          });
                      }
                  });
              });
          });
      }

      // ── Tab 3: Reservation Queue (staff only) ──
      function loadQueue() {
          // Auto-expire first
          Store.expireReservations();

          var allReservations = Store.getAll('reservations');
          var activeReservations = allReservations.filter(function(r) {
              return r.status === 'active' || r.status === 'available';
          });

          var container = document.getElementById('queue-container');
          if (!activeReservations.length) {
              container.innerHTML = '<div class="px-4 py-8 text-center text-sm text-slate-400">No active reservations in queue.</div>';
              return;
          }

          // Group by book_id
          var bookGroups = {};
          activeReservations.forEach(function(r) {
              if (!bookGroups[r.book_id]) bookGroups[r.book_id] = [];
              bookGroups[r.book_id].push(r);
          });

          // Sort each group by created_at (FIFO)
          Object.keys(bookGroups).forEach(function(bookId) {
              bookGroups[bookId].sort(function(a, b) {
                  return new Date(a.created_at) - new Date(b.created_at);
              });
          });

          var statusClasses = {
              active: 'bg-primary-50 text-primary dark:bg-primary/20 dark:text-primary-50',
              available: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400'
          };

          var html = '';
          Object.keys(bookGroups).forEach(function(bookId) {
              var bookTitle = App.getBookTitle(bookId);
              var book = Store.getById('books', bookId);
              var availableLabel = book ? ' (Available copies: ' + book.available + ')' : '';
              var queue = bookGroups[bookId];

              html += '<div class="border-b border-slate-100 dark:border-slate-800 last:border-b-0">';
              html += '<div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center gap-2 text-sm font-semibold"><span class="material-symbols-outlined text-primary text-[20px]">menu_book</span>' + bookTitle + availableLabel + ' <span class="inline-block ml-2 px-2.5 py-1 rounded-full text-[11px] font-semibold bg-primary-50 text-primary dark:bg-primary/20 dark:text-primary-50">' + queue.length + ' in queue</span></div>';
              html += '<table class="w-full text-left"><thead class="bg-slate-50 dark:bg-slate-800/50"><tr><th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Queue #</th><th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Student</th><th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Status</th><th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Reserved Date</th><th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Expires At</th><th class="px-4 py-3 text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Actions</th></tr></thead><tbody class="divide-y divide-slate-100 dark:divide-slate-800">';

              queue.forEach(function(r, idx) {
                  var badgeClass = statusClasses[r.status] || 'bg-slate-100 text-slate-600 dark:bg-slate-700/40 dark:text-slate-300';
                  var statusLabel = r.status.charAt(0).toUpperCase() + r.status.slice(1);
                  var studentName = App.getStudentName(r.student_id);

                  var actions = '';
                  if (r.status === 'active') {
                      actions += '<button class="btn-notify inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg transition-colors bg-emerald-600 hover:bg-emerald-700 text-white mr-2" data-id="' + r.id + '" data-book="' + r.book_id + '"><span class="material-symbols-outlined text-[16px]">notifications</span>Notify Available</button>';
                      actions += '<button class="btn-cancel-queue inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg transition-colors bg-red-600 hover:bg-red-700 text-white" data-id="' + r.id + '"><span class="material-symbols-outlined text-[16px]">close</span>Cancel</button>';
                  } else if (r.status === 'available') {
                      actions += '<button class="btn-claim inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg transition-colors bg-sky-600 hover:bg-sky-700 text-white mr-2" data-id="' + r.id + '"><span class="material-symbols-outlined text-[16px]">check_circle</span>Mark Claimed</button>';
                      actions += '<button class="btn-cancel-queue inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-lg transition-colors bg-red-600 hover:bg-red-700 text-white" data-id="' + r.id + '"><span class="material-symbols-outlined text-[16px]">close</span>Cancel</button>';
                  }

                  html += '<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors">' +
                      '<td class="px-4 py-3 text-sm font-semibold text-slate-500">#' + (idx + 1) + '</td>' +
                      '<td class="px-4 py-3 text-sm font-medium">' + studentName + '</td>' +
                      '<td class="px-4 py-3"><span class="inline-block px-2.5 py-1 rounded-full text-[11px] font-semibold ' + badgeClass + '">' + statusLabel + '</span></td>' +
                      '<td class="px-4 py-3 text-sm text-slate-500">' + App.formatDate(r.created_at) + '</td>' +
                      '<td class="px-4 py-3 text-sm text-slate-500">' + App.formatDateTime(r.expires_at) + '</td>' +
                      '<td class="px-4 py-3">' + actions + '</td>' +
                      '</tr>';
              });

              html += '</tbody></table></div>';
          });

          container.innerHTML = html;

          // Bind "Notify Available" buttons
          document.querySelectorAll('.btn-notify').forEach(function(btn) {
              btn.addEventListener('click', function() {
                  var resId = this.dataset.id;
                  var bookId = this.dataset.book;
                  var expiryHours = parseInt(Store.getSetting('reservation_expiry_hours')) || 48;
                  var expiresAt = new Date();
                  expiresAt.setHours(expiresAt.getHours() + expiryHours);

                  Store.update('reservations', resId, {
                      status: 'available',
                      notified_at: new Date().toISOString(),
                      expires_at: expiresAt.toISOString()
                  }).then(function() {
                      App.showAlert('success', 'Student notified. Reservation expires in ' + expiryHours + ' hours.');
                      Swal.fire({
                          icon: 'info',
                          title: 'Student Notified',
                          text: 'The student has been notified that ' + App.getBookTitle(bookId) + ' is available. They have ' + expiryHours + ' hours to claim it.',
                          timer: 3000,
                          showConfirmButton: false
                      });
                      loadQueue();
                  });
              });
          });

          // Bind "Mark Claimed" buttons
          document.querySelectorAll('.btn-claim').forEach(function(btn) {
              btn.addEventListener('click', function() {
                  var resId = this.dataset.id;
                  Swal.fire({
                      title: 'Mark as Claimed?',
                      text: 'Confirm that this reservation has been claimed by the student.',
                      icon: 'question',
                      showCancelButton: true,
                      confirmButtonColor: '#17a2b8',
                      cancelButtonColor: '#6c757d',
                      confirmButtonText: 'Yes, mark claimed'
                  }).then(function(result) {
                      if (result.isConfirmed) {
                          Store.update('reservations', resId, { status: 'claimed' }).then(function() {
                              App.showAlert('success', 'Reservation marked as claimed.');
                              loadQueue();
                          });
                      }
                  });
              });
          });

          // Bind "Cancel" buttons in queue
          document.querySelectorAll('.btn-cancel-queue').forEach(function(btn) {
              btn.addEventListener('click', function() {
                  var resId = this.dataset.id;
                  Swal.fire({
                      title: 'Cancel Reservation?',
                      text: 'Are you sure you want to cancel this reservation?',
                      icon: 'warning',
                      showCancelButton: true,
                      confirmButtonColor: '#e94560',
                      cancelButtonColor: '#6c757d',
                      confirmButtonText: 'Yes, cancel it'
                  }).then(function(result) {
                      if (result.isConfirmed) {
                          Store.update('reservations', resId, { status: 'cancelled' }).then(function() {
                              App.showAlert('success', 'Reservation cancelled.');
                              loadQueue();
                          });
                      }
                  });
              });
          });
      }

      // ── Initial load for the default active tab ──
      if (canReserve) {
          // Reserve tab is active by default
      } else {
          loadMyReservations();
      }
  </script>
</body>
</html>
