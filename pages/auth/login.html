<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#3211d4', 50: '#eef0ff', 100: '#e0e3ff', 700: '#3211d4', 800: '#2e14a8', 900: '#281689' },
            accent: '#e94560',
            'bg-light': '#f6f6f8',
            'bg-dark': '#131022',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans min-h-screen antialiased">

  <!-- Centered layout wrapper -->
  <div class="flex items-center justify-center min-h-screen px-4">

    <!-- Login Card -->
    <div class="w-full max-w-[420px] bg-white dark:bg-gray-900 rounded-2xl shadow-[0_8px_40px_rgba(0,0,0,0.1)] dark:shadow-[0_8px_40px_rgba(0,0,0,0.4)] overflow-hidden">

      <!-- Card Header -->
      <div class="bg-[#1a1a2e] dark:bg-[#0f0b1e] px-5 py-11 text-center">
        <div class="w-20 h-20 rounded-full bg-white/[0.08] border-2 border-white/10 flex items-center justify-center mx-auto mb-4 overflow-hidden">
          <img src="/images/logo.png" alt="AklatBayon" class="w-[60px] h-[60px] object-contain">
        </div>
        <h2 class="text-white text-[22px] font-bold">AklatBayon</h2>
        <p class="text-white/50 text-[13px] mt-1">Library Management System</p>
      </div>

      <!-- Card Body -->
      <div class="p-8">

        <!-- Error Alert (hidden by default, shown via JS) -->
        <div id="error-alert" class="hidden rounded-lg text-[13px] mb-4 p-2.5"></div>

        <!-- Demo Credentials -->
        <div class="bg-indigo-50 dark:bg-indigo-950/40 border border-indigo-200 dark:border-indigo-800 rounded-lg p-3 mb-5 text-xs text-indigo-700 dark:text-indigo-300">
          <strong class="block mb-1">
            <span class="material-symbols-outlined text-sm align-middle mr-0.5">info</span>
            Demo Credentials
          </strong>
          Admin: <code class="bg-indigo-600/10 dark:bg-indigo-400/10 px-1.5 py-0.5 rounded text-xs">admin</code> / <code class="bg-indigo-600/10 dark:bg-indigo-400/10 px-1.5 py-0.5 rounded text-xs">admin123</code> &nbsp;|&nbsp;
          Librarian: <code class="bg-indigo-600/10 dark:bg-indigo-400/10 px-1.5 py-0.5 rounded text-xs">librarian</code> / <code class="bg-indigo-600/10 dark:bg-indigo-400/10 px-1.5 py-0.5 rounded text-xs">lib123</code><br>
          Faculty: <code class="bg-indigo-600/10 dark:bg-indigo-400/10 px-1.5 py-0.5 rounded text-xs">faculty1</code> / <code class="bg-indigo-600/10 dark:bg-indigo-400/10 px-1.5 py-0.5 rounded text-xs">fac123</code> &nbsp;|&nbsp;
          Student: <code class="bg-indigo-600/10 dark:bg-indigo-400/10 px-1.5 py-0.5 rounded text-xs">student1</code> / <code class="bg-indigo-600/10 dark:bg-indigo-400/10 px-1.5 py-0.5 rounded text-xs">stud123</code>
        </div>

        <!-- Login Form -->
        <form id="login-form">
          <!-- Username -->
          <div class="mb-5">
            <label for="username" class="text-[13px] font-semibold text-gray-800 dark:text-gray-200 mb-1.5 block">Username</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-lg">person</span>
              <input type="text" name="username" id="username" placeholder="Enter username" required autofocus
                class="w-full py-3 pr-3.5 pl-11 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-gray-100 font-sans transition-all placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-none focus:border-primary focus:ring-[3px] focus:ring-primary/[0.12] focus:bg-white dark:focus:bg-gray-700">
            </div>
          </div>

          <!-- Password -->
          <div class="mb-5">
            <label for="password" class="text-[13px] font-semibold text-gray-800 dark:text-gray-200 mb-1.5 block">Password</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 text-lg">lock</span>
              <input type="password" name="password" id="password" placeholder="Enter password" required
                class="w-full py-3 pr-3.5 pl-11 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-gray-100 font-sans transition-all placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-none focus:border-primary focus:ring-[3px] focus:ring-primary/[0.12] focus:bg-white dark:focus:bg-gray-700">
            </div>
          </div>

          <!-- Login Button -->
          <button type="submit"
            class="w-full py-3.5 bg-accent rounded-lg text-white text-base font-semibold cursor-pointer transition-colors hover:bg-[#d63851] flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-xl">login</span>
            LOGIN
          </button>
        </form>
      </div>

      <!-- Card Footer -->
      <div class="text-center px-8 pb-7">
        <p class="text-[13px] text-gray-500 dark:text-gray-400">
          <a href="/index.html" class="text-primary dark:text-primary-100 font-semibold no-underline hover:underline inline-flex items-center gap-1">
            <span class="material-symbols-outlined text-base">badge</span> Use RFID Tap
          </a>
          &nbsp;&bull;&nbsp;
          <a href="/pages/management/catalog/catalog.html" class="text-primary dark:text-primary-100 font-semibold no-underline hover:underline inline-flex items-center gap-1">
            <span class="material-symbols-outlined text-base">search</span> Guest Catalog
          </a>
        </p>
      </div>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script>
      document.getElementById('login-form').addEventListener('submit', function(e) {
          e.preventDefault();
          var username = document.getElementById('username').value.trim();
          var password = document.getElementById('password').value.trim();
          var result = Auth.login(username, password);
          if (result.success) {
              window.location.href = '/pages/auth/welcome.html';
          } else {
              var alert = document.getElementById('error-alert');
              alert.className = 'block bg-red-100 dark:bg-red-900/30 text-red-800 dark:text-red-300 border border-red-200 dark:border-red-800 rounded-lg text-[13px] mb-4 p-2.5';
              alert.innerHTML = '<span class="material-symbols-outlined text-sm align-middle mr-1.5">error</span>' + result.message;
          }
      });
  </script>
</body>
</html>
