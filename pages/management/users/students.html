<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { DEFAULT: '#3211d4', 50: '#eef0ff', 700: '#3211d4', 800: '#2e14a8', 900: '#281689' }, accent: '#e94560', 'bg-light': '#f6f6f8', 'bg-dark': '#131022' } } }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">

  <header id="top-header"></header>
  <nav id="sidebar-nav"></nav>

  <div class="flex min-h-screen">
    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
      <div id="alert-container"></div>

      <!-- Page Header -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-3xl">school</span>
            Student Management
          </h1>
          <p class="text-sm text-slate-500 mt-1">Manage enrolled student records</p>
        </div>
        <button id="btn-add" class="inline-flex items-center gap-2 rounded-lg bg-primary px-5 py-2.5 text-sm font-semibold text-white hover:bg-primary-800 transition-colors">
          <span class="material-symbols-outlined text-[20px]">add_circle</span>
          Add Student
        </button>
      </div>

      <!-- Algolia-style Search -->
      <div class="relative mb-5">
        <div class="relative">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
          <input type="text" id="search-input" placeholder="Search students by name, ID, program, or section..."
            class="h-12 w-full pl-12 pr-20 text-sm rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 shadow-sm"
            autocomplete="off">
          <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-2">
            <select id="filter-status" class="h-7 px-2 text-[11px] rounded-md border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:outline-none">
              <option value="">All</option>
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
            <kbd class="hidden sm:inline-flex items-center px-1.5 py-0.5 text-[10px] text-slate-400 bg-slate-100 dark:bg-slate-700 rounded border border-slate-200 dark:border-slate-600">/</kbd>
          </div>
        </div>
        <!-- Search dropdown -->
        <div id="search-dropdown" class="absolute z-50 left-0 right-0 mt-1 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-700 shadow-xl max-h-80 overflow-y-auto hidden">
          <div id="search-results" class="py-1"></div>
        </div>
      </div>

      <!-- Two-column: Category Sidebar + Table -->
      <div class="flex gap-5">
        <!-- Left: Category Sidebar -->
        <div class="w-56 shrink-0 hidden lg:block">
          <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden sticky top-24">
            <div class="px-4 py-3 border-b border-slate-200 dark:border-slate-700">
              <p class="text-[11px] font-bold uppercase tracking-wider text-slate-400">Categories</p>
            </div>
            <div class="py-1" id="category-sidebar"></div>
          </div>
        </div>

        <!-- Right: Table -->
        <div class="flex-1 min-w-0">
          <!-- Mobile category select (hidden on lg) -->
          <div class="lg:hidden mb-3">
            <select id="mobile-category" class="w-full h-10 px-3 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"></select>
          </div>

          <!-- Active filter + result count -->
          <div class="flex items-center justify-between mb-3">
            <p class="text-xs text-slate-400" id="result-info"></p>
            <div id="active-filter-badge"></div>
          </div>

          <!-- Student Table -->
          <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
            <table class="w-full text-sm text-left">
              <thead class="bg-slate-50 dark:bg-slate-800/60 border-b border-slate-200 dark:border-slate-700">
                <tr class="text-[11px] uppercase tracking-wider text-slate-500 dark:text-slate-400 font-semibold">
                  <th class="pl-5 pr-2 py-3 w-10">#</th>
                  <th class="px-3 py-3">Student</th>
                  <th class="px-3 py-3">Program</th>
                  <th class="px-3 py-3 hidden md:table-cell">Contact</th>
                  <th class="px-3 py-3 w-16">Status</th>
                  <th class="pr-5 pl-3 py-3 text-right w-24">Actions</th>
                </tr>
              </thead>
              <tbody id="data-table" class="divide-y divide-slate-100 dark:divide-slate-800/50"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay fixed inset-0 bg-black/50 z-[2000] items-center justify-center" id="modal-form">
    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-lg mx-4 animate-modal-in border border-slate-200 dark:border-slate-700">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
        <h3 id="modal-title" class="text-lg font-semibold">Add Student</h3>
        <button class="modal-close text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="px-6 py-5 space-y-4 max-h-[70vh] overflow-y-auto">
        <input type="hidden" id="edit-id">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1.5">Student ID</label>
            <input id="f-student-id" placeholder="e.g. 2024-0001" class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5">Status</label>
            <select id="f-status" class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">Full Name</label>
          <input id="f-name" class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1.5">Email</label>
            <input id="f-email" type="email" class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5">Contact</label>
            <input id="f-contact" placeholder="09XXXXXXXXX" class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1.5">Grade Level</label>
            <select id="f-grade" class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
              <option value="College">College</option>
              <option value="Senior High">Senior High</option>
              <option value="Junior High">Junior High</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5">Program</label>
            <select id="f-program" class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
              <option value="">-- Select --</option>
              <optgroup label="College of Engineering">
                <option value="BSCE">BSCE - Civil Engineering</option>
                <option value="BSEE">BSEE - Electrical Engineering</option>
                <option value="BSME">BSME - Mechanical Engineering</option>
                <option value="BSEcE">BSEcE - Electronics Engineering</option>
                <option value="BSAeE">BSAeE - Aeronautical Engineering</option>
                <option value="BSRE">BSRE - Railway Engineering</option>
                <option value="BSGE">BSGE - Geodetic Engineering</option>
                <option value="BSAMT">BSAMT - Aircraft Maintenance Tech</option>
                <option value="BSIT">BSIT - Information Technology</option>
                <option value="BSCS">BSCS - Computer Science</option>
              </optgroup>
              <optgroup label="College of Maritime Education">
                <option value="BSMarE">BSMarE - Marine Engineering</option>
                <option value="BSMT">BSMT - Marine Transportation</option>
              </optgroup>
              <optgroup label="College of Architecture">
                <option value="BSArch">BSArch - Architecture</option>
              </optgroup>
              <optgroup label="College of Business">
                <option value="BSBA">BSBA - Business Administration</option>
                <option value="BSTM">BSTM - Tourism Management</option>
                <option value="BSCA">BSCA - Customs Administration</option>
              </optgroup>
              <optgroup label="School of Fine Arts">
                <option value="BFA">BFA - Fine Arts</option>
              </optgroup>
              <optgroup label="College of Arts, Sciences & Education">
                <option value="BAComm">BAComm - Communication</option>
              </optgroup>
              <optgroup label="Basic Education">
                <option value="SHS">SHS - Senior High School</option>
                <option value="JHS">JHS - Junior High School</option>
              </optgroup>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5">Section</label>
            <input id="f-section" placeholder="e.g. 3A" class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
        </div>
      </div>
      <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-200 dark:border-slate-700">
        <button class="modal-close inline-flex items-center gap-2 rounded-lg border border-slate-300 dark:border-slate-600 px-5 py-2.5 text-sm font-semibold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Cancel</button>
        <button id="btn-save" class="inline-flex items-center gap-2 rounded-lg bg-emerald-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-emerald-700 transition-colors">
          <span class="material-symbols-outlined text-[20px]">save</span> Save
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) {
        window.location.href = '/pages/auth/login.html';
    } else {
        (() => {
            App.init();
            App.bindModalCloses();

            let activeCategory = '';
            let activeProgram = '';

            const colleges = [
                { name: 'College of Engineering', icon: 'engineering', programs: ['BSCE','BSEE','BSME','BSEcE','BSAeE','BSRE','BSGE','BSAMT','BSIT','BSCS'] },
                { name: 'College of Maritime Education', icon: 'sailing', programs: ['BSMarE','BSMT'] },
                { name: 'College of Architecture', icon: 'domain', programs: ['BSArch'] },
                { name: 'College of Business', icon: 'storefront', programs: ['BSBA','BSTM','BSCA'] },
                { name: 'School of Fine Arts', icon: 'palette', programs: ['BFA'] },
                { name: 'Arts, Sciences & Education', icon: 'menu_book', programs: ['BAComm'] },
                { name: 'Basic Education', icon: 'school', programs: ['SHS','JHS'] }
            ];

            const allPrograms = colleges.flatMap((c) => c.programs);

            const progBadge = {
                'BSCE': 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300',
                'BSEE': 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-300',
                'BSME': 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-300',
                'BSEcE': 'bg-lime-100 text-lime-700 dark:bg-lime-900/30 dark:text-lime-300',
                'BSAeE': 'bg-sky-100 text-sky-700 dark:bg-sky-900/30 dark:text-sky-300',
                'BSRE': 'bg-stone-100 text-stone-700 dark:bg-stone-900/30 dark:text-stone-300',
                'BSGE': 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300',
                'BSAMT': 'bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-300',
                'BSIT': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300',
                'BSCS': 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300',
                'BSMarE': 'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/30 dark:text-cyan-300',
                'BSMT': 'bg-teal-100 text-teal-700 dark:bg-teal-900/30 dark:text-teal-300',
                'BSArch': 'bg-pink-100 text-pink-700 dark:bg-pink-900/30 dark:text-pink-300',
                'BSBA': 'bg-violet-100 text-violet-700 dark:bg-violet-900/30 dark:text-violet-300',
                'BSTM': 'bg-fuchsia-100 text-fuchsia-700 dark:bg-fuchsia-900/30 dark:text-fuchsia-300',
                'BSCA': 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300',
                'BFA': 'bg-rose-100 text-rose-700 dark:bg-rose-900/30 dark:text-rose-300',
                'BAComm': 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300',
                'SHS': 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300',
                'JHS': 'bg-green-100 text-green-600 dark:bg-green-900/30 dark:text-green-400'
            };

            const highlight = (text, query) => {
                if (!query) return text;
                const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                return text.replace(regex, '<mark class="bg-yellow-200 dark:bg-yellow-800 text-inherit rounded px-0.5">$1</mark>');
            };

            // Build category sidebar
            const buildSidebar = (allItems) => {
                const sidebar = document.getElementById('category-sidebar');
                const mobileSelect = document.getElementById('mobile-category');

                // "All" option
                const allActive = !activeCategory && !activeProgram;
                let html = `<button class="sidebar-cat w-full flex items-center justify-between px-4 py-2.5 text-left text-[13px] transition-colors ${allActive ? 'bg-primary/10 text-primary font-bold border-r-2 border-primary' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50'}" data-cat="" data-prog="">
                    <span class="flex items-center gap-2"><span class="material-symbols-outlined text-[18px]">apps</span>All Students</span>
                    <span class="text-[11px] opacity-50">${allItems.length}</span>
                </button>`;

                let mobileHtml = `<option value="|">All Students (${allItems.length})</option>`;

                colleges.forEach((col) => {
                    const colProgs = col.programs;
                    const colCount = allItems.filter((i) => colProgs.includes(i.program)).length;
                    const isCatActive = activeCategory === col.name;

                    // College header
                    html += `<button class="sidebar-cat w-full flex items-center justify-between px-4 py-2.5 text-left text-[13px] transition-colors ${isCatActive && !activeProgram ? 'bg-primary/10 text-primary font-bold border-r-2 border-primary' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/50'}" data-cat="${col.name}" data-prog="">
                        <span class="flex items-center gap-2"><span class="material-symbols-outlined text-[18px]">${col.icon}</span>${col.name}</span>
                        <span class="text-[11px] opacity-50">${colCount}</span>
                    </button>`;

                    mobileHtml += `<option value="${col.name}|" ${isCatActive && !activeProgram ? 'selected' : ''}>${col.name} (${colCount})</option>`;

                    // Sub-programs (show when category is active)
                    if (isCatActive) {
                        colProgs.forEach((p) => {
                            const pCount = allItems.filter((i) => i.program === p).length;
                            const isProgActive = activeProgram === p;
                            html += `<button class="sidebar-cat w-full flex items-center justify-between pl-10 pr-4 py-1.5 text-left text-[12px] transition-colors ${isProgActive ? 'text-primary font-bold bg-primary/5' : 'text-slate-500 dark:text-slate-400 hover:text-primary hover:bg-slate-50 dark:hover:bg-slate-800/50'}" data-cat="${col.name}" data-prog="${p}">
                                <span>${p}</span>
                                <span class="text-[10px] opacity-50">${pCount}</span>
                            </button>`;
                            mobileHtml += `<option value="${col.name}|${p}" ${isProgActive ? 'selected' : ''}>&nbsp;&nbsp;&nbsp;${p} (${pCount})</option>`;
                        });
                    }
                });

                sidebar.innerHTML = html;
                mobileSelect.innerHTML = mobileHtml;

                sidebar.querySelectorAll('.sidebar-cat').forEach((btn) => {
                    btn.addEventListener('click', () => {
                        activeCategory = btn.dataset.cat;
                        activeProgram = btn.dataset.prog;
                        load();
                    });
                });
                mobileSelect.addEventListener('change', function() {
                    const [cat, prog] = this.value.split('|');
                    activeCategory = cat;
                    activeProgram = prog;
                    load();
                });
            };

            // Algolia search dropdown
            const searchInput = document.getElementById('search-input');
            const searchDropdown = document.getElementById('search-dropdown');
            const searchResults = document.getElementById('search-results');

            const showSearchDropdown = () => {
                const query = searchInput.value.trim().toLowerCase();
                if (!query) { searchDropdown.classList.add('hidden'); return; }

                const allItems = Store.getAll('students') || [];
                const matches = allItems.filter((i) =>
                    i.name.toLowerCase().includes(query) ||
                    i.student_id.toLowerCase().includes(query) ||
                    (i.program && i.program.toLowerCase().includes(query)) ||
                    (i.section && i.section.toLowerCase().includes(query))
                ).slice(0, 8);

                if (!matches.length) {
                    searchResults.innerHTML = `<div class="px-4 py-6 text-center text-sm text-slate-400"><span class="material-symbols-outlined text-2xl mb-1 block">search_off</span>No results for "${query}"</div>`;
                    searchDropdown.classList.remove('hidden');
                    return;
                }

                searchResults.innerHTML = matches.map((i) => {
                    const badge = progBadge[i.program] || 'bg-slate-100 text-slate-500';
                    const dot = i.status === 'active' ? 'bg-emerald-500' : 'bg-red-400';
                    return `<button class="search-item w-full flex items-center gap-3 px-4 py-2.5 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors text-left" data-id="${i.id}">
                        <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xs shrink-0">${i.name.split(' ').map((n) => n[0]).join('').substring(0, 2).toUpperCase()}</div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-semibold truncate">${highlight(i.name, query)}</p>
                            <p class="text-[11px] text-slate-400">${highlight(i.student_id, query)} <span class="inline-block px-1.5 py-0 rounded text-[10px] font-bold ${badge} ml-1">${highlight(i.program || '', query)}</span> ${i.section ? highlight(i.section, query) : ''}</p>
                        </div>
                        <span class="w-1.5 h-1.5 rounded-full ${dot} shrink-0"></span>
                    </button>`;
                }).join('');
                searchResults.innerHTML += `<div class="px-4 py-2 border-t border-slate-100 dark:border-slate-800 text-[11px] text-slate-400">${matches.length} result${matches.length !== 1 ? 's' : ''}</div>`;
                searchDropdown.classList.remove('hidden');

                searchResults.querySelectorAll('.search-item').forEach((el) => {
                    el.addEventListener('click', function() {
                        const i = Store.getById('students', this.dataset.id); if (!i) return;
                        document.getElementById('modal-title').textContent = 'Edit Student';
                        document.getElementById('edit-id').value = i.id;
                        document.getElementById('f-student-id').value = i.student_id;
                        document.getElementById('f-name').value = i.name;
                        document.getElementById('f-email').value = i.email;
                        document.getElementById('f-grade').value = i.grade_level;
                        document.getElementById('f-program').value = i.program || '';
                        document.getElementById('f-section').value = i.section;
                        document.getElementById('f-contact').value = i.contact;
                        document.getElementById('f-status').value = i.status;
                        searchDropdown.classList.add('hidden');
                        App.openModal('modal-form');
                    });
                });
            };

            searchInput.addEventListener('input', () => { showSearchDropdown(); load(); });
            searchInput.addEventListener('focus', showSearchDropdown);
            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !searchDropdown.contains(e.target)) searchDropdown.classList.add('hidden');
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') { e.preventDefault(); searchInput.focus(); }
            });

            const load = () => {
                const allItems = Store.getAll('students') || [];
                buildSidebar(allItems);

                const s = searchInput.value.toLowerCase();
                const sf = document.getElementById('filter-status').value;
                let items = [...allItems];

                if (s) items = items.filter((i) => i.name.toLowerCase().includes(s) || i.student_id.toLowerCase().includes(s) || (i.program && i.program.toLowerCase().includes(s)) || (i.section && i.section.toLowerCase().includes(s)));
                if (activeCategory && !activeProgram) {
                    const col = colleges.find((c) => c.name === activeCategory);
                    if (col) items = items.filter((i) => col.programs.includes(i.program));
                }
                if (activeProgram) items = items.filter((i) => i.program === activeProgram);
                if (sf) items = items.filter((i) => i.status === sf);

                document.getElementById('result-info').textContent = `Showing ${items.length} of ${allItems.length} students`;

                // Active filter badge
                const badgeEl = document.getElementById('active-filter-badge');
                if (activeCategory || activeProgram) {
                    const label = activeProgram || activeCategory;
                    badgeEl.innerHTML = `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[11px] font-semibold bg-primary/10 text-primary"><span class="material-symbols-outlined text-[14px]">filter_list</span>${label}<button id="clear-filter" class="ml-1 hover:text-red-500"><span class="material-symbols-outlined text-[14px]">close</span></button></span>`;
                    document.getElementById('clear-filter').addEventListener('click', () => { activeCategory = ''; activeProgram = ''; load(); });
                } else {
                    badgeEl.innerHTML = '';
                }

                const tbody = document.getElementById('data-table');
                if (!items.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-slate-400 py-10">No students found.</td></tr>';
                    return;
                }

                const query = s;
                tbody.innerHTML = items.map((i, idx) => {
                    const badge = progBadge[i.program] || 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400';
                    const dot = i.status === 'active' ? 'bg-emerald-500' : 'bg-red-400';
                    return `<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                        <td class="pl-5 pr-2 py-3 text-xs text-slate-400">${idx + 1}</td>
                        <td class="px-3 py-3">
                            <p class="font-semibold text-[13px]">${highlight(i.name, query)}</p>
                            <p class="text-[11px] text-slate-400 mt-0.5">${highlight(i.student_id, query)}</p>
                        </td>
                        <td class="px-3 py-3">
                            <span class="inline-block px-2 py-0.5 rounded text-[11px] font-bold ${badge}">${i.program || '—'}</span>
                            <span class="text-[11px] text-slate-400 ml-1">${i.section || ''}</span>
                        </td>
                        <td class="px-3 py-3 text-xs text-slate-500 hidden md:table-cell">${i.contact || '—'}</td>
                        <td class="px-3 py-3"><span class="inline-flex items-center gap-1.5 text-[11px] text-slate-500"><span class="w-1.5 h-1.5 rounded-full ${dot}"></span>${i.status}</span></td>
                        <td class="pr-5 pl-3 py-3 text-right">
                            <div class="inline-flex items-center gap-0.5">
                                <a href="/pages/operations/borrower-profile.html?id=${i.id}" class="w-7 h-7 inline-flex items-center justify-center rounded-md text-slate-400 hover:text-sky-600 hover:bg-sky-50 dark:hover:bg-sky-900/20 transition-colors" title="View"><span class="material-symbols-outlined text-[18px]">visibility</span></a>
                                <button class="btn-edit w-7 h-7 inline-flex items-center justify-center rounded-md text-slate-400 hover:text-primary hover:bg-primary/10 transition-colors" data-id="${i.id}" title="Edit"><span class="material-symbols-outlined text-[18px]">edit</span></button>
                                <button class="btn-del w-7 h-7 inline-flex items-center justify-center rounded-md text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors" data-id="${i.id}" data-name="${i.name}" title="Delete"><span class="material-symbols-outlined text-[18px]">delete</span></button>
                            </div>
                        </td>
                    </tr>`;
                }).join('');
                bindActions();
            };

            const bindActions = () => {
                document.querySelectorAll('.btn-edit').forEach((b) => { b.addEventListener('click', function() {
                    const i = Store.getById('students', this.dataset.id); if (!i) return;
                    document.getElementById('modal-title').textContent = 'Edit Student';
                    document.getElementById('edit-id').value = i.id;
                    document.getElementById('f-student-id').value = i.student_id;
                    document.getElementById('f-name').value = i.name;
                    document.getElementById('f-email').value = i.email;
                    document.getElementById('f-grade').value = i.grade_level;
                    document.getElementById('f-program').value = i.program || '';
                    document.getElementById('f-section').value = i.section;
                    document.getElementById('f-contact').value = i.contact;
                    document.getElementById('f-status').value = i.status;
                    App.openModal('modal-form');
                }); });
                document.querySelectorAll('.btn-del').forEach((b) => { b.addEventListener('click', function() {
                    const id = this.dataset.id, name = this.dataset.name;
                    App.confirmDelete(name).then((r) => { if (r.isConfirmed) { Store.remove('students', id); App.showAlert('success', 'Student deleted.'); load(); } });
                }); });
            };

            document.getElementById('btn-add').addEventListener('click', () => {
                document.getElementById('modal-title').textContent = 'Add Student';
                document.getElementById('edit-id').value = '';
                ['f-student-id', 'f-name', 'f-email', 'f-section', 'f-contact'].forEach((id) => { document.getElementById(id).value = ''; });
                document.getElementById('f-grade').value = 'College';
                document.getElementById('f-program').value = '';
                document.getElementById('f-status').value = 'active';
                App.openModal('modal-form');
            });

            document.getElementById('btn-save').addEventListener('click', () => {
                const sid = document.getElementById('f-student-id').value.trim();
                const name = document.getElementById('f-name').value.trim();
                const email = document.getElementById('f-email').value.trim();
                const grade = document.getElementById('f-grade').value;
                const program = document.getElementById('f-program').value;
                const section = document.getElementById('f-section').value.trim();
                const contact = document.getElementById('f-contact').value.trim();
                const status = document.getElementById('f-status').value;
                if (!sid || !name || !email) { App.showAlert('danger', 'Fill required fields.'); return; }
                const eid = document.getElementById('edit-id').value;
                const data = { student_id: sid, name, email, grade_level: grade, program, section, contact, status };
                const promise = eid ? Store.update('students', eid, data) : Store.create('students', data);
                promise.then(() => {
                    App.showAlert('success', eid ? 'Student updated.' : 'Student created.');
                    App.closeModal('modal-form'); load();
                }).catch((err) => {
                    Swal.fire({ icon: 'error', title: 'Not Allowed', text: err.message || 'Could not save.', confirmButtonColor: '#e94560' });
                });
            });

            document.getElementById('filter-status').addEventListener('change', load);
            load();
        })();
    }
  </script>
</body>
</html>
