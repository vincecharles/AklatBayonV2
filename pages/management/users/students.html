<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { DEFAULT: '#3211d4', 50: '#eef0ff', 700: '#3211d4', 800: '#2e14a8', 900: '#281689' }, accent: '#e94560', 'bg-light': '#f6f6f8', 'bg-dark': '#131022' } } }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">

  <header id="top-header"></header>
  <nav id="sidebar-nav"></nav>

  <div class="flex min-h-screen">
    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
      <div id="alert-container"></div>

      <!-- Page Header -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-3xl">school</span>
            Student Management
          </h1>
          <p class="text-sm text-slate-500 mt-1">Manage enrolled student records</p>
        </div>
        <button id="btn-add" class="inline-flex items-center gap-2 rounded-lg bg-primary px-5 py-2.5 text-sm font-semibold text-white hover:bg-primary-800 transition-colors">
          <span class="material-symbols-outlined text-[20px]">add_circle</span>
          Add Student
        </button>
      </div>

      <!-- Search Bar -->
      <div class="flex flex-wrap items-center gap-3 mb-5">
        <div class="relative flex-1 min-w-[220px]">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">search</span>
          <input type="text" id="search-input" placeholder="Search by name or ID..."
            class="h-10 w-full pl-10 pr-4 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <select id="filter-status"
          class="h-10 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>

      <!-- Program Tabs -->
      <div class="flex flex-wrap gap-2 mb-5" id="program-tabs">
        <button class="tab-btn active px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all border" data-program="">All</button>
      </div>

      <!-- Student List -->
      <div id="student-list" class="space-y-4"></div>

    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay fixed inset-0 bg-black/50 z-[2000] items-center justify-center" id="modal-form">
    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-lg mx-4 animate-modal-in border border-slate-200 dark:border-slate-700">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
        <h3 id="modal-title" class="text-lg font-semibold">Add Student</h3>
        <button class="modal-close text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="px-6 py-5 space-y-4 max-h-[70vh] overflow-y-auto">
        <input type="hidden" id="edit-id">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1.5">Student ID</label>
            <input id="f-student-id" placeholder="e.g. 2024-0001"
              class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5">Status</label>
            <select id="f-status"
              class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">Full Name</label>
          <input id="f-name"
            class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1.5">Email</label>
            <input id="f-email" type="email"
              class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5">Contact</label>
            <input id="f-contact" placeholder="09XXXXXXXXX"
              class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1.5">Grade Level</label>
            <select id="f-grade"
              class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
              <option value="College">College</option>
              <option value="Senior High">Senior High</option>
              <option value="Junior High">Junior High</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5">Program</label>
            <select id="f-program"
              class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
              <option value="">-- Select --</option>
              <optgroup label="Engineering">
                <option value="BSCE">BSCE</option>
                <option value="BSME">BSME</option>
                <option value="BSEE">BSEE</option>
                <option value="BSEcE">BSEcE</option>
                <option value="BSMarE">BSMarE</option>
                <option value="BSNA">BSNA</option>
              </optgroup>
              <optgroup label="Computing">
                <option value="BSIT">BSIT</option>
                <option value="BSCS">BSCS</option>
              </optgroup>
              <optgroup label="Architecture">
                <option value="BSArch">BSArch</option>
              </optgroup>
              <optgroup label="Business & Hospitality">
                <option value="BSBA">BSBA</option>
                <option value="BSHRA">BSHRA</option>
              </optgroup>
              <optgroup label="Criminal Justice">
                <option value="BSCrim">BSCrim</option>
              </optgroup>
              <optgroup label="Basic Education">
                <option value="SHS">SHS</option>
                <option value="JHS">JHS</option>
              </optgroup>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5">Section</label>
            <input id="f-section" placeholder="e.g. 3A"
              class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
        </div>
      </div>
      <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-200 dark:border-slate-700">
        <button class="modal-close inline-flex items-center gap-2 rounded-lg border border-slate-300 dark:border-slate-600 px-5 py-2.5 text-sm font-semibold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Cancel</button>
        <button id="btn-save" class="inline-flex items-center gap-2 rounded-lg bg-emerald-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-emerald-700 transition-colors">
          <span class="material-symbols-outlined text-[20px]">save</span> Save
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    window.addEventListener('unhandledrejection', (e) => { e.preventDefault(); });

    if (!Auth.requireAuth()) {
        window.location.href = '/pages/auth/login.html';
    } else {
        (() => {
            App.init();
            App.bindModalCloses();

            let activeProgram = '';

            const programNames = {
                'BSIT': 'BS Information Technology',
                'BSCS': 'BS Computer Science',
                'BSCE': 'BS Civil Engineering',
                'BSME': 'BS Mechanical Engineering',
                'BSEE': 'BS Electrical Engineering',
                'BSEcE': 'BS Electronics Engineering',
                'BSMarE': 'BS Marine Engineering',
                'BSNA': 'BS Naval Architecture',
                'BSArch': 'BS Architecture',
                'BSBA': 'BS Business Administration',
                'BSHRA': 'BS Hotel & Restaurant Admin',
                'BSCrim': 'BS Criminology',
                'SHS': 'Senior High School',
                'JHS': 'Junior High School'
            };

            // Build program tabs from actual student data
            const buildTabs = (allItems) => {
                const programs = [...new Set(allItems.map((i) => i.program).filter(Boolean))].sort();
                const container = document.getElementById('program-tabs');
                container.innerHTML = `<button class="tab-btn ${activeProgram === '' ? 'bg-primary text-white border-primary' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-300 dark:border-slate-600 hover:border-primary hover:text-primary'} px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all border" data-program="">All <span class="ml-1 text-[10px] opacity-70">${allItems.length}</span></button>`;
                programs.forEach((p) => {
                    const count = allItems.filter((i) => i.program === p).length;
                    const isActive = activeProgram === p;
                    container.innerHTML += `<button class="tab-btn ${isActive ? 'bg-primary text-white border-primary' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border-slate-300 dark:border-slate-600 hover:border-primary hover:text-primary'} px-3.5 py-1.5 rounded-full text-xs font-semibold transition-all border" data-program="${p}">${p} <span class="ml-1 text-[10px] opacity-70">${count}</span></button>`;
                });
                container.querySelectorAll('.tab-btn').forEach((btn) => {
                    btn.addEventListener('click', () => {
                        activeProgram = btn.dataset.program;
                        load();
                    });
                });
            };

            const load = () => {
                let allItems = Store.getAll('students') || [];
                buildTabs(allItems);

                const s = document.getElementById('search-input').value.toLowerCase();
                const sf = document.getElementById('filter-status').value;
                let items = [...allItems];
                if (s) items = items.filter((i) => i.name.toLowerCase().includes(s) || i.student_id.toLowerCase().includes(s));
                if (activeProgram) items = items.filter((i) => i.program === activeProgram);
                if (sf) items = items.filter((i) => i.status === sf);

                const container = document.getElementById('student-list');

                if (!items.length) {
                    container.innerHTML = `<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-10 text-center text-slate-400">No students found.</div>`;
                    return;
                }

                // Group by program
                const grouped = {};
                items.forEach((i) => {
                    const key = i.program || 'Unassigned';
                    if (!grouped[key]) grouped[key] = [];
                    grouped[key].push(i);
                });

                let html = '';
                let globalIdx = 0;

                Object.keys(grouped).sort().forEach((prog) => {
                    const students = grouped[prog];
                    const fullName = programNames[prog] || prog;

                    html += `<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">`;
                    html += `<div class="px-5 py-3 bg-slate-50 dark:bg-slate-800/60 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary text-[20px]">folder</span>
                            <span class="font-bold text-sm">${prog}</span>
                            <span class="text-xs text-slate-400">${fullName}</span>
                        </div>
                        <span class="text-xs font-semibold text-slate-500 bg-slate-200 dark:bg-slate-700 px-2 py-0.5 rounded-full">${students.length}</span>
                    </div>`;

                    html += `<table class="w-full text-sm"><tbody class="divide-y divide-slate-100 dark:divide-slate-800/50">`;

                    students.forEach((i) => {
                        globalIdx++;
                        const statusDot = i.status === 'active'
                            ? 'bg-emerald-500' : 'bg-red-400';

                        html += `<tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/30 transition-colors">
                            <td class="pl-5 pr-2 py-2.5 w-8 text-xs text-slate-400">${globalIdx}</td>
                            <td class="px-2 py-2.5 w-10">
                                <div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center text-primary font-bold text-xs">
                                    ${i.name.split(' ').map((n) => n[0]).join('').substring(0, 2).toUpperCase()}
                                </div>
                            </td>
                            <td class="px-2 py-2.5">
                                <p class="font-semibold text-[13px] leading-tight">${i.name}</p>
                                <p class="text-[11px] text-slate-400">${i.student_id}</p>
                            </td>
                            <td class="px-2 py-2.5 text-xs text-slate-500">${i.section || ''}</td>
                            <td class="px-2 py-2.5 text-xs text-slate-500 hidden md:table-cell">${i.contact || ''}</td>
                            <td class="px-2 py-2.5 w-6">
                                <span class="inline-block w-2 h-2 rounded-full ${statusDot}" title="${i.status}"></span>
                            </td>
                            <td class="pr-4 pl-2 py-2.5 text-right">
                                <div class="inline-flex items-center gap-0.5">
                                    <a href="/pages/operations/borrower-profile.html?id=${i.id}" class="w-7 h-7 inline-flex items-center justify-center rounded-md text-slate-400 hover:text-sky-600 hover:bg-sky-50 dark:hover:bg-sky-900/20 transition-colors" title="View"><span class="material-symbols-outlined text-[18px]">visibility</span></a>
                                    <button class="btn-edit w-7 h-7 inline-flex items-center justify-center rounded-md text-slate-400 hover:text-primary hover:bg-primary/10 transition-colors" data-id="${i.id}" title="Edit"><span class="material-symbols-outlined text-[18px]">edit</span></button>
                                    <button class="btn-del w-7 h-7 inline-flex items-center justify-center rounded-md text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors" data-id="${i.id}" data-name="${i.name}" title="Delete"><span class="material-symbols-outlined text-[18px]">delete</span></button>
                                </div>
                            </td>
                        </tr>`;
                    });

                    html += `</tbody></table></div>`;
                });

                container.innerHTML = html;
                bindActions();
            };

            const bindActions = () => {
                document.querySelectorAll('.btn-edit').forEach((b) => { b.addEventListener('click', function() {
                    const i = Store.getById('students', this.dataset.id); if (!i) return;
                    document.getElementById('modal-title').textContent = 'Edit Student';
                    document.getElementById('edit-id').value = i.id;
                    document.getElementById('f-student-id').value = i.student_id;
                    document.getElementById('f-name').value = i.name;
                    document.getElementById('f-email').value = i.email;
                    document.getElementById('f-grade').value = i.grade_level;
                    document.getElementById('f-program').value = i.program || '';
                    document.getElementById('f-section').value = i.section;
                    document.getElementById('f-contact').value = i.contact;
                    document.getElementById('f-status').value = i.status;
                    App.openModal('modal-form');
                }); });
                document.querySelectorAll('.btn-del').forEach((b) => { b.addEventListener('click', function() {
                    const id = this.dataset.id, name = this.dataset.name;
                    App.confirmDelete(name).then((r) => { if (r.isConfirmed) { Store.remove('students', id); App.showAlert('success', 'Student deleted.'); load(); } });
                }); });
            };

            document.getElementById('btn-add').addEventListener('click', () => {
                document.getElementById('modal-title').textContent = 'Add Student';
                document.getElementById('edit-id').value = '';
                ['f-student-id', 'f-name', 'f-email', 'f-section', 'f-contact'].forEach((id) => { document.getElementById(id).value = ''; });
                document.getElementById('f-grade').value = 'College';
                document.getElementById('f-program').value = '';
                document.getElementById('f-status').value = 'active';
                App.openModal('modal-form');
            });

            document.getElementById('btn-save').addEventListener('click', () => {
                const sid = document.getElementById('f-student-id').value.trim();
                const name = document.getElementById('f-name').value.trim();
                const email = document.getElementById('f-email').value.trim();
                const grade = document.getElementById('f-grade').value;
                const program = document.getElementById('f-program').value;
                const section = document.getElementById('f-section').value.trim();
                const contact = document.getElementById('f-contact').value.trim();
                const status = document.getElementById('f-status').value;
                if (!sid || !name || !email) { App.showAlert('danger', 'Fill required fields.'); return; }
                const eid = document.getElementById('edit-id').value;
                const data = { student_id: sid, name, email, grade_level: grade, program, section, contact, status };
                const promise = eid ? Store.update('students', eid, data) : Store.create('students', data);
                promise.then(() => {
                    App.showAlert('success', eid ? 'Student updated.' : 'Student created.');
                    App.closeModal('modal-form'); load();
                }).catch((err) => {
                    Swal.fire({ icon: 'error', title: 'Not Allowed', text: err.message || 'Could not save.', confirmButtonColor: '#e94560' });
                });
            });

            document.getElementById('search-input').addEventListener('input', load);
            document.getElementById('filter-status').addEventListener('change', load);
            load();
        })();
    }
  </script>
</body>
</html>
