<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Management - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { DEFAULT: '#3211d4', 50: '#eef0ff', 700: '#3211d4', 800: '#2e14a8', 900: '#281689' }, accent: '#e94560', 'bg-light': '#f6f6f8', 'bg-dark': '#131022' } } }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">

  <header id="top-header"></header>
  <nav id="sidebar-nav"></nav>

  <div class="flex min-h-screen">
    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
      <div id="alert-container"></div>

      <!-- Page Header -->
      <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-200 dark:border-slate-800">
        <h1 class="text-2xl font-bold flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-3xl">school</span>
          Student Management
        </h1>
        <button id="btn-add" class="inline-flex items-center gap-2 rounded-lg bg-primary px-5 py-2.5 text-sm font-semibold text-white hover:bg-primary-800 transition-colors">
          <span class="material-symbols-outlined text-[20px]">add_circle</span>
          Add Student
        </button>
      </div>

      <!-- Filter Bar -->
      <div class="flex flex-wrap items-center gap-3 bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 mb-5">
        <div class="relative flex-1 min-w-[200px]">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">search</span>
          <input type="text" id="search-input" placeholder="Search students..."
            class="h-10 w-full pl-10 pr-4 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <select id="filter-status"
          class="h-10 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary min-w-[160px]">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>

      <!-- Table Card -->
      <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left">
            <thead class="bg-slate-50 dark:bg-slate-800/60 text-xs uppercase tracking-wider text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">
              <tr>
                <th class="px-4 py-3">#</th>
                <th class="px-4 py-3">Student ID</th>
                <th class="px-4 py-3">Name</th>
                <th class="px-4 py-3">Email</th>
                <th class="px-4 py-3">Grade Level</th>
                <th class="px-4 py-3">Program</th>
                <th class="px-4 py-3">Section</th>
                <th class="px-4 py-3">Contact</th>
                <th class="px-4 py-3">Status</th>
                <th class="px-4 py-3 text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="data-table" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay fixed inset-0 bg-black/50 z-[2000] items-center justify-center" id="modal-form">
    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-lg mx-4 animate-modal-in border border-slate-200 dark:border-slate-700">
      <!-- Modal Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
        <h3 id="modal-title" class="text-lg font-semibold">Add Student</h3>
        <button class="modal-close text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <!-- Modal Body -->
      <div class="px-6 py-5 space-y-4 max-h-[70vh] overflow-y-auto">
        <input type="hidden" id="edit-id">
        <div>
          <label class="block text-sm font-medium mb-1.5">Student ID</label>
          <input id="f-student-id" placeholder="e.g. 2024-0001"
            class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">Full Name</label>
          <input id="f-name"
            class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">Email</label>
          <input id="f-email" type="email"
            class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1.5">Grade Level</label>
            <select id="f-grade"
              class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
              <option value="College">College</option>
              <option value="Senior High">Senior High</option>
              <option value="Junior High">Junior High</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5">Program</label>
            <select id="f-program"
              class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
              <option value="">-- Select --</option>
              <optgroup label="Engineering">
                <option value="BSCE">BSCE - Civil Engineering</option>
                <option value="BSME">BSME - Mechanical Engineering</option>
                <option value="BSEE">BSEE - Electrical Engineering</option>
                <option value="BSEcE">BSEcE - Electronics Engineering</option>
                <option value="BSMarE">BSMarE - Marine Engineering</option>
                <option value="BSNA">BSNA - Naval Architecture</option>
              </optgroup>
              <optgroup label="Computing">
                <option value="BSIT">BSIT - Information Technology</option>
                <option value="BSCS">BSCS - Computer Science</option>
              </optgroup>
              <optgroup label="Architecture">
                <option value="BSArch">BSArch - Architecture</option>
              </optgroup>
              <optgroup label="Business & Hospitality">
                <option value="BSBA">BSBA - Business Administration</option>
                <option value="BSHRA">BSHRA - Hotel & Restaurant Admin</option>
              </optgroup>
              <optgroup label="Criminal Justice">
                <option value="BSCrim">BSCrim - Criminology</option>
              </optgroup>
              <optgroup label="Basic Education">
                <option value="SHS">SHS - Senior High School</option>
                <option value="JHS">JHS - Junior High School</option>
              </optgroup>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">Section</label>
          <input id="f-section" placeholder="e.g. 3A"
            class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">Contact</label>
          <input id="f-contact" placeholder="09XXXXXXXXX"
            class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5">Status</label>
          <select id="f-status"
            class="h-11 w-full px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <!-- Modal Footer -->
      <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-200 dark:border-slate-700">
        <button class="modal-close inline-flex items-center gap-2 rounded-lg border border-slate-300 dark:border-slate-600 px-5 py-2.5 text-sm font-semibold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
          Cancel
        </button>
        <button id="btn-save" class="inline-flex items-center gap-2 rounded-lg bg-emerald-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-emerald-700 transition-colors">
          <span class="material-symbols-outlined text-[20px]">save</span>
          Save
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) throw '';
    App.init(); App.bindModalCloses();
    const load = () => {
        let items = Store.getAll('students');
        const s = document.getElementById('search-input').value.toLowerCase();
        const sf = document.getElementById('filter-status').value;
        if (s) items = items.filter((i) => i.name.toLowerCase().includes(s) || i.student_id.toLowerCase().includes(s));
        if (sf) items = items.filter((i) => i.status === sf);
        const tbody = document.getElementById('data-table');
        if (!items.length) { tbody.innerHTML='<tr><td colspan="10" class="text-center text-slate-400 py-8">No students found.</td></tr>'; return; }
        tbody.innerHTML = items.map((i, idx) => {
            const statusClasses = i.status==='active'
                ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400'
                : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400';
            return `<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors">`
                +`<td class="px-4 py-3 text-slate-500">${idx+1}</td>`
                +`<td class="px-4 py-3 font-semibold">${i.student_id}</td>`
                +`<td class="px-4 py-3">${i.name}</td>`
                +`<td class="px-4 py-3">${i.email}</td>`
                +`<td class="px-4 py-3">${i.grade_level}</td>`
                +`<td class="px-4 py-3"><span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-semibold bg-primary/10 text-primary dark:bg-primary/20 dark:text-indigo-300">${i.program||'—'}</span></td>`
                +`<td class="px-4 py-3">${i.section||'—'}</td>`
                +`<td class="px-4 py-3">${i.contact}</td>`
                +`<td class="px-4 py-3"><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${statusClasses}">${i.status}</span></td>`
                +`<td class="px-4 py-3 text-center"><div class="inline-flex items-center gap-1">`
                +`<a href="/pages/operations/borrower-profile.html?id=${i.id}" class="inline-flex items-center justify-center w-8 h-8 rounded-lg text-sky-600 hover:bg-sky-50 dark:hover:bg-sky-900/30 transition-colors" title="View Profile"><span class="material-symbols-outlined text-[20px]">visibility</span></a>`
                +`<button class="btn-edit inline-flex items-center justify-center w-8 h-8 rounded-lg text-primary hover:bg-primary-50 dark:hover:bg-primary/10 transition-colors" data-id="${i.id}" title="Edit"><span class="material-symbols-outlined text-[20px]">edit</span></button>`
                +`<button class="btn-del inline-flex items-center justify-center w-8 h-8 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors" data-id="${i.id}" data-name="${i.name}" title="Delete"><span class="material-symbols-outlined text-[20px]">delete</span></button>`
                +`</div></td></tr>`;
        }).join('');
        bindActions();
    };
    const bindActions = () => {
        document.querySelectorAll('.btn-edit').forEach((b) => { b.addEventListener('click', function() {
            const i = Store.getById('students', this.dataset.id); if(!i) return;
            document.getElementById('modal-title').textContent='Edit Student'; document.getElementById('edit-id').value=i.id;
            document.getElementById('f-student-id').value=i.student_id; document.getElementById('f-name').value=i.name;
            document.getElementById('f-email').value=i.email; document.getElementById('f-grade').value=i.grade_level;
            document.getElementById('f-program').value=i.program||'';
            document.getElementById('f-section').value=i.section; document.getElementById('f-contact').value=i.contact;
            document.getElementById('f-status').value=i.status; App.openModal('modal-form');
        }); });
        document.querySelectorAll('.btn-del').forEach((b) => { b.addEventListener('click', function() {
            const id=this.dataset.id, name=this.dataset.name;
            App.confirmDelete(name).then((r) => { if(r.isConfirmed){Store.remove('students',id);App.showAlert('success','Student deleted.');load();} });
        }); });
    };
    document.getElementById('btn-add').addEventListener('click', () => {
        document.getElementById('modal-title').textContent='Add Student'; document.getElementById('edit-id').value='';
        ['f-student-id','f-name','f-email','f-section','f-contact'].forEach((id) => {document.getElementById(id).value='';});
        document.getElementById('f-grade').value='College'; document.getElementById('f-program').value=''; document.getElementById('f-status').value='active'; App.openModal('modal-form');
    });
    document.getElementById('btn-save').addEventListener('click', () => {
        const sid=document.getElementById('f-student-id').value.trim(), name=document.getElementById('f-name').value.trim(),
            email=document.getElementById('f-email').value.trim(), grade=document.getElementById('f-grade').value,
            program=document.getElementById('f-program').value,
            section=document.getElementById('f-section').value.trim(), contact=document.getElementById('f-contact').value.trim(),
            status=document.getElementById('f-status').value;
        if(!sid||!name||!email){App.showAlert('danger','Fill required fields.');return;}
        const eid=document.getElementById('edit-id').value;
        const data={student_id:sid,name:name,email:email,grade_level:grade,program:program,section:section,contact:contact,status:status};
        const promise = eid ? Store.update('students',eid,data) : Store.create('students',data);
        promise.then(() => {
            App.showAlert('success', eid ? 'Student updated.' : 'Student created.');
            App.closeModal('modal-form'); load();
        }).catch((err) => {
            Swal.fire({icon:'error',title:'Not Allowed',text:err.message||'Could not save.',confirmButtonColor:'#e94560'});
        });
    });
    document.getElementById('search-input').addEventListener('input', load);
    document.getElementById('filter-status').addEventListener('change', load);
    load();
  </script>
</body>
</html>
