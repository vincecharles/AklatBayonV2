<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOC Book Search - AklatBayon</title>
    <meta name="description" content="Search the Library of Congress catalog and import books into AklatBayon.">
    <script src="/js/theme-init.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
    <script>
    tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                fontFamily: { sans: ['Inter', 'sans-serif'] },
                colors: {
                    primary: { DEFAULT: '#3211d4', 50: '#ede9ff', 100: '#d9d0ff', 200: '#b3a1ff', 300: '#8d72ff', 400: '#6744ff', 500: '#3211d4', 600: '#280db0', 700: '#1e0a8c', 800: '#140668', 900: '#0a0344' },
                    accent: '#e94560',
                    'bg-light': '#f6f6f8',
                    'bg-dark': '#131022'
                }
            }
        }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">
<div class="flex min-h-screen">
    <header id="top-header"></header>
    <nav id="sidebar-nav"></nav>
    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
        <div id="alert-container"></div>

        <!-- Hero Banner -->
        <div class="bg-gradient-to-br from-primary-800 to-primary-500 rounded-xl px-8 py-7 mb-6 text-white flex items-center gap-5">
            <div class="w-14 h-14 bg-white/[0.12] rounded-xl flex items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-2xl">account_balance</span>
            </div>
            <div>
                <h2 class="text-xl font-bold mb-1">Library of Congress Catalog</h2>
                <p class="text-sm opacity-70 m-0">Search millions of books from the world's largest library</p>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="flex gap-3 mb-6">
            <input type="text" id="loc-query"
                   class="flex-1 px-5 py-3 text-base border-2 border-slate-200 dark:border-slate-600 rounded-xl font-sans bg-white dark:bg-slate-800 dark:text-slate-100 focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 placeholder:text-slate-400"
                   placeholder="Search books by title, author, subject, or ISBN..." autofocus>
            <button class="px-7 py-3 text-base font-semibold bg-primary hover:bg-primary-600 text-white rounded-xl transition-colors inline-flex items-center gap-2 shrink-0" id="btn-search">
                <span class="material-symbols-outlined text-xl">search</span> Search LOC
            </button>
        </div>

        <!-- Results Section -->
        <div id="results-section" style="display:none">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <span class="font-semibold text-primary-800 dark:text-slate-200" id="results-heading"></span>
                    <span class="text-slate-400 text-sm ml-2" id="results-count"></span>
                </div>
            </div>
            <div class="grid grid-cols-[repeat(auto-fill,minmax(280px,1fr))] gap-5" id="loc-results"></div>
            <div class="flex justify-center items-center gap-4 mt-6" id="pagination-bar" style="display:none">
                <button class="px-5 py-2 text-sm font-semibold border-2 border-primary text-primary dark:text-primary-200 rounded-lg hover:bg-primary hover:text-white transition-colors disabled:opacity-40 disabled:cursor-not-allowed inline-flex items-center gap-1" id="btn-prev">
                    <span class="material-symbols-outlined text-lg">chevron_left</span> Previous
                </button>
                <span class="text-sm text-slate-500 dark:text-slate-400 font-semibold" id="page-info"></span>
                <button class="px-5 py-2 text-sm font-semibold border-2 border-primary text-primary dark:text-primary-200 rounded-lg hover:bg-primary hover:text-white transition-colors disabled:opacity-40 disabled:cursor-not-allowed inline-flex items-center gap-1" id="btn-next">
                    Next <span class="material-symbols-outlined text-lg">chevron_right</span>
                </button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" style="display:none">
            <div class="flex justify-center items-center py-16">
                <div class="w-10 h-10 border-4 border-slate-200 dark:border-slate-700 border-t-accent rounded-full animate-spin"></div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="flex flex-col items-center justify-center py-20 text-slate-400" style="display:none">
            <span class="material-symbols-outlined text-6xl mb-4">search</span>
            <p class="text-base" id="empty-text">Enter a search term to browse the Library of Congress catalog.</p>
        </div>
    </main>
</div>

    <script src="/js/api.js"></script>
    <script src="/js/store.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/sidebar.js"></script>
    <script src="/js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) { window.location.href = '/pages/auth/login.html'; return; }
        App.init();

        const LOC_API = 'https://www.loc.gov/books/';
        const PER_PAGE = 25;
        let currentPage = 1;
        let currentQuery = '';
        let paginationData = null;

        const queryInput = document.getElementById('loc-query');
        const btnSearch = document.getElementById('btn-search');
        const resultsSection = document.getElementById('results-section');
        const resultsGrid = document.getElementById('loc-results');
        const loadingEl = document.getElementById('loading');
        const emptyEl = document.getElementById('empty-state');
        const emptyText = document.getElementById('empty-text');
        const paginationBar = document.getElementById('pagination-bar');

        const showLoading = () => { loadingEl.style.display = ''; resultsSection.style.display = 'none'; emptyEl.style.display = 'none'; };
        const hideLoading = () => { loadingEl.style.display = 'none'; };

        const searchLOC = (query, page) => {
            if (!query.trim()) return;
            currentQuery = query.trim();
            currentPage = page || 1;
            showLoading();

            axios.get(LOC_API, {
                params: { q: currentQuery, fo: 'json', c: PER_PAGE, sp: currentPage }
            }).then((response) => {
                hideLoading();
                const data = response.data;
                const results = data.results || [];
                paginationData = data.pagination || null;

                if (results.length === 0) {
                    emptyEl.style.display = '';
                    emptyText.textContent = `No books found for "${currentQuery}". Try a different search term.`;
                    resultsSection.style.display = 'none';
                    return;
                }

                resultsSection.style.display = '';
                document.getElementById('results-heading').textContent = `Results for "${currentQuery}"`;
                document.getElementById('results-count').textContent = (paginationData ? `${paginationData.of.toLocaleString()} total` : '');

                renderResults(results);
                renderPagination();
            }).catch((err) => {
                hideLoading();
                emptyEl.style.display = '';
                if (err.response && err.response.status === 429) {
                    emptyText.textContent = 'Rate limited by LOC. Please wait a moment and try again.';
                } else {
                    emptyText.textContent = 'Error connecting to LOC API. Please check your connection.';
                }
                console.error('LOC API error:', err);
            });
        };

        const renderResults = (results) => {
            let html = '';
            results.forEach((r) => {
                const title = (r.item && r.item.title) || r.title || 'Untitled';
                const authors = (r.item && r.item.contributors) || [];
                const authorStr = authors.length > 0 ? authors[0].replace(/\.$/, '') : (r.contributor && r.contributor.length > 0 ? r.contributor[0] : 'Unknown');
                const date = (r.item && r.item.date) || r.date || '';
                const callNums = (r.item && r.item.call_number) || [];
                const callNumber = callNums.length > 0 ? callNums[0] : '';
                const subjects = (r.item && r.item.subjects) || [];
                const published = (r.item && r.item.created_published) || [];
                const publisherStr = published.length > 0 ? published[0] : '';
                let locUrl = r.url || r.id || '';
                if (locUrl && !locUrl.startsWith('http')) locUrl = `https://www.loc.gov${locUrl.startsWith('/') ? '' : '/'}${locUrl}`;

                html += '<div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden relative">';
                html += '<div class="flex flex-col min-h-[220px] p-5">';
                html += `<div class="text-[15px] font-bold text-primary-800 dark:text-slate-200 mb-2 leading-snug line-clamp-2" title="${title.replace(/"/g, '&quot;')}">${escHtml(title)}</div>`;
                html += `<div class="text-xs text-slate-500 mb-1 flex items-start gap-1.5"><span class="material-symbols-outlined text-sm mt-px shrink-0">person</span> ${escHtml(authorStr)}</div>`;
                if (date && date !== '||||') html += `<div class="text-xs text-slate-500 mb-1 flex items-start gap-1.5"><span class="material-symbols-outlined text-sm mt-px shrink-0">calendar_today</span> ${escHtml(date)}</div>`;
                if (publisherStr) html += `<div class="text-xs text-slate-500 mb-1 flex items-start gap-1.5"><span class="material-symbols-outlined text-sm mt-px shrink-0">business</span> ${escHtml(truncate(publisherStr, 60))}</div>`;
                if (callNumber) html += `<div class="text-xs text-slate-500 mb-1 flex items-start gap-1.5"><span class="material-symbols-outlined text-sm mt-px shrink-0">qr_code</span> <span class="inline-flex items-center gap-1 bg-primary-50 dark:bg-primary-900/20 text-primary dark:text-blue-400 px-2.5 py-0.5 rounded-md text-[11px] font-bold font-mono">${escHtml(callNumber)}</span></div>`;

                if (subjects.length > 0) {
                    html += '<div class="flex flex-wrap gap-1 mt-2">';
                    subjects.slice(0, 3).forEach((s) => {
                        html += `<span class="text-[10px] px-2 py-0.5 bg-sky-100 dark:bg-sky-900/30 text-sky-700 dark:text-sky-300 rounded-full font-medium">${escHtml(truncate(s.split('--')[0], 25))}</span>`;
                    });
                    if (subjects.length > 3) html += `<span class="text-[10px] px-2 py-0.5 bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 rounded-full font-medium">+${subjects.length - 3}</span>`;
                    html += '</div>';
                }

                html += '<div class="mt-auto pt-3 border-t border-slate-200 dark:border-slate-700 flex justify-between items-center">';
                if (locUrl) html += `<a href="${locUrl}" target="_blank" class="text-slate-400 hover:text-primary text-xs no-underline inline-flex items-center gap-1 transition-colors"><span class="material-symbols-outlined text-sm">open_in_new</span>LOC</a>`;
                else html += '<span></span>';
                html += `<button class="bg-gradient-to-br from-green-500 to-emerald-500 text-white border-none px-3.5 py-1.5 rounded-md text-xs font-semibold cursor-pointer inline-flex items-center gap-1 transition-opacity hover:opacity-85 disabled:opacity-50 disabled:cursor-not-allowed" onclick="importBook(this)" data-title="${escAttr(title)}" data-author="${escAttr(authorStr)}" data-year="${escAttr(date)}" data-call="${escAttr(callNumber)}" data-publisher="${escAttr(publisherStr)}" data-subject="${escAttr(subjects.length > 0 ? subjects[0].split('--')[0] : '')}"><span class="material-symbols-outlined text-sm">download</span> Import</button>`;
                html += '</div></div></div>';
            });
            resultsGrid.innerHTML = html;
        };

        const renderPagination = () => {
            if (!paginationData || !paginationData.total || paginationData.total <= 1) {
                paginationBar.style.display = 'none';
                return;
            }
            paginationBar.style.display = '';
            document.getElementById('page-info').textContent = `Page ${paginationData.current} of ${paginationData.total}`;
            document.getElementById('btn-prev').disabled = !paginationData.previous;
            document.getElementById('btn-next').disabled = !paginationData.next;
        };

        const importBook = (btn) => {
            const title = btn.dataset.title;
            const author = btn.dataset.author;
            const year = parseInt(btn.dataset.year) || 0;
            const callNumber = btn.dataset.call;
            const publisherRaw = btn.dataset.publisher;
            const subjectRaw = btn.dataset.subject;

            // Duplicate check
            const existing = Store.getAll('books');
            const dup = existing.find((b) => b.title.toLowerCase() === title.toLowerCase());
            if (dup) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Book Already Exists',
                    text: `"${title}" is already in your local catalog.`,
                    confirmButtonColor: '#e94560'
                });
                return;
            }

            // Auto-create author
            let authorId = '';
            if (author && author !== 'Unknown') {
                const authors = Store.getAll('authors');
                const found = authors.find((a) => a.name.toLowerCase() === author.toLowerCase());
                if (found) { authorId = found.id; }
                else {
                    Store.create('authors', { name: author, bio: 'Imported from LOC' });
                    const all = Store.getAll('authors');
                    authorId = all[all.length - 1].id;
                }
            }

            // Auto-create publisher (parse from "City : Publisher, year")
            let pubName = '';
            if (publisherRaw) {
                const parts = publisherRaw.split(':');
                pubName = parts.length > 1 ? parts[1].replace(/,.*$/, '').trim() : publisherRaw.replace(/,.*$/, '').replace(/[\[\]]/g, '').trim();
            }
            let pubId = '';
            if (pubName) {
                const pubs = Store.getAll('publishers');
                const foundPub = pubs.find((p) => p.name.toLowerCase() === pubName.toLowerCase());
                if (foundPub) { pubId = foundPub.id; }
                else {
                    Store.create('publishers', { name: pubName, address: '', contact: '' });
                    const allPubs = Store.getAll('publishers');
                    pubId = allPubs[allPubs.length - 1].id;
                }
            }

            // Auto-create category
            let catId = '';
            if (subjectRaw) {
                const cats = Store.getAll('categories');
                const foundCat = cats.find((c) => c.name.toLowerCase() === subjectRaw.toLowerCase());
                if (foundCat) { catId = foundCat.id; }
                else {
                    Store.create('categories', { name: subjectRaw, description: 'Imported from LOC', parent_id: null });
                    const allCats = Store.getAll('categories');
                    catId = allCats[allCats.length - 1].id;
                }
            }

            Store.create('books', {
                title,
                isbn: `LOC-${Date.now()}`,
                author_id: authorId,
                publisher_id: pubId,
                category_id: catId,
                call_number: callNumber,
                year,
                copies: 1,
                available: 1,
                status: 'active'
            });

            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined text-sm">check</span> Imported';

            Swal.fire({
                icon: 'success',
                title: 'Book Imported!',
                text: `"${truncate(title, 50)}" has been added to your local catalog.`,
                timer: 2500,
                showConfirmButton: false,
                toast: true,
                position: 'top-end'
            });
        };

        const escHtml = (str) => { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; };
        const escAttr = (str) => str.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        const truncate = (str, max) => str.length > max ? `${str.substring(0, max)}\u2026` : str;

        // Event bindings
        btnSearch.addEventListener('click', () => { searchLOC(queryInput.value, 1); });
        queryInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') searchLOC(queryInput.value, 1); });
        document.getElementById('btn-prev').addEventListener('click', () => { if (paginationData && paginationData.previous) searchLOC(currentQuery, currentPage - 1); });
        document.getElementById('btn-next').addEventListener('click', () => { if (paginationData && paginationData.next) searchLOC(currentQuery, currentPage + 1); });

        // Show initial empty state
        emptyEl.style.display = '';
    </script>
</body>
</html>
