<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { DEFAULT: '#3211d4', 50: '#eef0ff', 700: '#3211d4', 800: '#2e14a8', 900: '#281689' }, accent: '#e94560', 'bg-light': '#f6f6f8', 'bg-dark': '#131022' } } }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">
  <div class="flex min-h-screen">
    <header id="top-header"></header>
    <nav id="sidebar-nav"></nav>

    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
      <div id="alert-container"></div>

      <!-- Page Header -->
      <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-3">
          <span class="material-symbols-outlined text-3xl text-primary">sell</span>
          <h1 class="text-2xl font-black tracking-tight">Categories</h1>
        </div>
        <button id="btn-add" class="inline-flex items-center gap-2 bg-primary text-white hover:bg-primary-800 px-4 py-2.5 rounded-lg text-sm font-semibold transition-colors">
          <span class="material-symbols-outlined text-[18px]">add_circle</span>
          Add Category
        </button>
      </div>

      <!-- Table Card -->
      <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left">
            <thead class="bg-slate-50 dark:bg-slate-800/50">
              <tr>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">#</th>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">Name</th>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">Description</th>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">Parent</th>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">Books</th>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">Actions</th>
              </tr>
            </thead>
            <tbody id="data-table" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay fixed inset-0 bg-black/50 z-[2000] items-center justify-center" id="modal-form">
    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl animate-modal-in w-full max-w-lg mx-4">
      <!-- Modal Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800">
        <h3 id="modal-title" class="text-lg font-bold">Add Category</h3>
        <button class="modal-close text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="px-6 py-5 space-y-4">
        <input type="hidden" id="edit-id">

        <div>
          <label class="block text-sm font-semibold mb-1.5">Name</label>
          <input id="f-name" type="text" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors">
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1.5">Description</label>
          <textarea id="f-desc" rows="3" class="w-full px-3.5 py-2.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors resize-none"></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold mb-1.5">Parent Category</label>
          <select id="f-parent" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors">
            <option value="">None (Top Level)</option>
          </select>
        </div>
      </div>

      <!-- Modal Footer -->
      <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-slate-200 dark:border-slate-800">
        <button class="modal-close px-4 py-2.5 text-sm font-semibold rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
          Cancel
        </button>
        <button id="btn-save" class="inline-flex items-center gap-2 bg-primary text-white hover:bg-primary-800 px-4 py-2.5 rounded-lg text-sm font-semibold transition-colors">
          <span class="material-symbols-outlined text-[18px]">save</span>
          Save
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) { window.location.href = '/pages/auth/login.html'; return; }
    App.init(); App.bindModalCloses();

    const loadParents = () => {
      const cats = Store.getAll('categories');
      const sel = document.getElementById('f-parent');
      sel.innerHTML = '<option value="">None (Top Level)</option>';
      cats.forEach((c) => {
        sel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
      });
    };

    const load = () => {
      const items = Store.getAll('categories'), books = Store.getAll('books');
      const tbody = document.getElementById('data-table');

      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="px-5 py-10 text-center text-slate-400 dark:text-slate-500">No categories found.</td></tr>';
        return;
      }

      tbody.innerHTML = items.map((c, i) => {
        const parent = c.parent_id ? App.getCategoryName(c.parent_id) : '<span class="text-slate-400">\u2014</span>';
        const cnt = books.filter((b) => b.category_id === c.id).length;
        return `<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors"><td class="px-5 py-3 text-slate-500">${i + 1}</td><td class="px-5 py-3 font-semibold">${c.name}</td><td class="px-5 py-3 text-slate-500 dark:text-slate-400">${c.description || '<span class="text-slate-400">\u2014</span>'}</td><td class="px-5 py-3">${parent}</td><td class="px-5 py-3"><span class="inline-block px-2.5 py-1 rounded-full text-[11px] font-semibold bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300">${cnt}</span></td><td class="px-5 py-3"><div class="flex items-center gap-1"><button class="btn-edit inline-flex items-center justify-center w-8 h-8 rounded-lg text-primary hover:bg-primary-50 dark:hover:bg-primary/10 transition-colors" data-id="${c.id}" title="Edit"><span class="material-symbols-outlined text-[18px]">edit</span></button> <button class="btn-del inline-flex items-center justify-center w-8 h-8 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors" data-id="${c.id}" data-name="${c.name}" title="Delete"><span class="material-symbols-outlined text-[18px]">delete</span></button></div></td></tr>`;
      }).join('');

      bind();
    };

    const bind = () => {
      document.querySelectorAll('.btn-edit').forEach((b) => {
        b.addEventListener('click', function() {
          const c = Store.getById('categories', this.dataset.id);
          if (!c) return;
          loadParents();
          document.getElementById('modal-title').textContent = 'Edit Category';
          document.getElementById('edit-id').value = c.id;
          document.getElementById('f-name').value = c.name;
          document.getElementById('f-desc').value = c.description || '';
          document.getElementById('f-parent').value = c.parent_id || '';
          App.openModal('modal-form');
        });
      });

      document.querySelectorAll('.btn-del').forEach((b) => {
        b.addEventListener('click', function() {
          const id = this.dataset.id, name = this.dataset.name;
          App.confirmDelete(name).then((r) => {
            if (r.isConfirmed) {
              Store.remove('categories', id);
              App.showAlert('success', 'Category deleted.');
              load();
            }
          });
        });
      });
    };

    document.getElementById('btn-add').addEventListener('click', () => {
      loadParents();
      document.getElementById('modal-title').textContent = 'Add Category';
      document.getElementById('edit-id').value = '';
      document.getElementById('f-name').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('f-parent').value = '';
      App.openModal('modal-form');
    });

    document.getElementById('btn-save').addEventListener('click', () => {
      const name = document.getElementById('f-name').value.trim();
      if (!name) { App.showAlert('danger', 'Name required.'); return; }
      const data = {
        name,
        description: document.getElementById('f-desc').value.trim(),
        parent_id: document.getElementById('f-parent').value || null
      };
      const eid = document.getElementById('edit-id').value;
      const promise = eid ? Store.update('categories', eid, data) : Store.create('categories', data);
      promise.then(() => {
        App.showAlert('success', eid ? 'Category updated.' : 'Category added.');
        App.closeModal('modal-form');
        load();
      }).catch((err) => {
        Swal.fire({ icon: 'error', title: 'Not Allowed', text: err.message || 'Could not save.', confirmButtonColor: '#e94560' });
      });
    });

    load();
  </script>
</body>
</html>
