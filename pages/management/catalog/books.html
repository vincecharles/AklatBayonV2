<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Catalog - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3/dist/JsBarcode.all.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#3211d4', 50: '#ede9ff', 100: '#d9d0ff', 200: '#b3a1ff', 300: '#8d72ff', 400: '#6744ff', 500: '#3211d4', 600: '#280db0', 700: '#1e0a8c', 800: '#140668', 900: '#0a0344' },
            accent: '#e94560',
            'bg-light': '#f6f6f8',
            'bg-dark': '#131022'
          }
        }
      }
    }
  </script>
  <style>
    /* LCC lookup spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .lcc-spinner { width: 24px; height: 24px; border: 3px solid #e2e8f0; border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; display: block; }
    .dark .lcc-spinner { border-color: #334155; border-top-color: #e94560; }
  </style>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">
  <div class="flex min-h-screen">
    <header id="top-header"></header>
    <nav id="sidebar-nav"></nav>
    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
      <div id="alert-container"></div>

      <!-- Page Header -->
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <h1 class="text-2xl font-bold flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">menu_book</span>Book Catalog
        </h1>
        <button id="btn-add" style="display:none" class="inline-flex items-center gap-1.5 px-5 py-2.5 text-sm font-semibold rounded-lg bg-primary text-white hover:bg-primary-800 transition-colors shadow-sm">
          <span class="material-symbols-outlined text-base">add_circle</span> Add Book
        </button>
      </div>

      <!-- Filter Bar -->
      <div class="flex flex-wrap items-center gap-3 mb-5">
        <div class="relative w-full sm:w-64">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
          <input type="text" id="search-input" placeholder="Search books..." class="w-full h-11 pl-10 pr-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <select id="filter-cat" class="h-11 max-w-[180px] px-3 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          <option value="">All Categories</option>
        </select>
        <select id="filter-author" class="h-11 max-w-[180px] px-3 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          <option value="">All Authors</option>
        </select>
        <select id="filter-pub" class="h-11 max-w-[180px] px-3 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          <option value="">All Publishers</option>
        </select>
        <select id="filter-avail" class="h-11 max-w-[150px] px-3 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          <option value="">All</option>
          <option value="available">Available</option>
          <option value="unavailable">Unavailable</option>
        </select>
        <select id="filter-sort" class="h-11 max-w-[160px] px-3 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          <option value="">Default</option>
          <option value="title-az">Title A-Z</option>
          <option value="title-za">Title Z-A</option>
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
        </select>
      </div>

      <!-- Table Card -->
      <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left">
            <thead>
              <tr class="border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/60">
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">#</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Title</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Author</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Publisher</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Category</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">ISBN</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Call #</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Year</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Copies</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Available</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Actions</th>
              </tr>
            </thead>
            <tbody id="data-table" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- Add / Edit Book Modal -->
  <div id="modal-form" class="modal-overlay fixed inset-0 bg-black/50 z-[2000] items-center justify-center">
    <div class="bg-white dark:bg-slate-900 rounded-2xl w-[95%] max-w-[640px] max-h-[90vh] overflow-y-auto shadow-2xl animate-modal-in">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800">
        <h3 id="modal-title" class="text-lg font-bold">Add Book</h3>
        <button class="modal-close flex h-8 w-8 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
          <span class="material-symbols-outlined text-base">close</span>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <input type="hidden" id="edit-id">
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Title</label>
          <input type="text" id="f-title" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">ISBN</label>
          <input type="text" id="f-isbn" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Author</label>
          <select id="f-author" class="w-full h-11 px-3 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"></select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Publisher</label>
          <select id="f-publisher" class="w-full h-11 px-3 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"></select>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Category</label>
          <select id="f-category" class="w-full h-11 px-3 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary"></select>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Year</label>
            <input type="number" id="f-year" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Copies</label>
            <input type="number" id="f-copies" min="0" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Available</label>
            <input type="number" id="f-available" min="0" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
        </div>
        <div class="flex gap-2 items-end">
          <div class="flex-1">
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">LCC Call Number</label>
            <input type="text" id="f-callnumber" placeholder="e.g. QA76.76.D47" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          </div>
          <button type="button" id="btn-lcc-lookup" class="inline-flex items-center gap-1.5 h-11 px-4 text-xs font-semibold rounded-lg border border-primary text-primary hover:bg-primary hover:text-white dark:border-primary-400 dark:text-primary-300 dark:hover:bg-primary dark:hover:text-white transition-colors whitespace-nowrap">
            <span class="material-symbols-outlined text-base">search</span>Assign LCC
          </button>
        </div>
      </div>
      <div class="flex justify-end gap-2 px-6 py-4 border-t border-slate-200 dark:border-slate-800">
        <button class="modal-close px-4 py-2.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Cancel</button>
        <button id="btn-save" class="inline-flex items-center gap-1.5 px-5 py-2.5 text-sm font-semibold rounded-lg bg-emerald-600 text-white hover:bg-emerald-700 transition-colors">
          <span class="material-symbols-outlined text-base">save</span> Save
        </button>
      </div>
    </div>
  </div>

  <!-- LCC Lookup Modal -->
  <div id="modal-lcc" class="modal-overlay fixed inset-0 bg-black/50 z-[2000] items-center justify-center">
    <div class="bg-white dark:bg-slate-900 rounded-2xl w-[95%] max-w-[520px] max-h-[90vh] overflow-y-auto shadow-2xl animate-modal-in">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800">
        <h3 class="text-lg font-bold">Assign LCC Call Number</h3>
        <button class="modal-close flex h-8 w-8 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
          <span class="material-symbols-outlined text-base">close</span>
        </button>
      </div>
      <div class="p-6">
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Search LOC by title or keyword</label>
        <div class="flex gap-2 mb-4">
          <input type="text" id="lcc-search-input" placeholder="Enter book title..." class="flex-1 h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
          <button id="btn-lcc-search" class="flex items-center justify-center h-11 w-11 rounded-lg bg-primary text-white hover:bg-primary-800 transition-colors shrink-0">
            <span class="material-symbols-outlined text-lg">search</span>
          </button>
        </div>
        <div id="lcc-loading" style="display:none"><div class="lcc-spinner"></div></div>
        <div id="lcc-results" class="max-h-[350px] overflow-y-auto"></div>
        <div id="lcc-empty" class="text-center text-slate-400 text-sm py-4" style="display:none">No results. Try a different search term.</div>
      </div>
    </div>
  </div>

  <!-- Barcode Modal -->
  <div id="modal-barcode" class="modal-overlay fixed inset-0 bg-black/50 z-[2000] items-center justify-center">
    <div class="bg-white dark:bg-slate-900 rounded-2xl w-[95%] max-w-[420px] shadow-2xl animate-modal-in">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800">
        <h3 class="text-lg font-bold">Book Barcode</h3>
        <button class="modal-close flex h-8 w-8 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
          <span class="material-symbols-outlined text-base">close</span>
        </button>
      </div>
      <div class="p-6 text-center">
        <div id="barcode-book-title" class="font-bold text-base text-slate-900 dark:text-slate-100 mb-1"></div>
        <div id="barcode-book-isbn" class="text-xs text-slate-400 mb-4"></div>
        <svg id="barcode-svg"></svg>
        <div class="mt-4">
          <button id="btn-print-barcode" class="inline-flex items-center gap-1.5 px-5 py-2.5 text-sm font-semibold rounded-lg bg-primary text-white hover:bg-primary-800 transition-colors">
            <span class="material-symbols-outlined text-base">print</span> Print Label
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) { window.location.href = '/pages/auth/login.html'; return; }
    App.init(); App.bindModalCloses();
    if (Auth.hasPermission('can_add_books')) document.getElementById('btn-add').style.display='';
    const authors = Store.getAll('authors'), publishers = Store.getAll('publishers'), categories = Store.getAll('categories');
    const asel=document.getElementById('f-author'), psel=document.getElementById('f-publisher'), csel=document.getElementById('f-category'), fcat=document.getElementById('filter-cat');
    const fAuthor=document.getElementById('filter-author'), fPub=document.getElementById('filter-pub');
    authors.forEach((a) => {asel.innerHTML+=`<option value="${a.id}">${a.name}</option>`; fAuthor.innerHTML+=`<option value="${a.id}">${a.name}</option>`;});
    publishers.forEach((p) => {psel.innerHTML+=`<option value="${p.id}">${p.name}</option>`; fPub.innerHTML+=`<option value="${p.id}">${p.name}</option>`;});
    categories.forEach((c) => {csel.innerHTML+=`<option value="${c.id}">${c.name}</option>`; fcat.innerHTML+=`<option value="${c.id}">${c.name}</option>`;});
    const load = () => {
        let items = Store.getAll('books');
        const s = document.getElementById('search-input').value.toLowerCase(), cf = document.getElementById('filter-cat').value;
        const af = document.getElementById('filter-author').value, pf = document.getElementById('filter-pub').value;
        const avf = document.getElementById('filter-avail').value, sf = document.getElementById('filter-sort').value;
        if (s) items = items.filter((i) => i.title.toLowerCase().includes(s) || i.isbn.toLowerCase().includes(s));
        if (cf) items = items.filter((i) => i.category_id === cf);
        if (af) items = items.filter((i) => i.author_id === af);
        if (pf) items = items.filter((i) => i.publisher_id === pf);
        if (avf === 'available') items = items.filter((i) => i.available > 0);
        if (avf === 'unavailable') items = items.filter((i) => i.available === 0);
        switch (sf) {
            case 'title-az': items.sort((a, b) => a.title.localeCompare(b.title)); break;
            case 'title-za': items.sort((a, b) => b.title.localeCompare(a.title)); break;
            case 'newest': items.sort((a, b) => b.year - a.year); break;
            case 'oldest': items.sort((a, b) => a.year - b.year); break;
        }
        const tbody = document.getElementById('data-table');
        if (!items.length) { tbody.innerHTML='<tr><td colspan="11" class="px-5 py-10 text-center text-slate-400">No books found.</td></tr>'; return; }
        const canEdit = Auth.hasPermission('can_edit_books'), canDel = Auth.hasPermission('can_delete_books');
        tbody.innerHTML = items.map((b,i) => {
            let acts = '<div class="flex items-center gap-1">';
            if (canEdit) acts += `<button class="btn-edit flex h-8 w-8 items-center justify-center rounded-lg text-primary hover:bg-primary-50 dark:hover:bg-slate-800 transition-colors" data-id="${b.id}" title="Edit"><span class="material-symbols-outlined text-[19px]">edit</span></button>`;
            if (canDel) acts += `<button class="btn-del flex h-8 w-8 items-center justify-center rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors" data-id="${b.id}" data-name="${b.title.replace(/"/g,'&quot;')}" title="Delete"><span class="material-symbols-outlined text-[19px]">delete</span></button>`;
            acts += `<button class="btn-barcode flex h-8 w-8 items-center justify-center rounded-lg text-primary hover:bg-primary-50 dark:hover:bg-slate-800 transition-colors" data-id="${b.id}" data-title="${b.title.replace(/"/g,'&quot;')}" data-isbn="${b.isbn}" title="Barcode"><span class="material-symbols-outlined text-[19px]">barcode</span></button>`;
            acts += '</div>';
            if (!canEdit && !canDel) acts = '<span class="text-slate-400 text-xs">View only</span>';
            const cn = b.call_number || '';
            return `<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors"><td class="px-5 py-3 text-slate-500">${i+1}</td><td class="px-5 py-3 font-semibold">${b.title}</td><td class="px-5 py-3 text-slate-600 dark:text-slate-400">${App.getAuthorName(b.author_id)}</td><td class="px-5 py-3 text-slate-600 dark:text-slate-400">${App.getPublisherName(b.publisher_id)}</td><td class="px-5 py-3"><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-sky-100 text-sky-700 dark:bg-sky-900/40 dark:text-sky-300">${App.getCategoryName(b.category_id)}</span></td><td class="px-5 py-3"><code class="text-xs bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded font-mono text-slate-700 dark:text-slate-300">${b.isbn}</code></td><td class="px-5 py-3">${cn ? `<code class="text-[11px] bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded font-mono text-slate-700 dark:text-slate-300">${cn}</code>` : '<span class="text-slate-400 text-sm">\u2014</span>'}</td><td class="px-5 py-3">${b.year}</td><td class="px-5 py-3">${b.copies}</td><td class="px-5 py-3"><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${b.available>0 ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300' : 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300'}">${b.available}</span></td><td class="px-5 py-3">${acts}</td></tr>`;
        }).join('');
        bindActions();
    };
    const bindActions = () => {
        document.querySelectorAll('.btn-edit').forEach((btn) => {btn.addEventListener('click', () => {
            const b=Store.getById('books',btn.dataset.id); if(!b) return;
            document.getElementById('modal-title').textContent='Edit Book'; document.getElementById('edit-id').value=b.id;
            document.getElementById('f-title').value=b.title; document.getElementById('f-isbn').value=b.isbn;
            document.getElementById('f-author').value=b.author_id; document.getElementById('f-publisher').value=b.publisher_id;
            document.getElementById('f-category').value=b.category_id; document.getElementById('f-year').value=b.year;
            document.getElementById('f-copies').value=b.copies; document.getElementById('f-available').value=b.available;
            document.getElementById('f-callnumber').value=b.call_number||'';
            App.openModal('modal-form');
        });});
        document.querySelectorAll('.btn-del').forEach((btn) => {btn.addEventListener('click', () => {
            const id=btn.dataset.id,name=btn.dataset.name;
            App.confirmDelete(name).then((r) => {if(r.isConfirmed){Store.remove('books',id);App.showAlert('success','Book deleted.');load();}});
        });});
        document.querySelectorAll('.btn-barcode').forEach((btn) => {
            btn.addEventListener('click', () => {
                const title = btn.dataset.title;
                const isbn = btn.dataset.isbn;
                document.getElementById('barcode-book-title').textContent = title;
                document.getElementById('barcode-book-isbn').textContent = isbn;
                try {
                    JsBarcode('#barcode-svg', isbn.replace(/-/g, ''), {
                        format: 'CODE128',
                        width: 2,
                        height: 80,
                        displayValue: true,
                        fontSize: 14,
                        margin: 10
                    });
                } catch(e) {
                    JsBarcode('#barcode-svg', isbn, { format: 'CODE128', width: 2, height: 80, displayValue: true });
                }
                App.openModal('modal-barcode');
            });
        });
    };
    document.getElementById('btn-add').addEventListener('click', () => {
        document.getElementById('modal-title').textContent='Add Book'; document.getElementById('edit-id').value='';
        ['f-title','f-isbn','f-year','f-copies','f-available','f-callnumber'].forEach((id) => {document.getElementById(id).value='';});
        App.openModal('modal-form');
    });
    document.getElementById('btn-save').addEventListener('click', () => {
        const title=document.getElementById('f-title').value.trim(), isbn=document.getElementById('f-isbn').value.trim(),
            authorId=document.getElementById('f-author').value, pubId=document.getElementById('f-publisher').value,
            catId=document.getElementById('f-category').value, year=parseInt(document.getElementById('f-year').value)||0,
            copies=parseInt(document.getElementById('f-copies').value)||0, avail=parseInt(document.getElementById('f-available').value)||0,
            callNum=document.getElementById('f-callnumber').value.trim();
        if(!title||!isbn){App.showAlert('danger','Title and ISBN required.');return;}
        const data={title,isbn,author_id:authorId,publisher_id:pubId,category_id:catId,call_number:callNum,year,copies,available:avail,status:'active'};
        const eid=document.getElementById('edit-id').value;
        const promise = eid ? Store.update('books',eid,data) : Store.create('books',data);
        promise.then(() => {
            App.showAlert('success', eid ? 'Book updated.' : 'Book added.');
            App.closeModal('modal-form'); load();
        }).catch((err) => {
            Swal.fire({icon:'error',title:'Not Allowed',text:err.message||'Could not save book.',confirmButtonColor:'#e94560'});
        });
    });
    document.getElementById('search-input').addEventListener('input',load);
    document.getElementById('filter-cat').addEventListener('change',load);
    document.getElementById('filter-author').addEventListener('change',load);
    document.getElementById('filter-pub').addEventListener('change',load);
    document.getElementById('filter-avail').addEventListener('change',load);
    document.getElementById('filter-sort').addEventListener('change',load);

    document.getElementById('btn-print-barcode').addEventListener('click', () => {
        const svg = document.getElementById('barcode-svg');
        const title = document.getElementById('barcode-book-title').textContent;
        const isbn = document.getElementById('barcode-book-isbn').textContent;
        const svgData = new XMLSerializer().serializeToString(svg);
        const w = window.open('', '_blank', 'width=500,height=400');
        w.document.write(`<html><head><title>Barcode - ${title}</title><style>body{font-family:Inter,sans-serif;text-align:center;padding:40px}h3{margin:0 0 4px;font-size:16px}p{margin:0 0 16px;color:#666;font-size:12px}.label{border:2px dashed #ccc;padding:20px;display:inline-block;border-radius:8px}@media print{.no-print{display:none}.label{border:none}}</style></head><body>`);
        w.document.write(`<div class="label"><h3>${title}</h3><p>${isbn}</p>${svgData}</div>`);
        w.document.write('<br><button class="no-print" onclick="window.print()" style="margin-top:20px;padding:10px 24px;font-size:14px;cursor:pointer;border:none;background:#3211d4;color:#fff;border-radius:6px">Print</button>');
        w.document.write('</body></html>');
        w.document.close();
    });

    // LCC Lookup Modal
    document.getElementById('btn-lcc-lookup').addEventListener('click', () => {
        const title = document.getElementById('f-title').value.trim();
        document.getElementById('lcc-search-input').value = title;
        document.getElementById('lcc-results').innerHTML = '';
        document.getElementById('lcc-empty').style.display = 'none';
        App.openModal('modal-lcc');
        if (title) lccSearch(title);
    });
    document.getElementById('btn-lcc-search').addEventListener('click', () => {
        lccSearch(document.getElementById('lcc-search-input').value.trim());
    });
    document.getElementById('lcc-search-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') lccSearch(e.target.value.trim());
    });

    const lccSearch = (query) => {
        if (!query) return;
        const loading = document.getElementById('lcc-loading');
        const results = document.getElementById('lcc-results');
        const empty = document.getElementById('lcc-empty');
        loading.style.display = ''; results.innerHTML = ''; empty.style.display = 'none';

        axios.get('https://www.loc.gov/books/', { params: { q: query, fo: 'json', c: 10, sp: 1 } })
        .then((resp) => {
            loading.style.display = 'none';
            const items = resp.data.results || [];
            const withCall = items.filter((r) => r.item && r.item.call_number && r.item.call_number.length > 0);
            if (!withCall.length) { empty.style.display = ''; return; }
            results.innerHTML = withCall.map((r) => {
                const t = (r.item && r.item.title) || r.title || 'Untitled';
                const cn = r.item.call_number[0];
                return `<div class="lcc-row flex items-center justify-between px-3 py-2.5 border-b border-slate-100 dark:border-slate-800 last:border-0 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/60 transition-colors" data-call="${cn.replace(/"/g,'&quot;')}"><span class="text-[13px] font-semibold text-slate-700 dark:text-slate-200 max-w-[280px] truncate" title="${t.replace(/"/g,'&quot;')}">${t}</span><span class="bg-primary-50 dark:bg-primary-900/30 text-primary dark:text-primary-300 px-2.5 py-0.5 rounded-md text-[11px] font-bold font-mono whitespace-nowrap">${cn}</span></div>`;
            }).join('');
            results.querySelectorAll('.lcc-row').forEach((row) => {
                row.addEventListener('click', () => {
                    document.getElementById('f-callnumber').value = row.dataset.call;
                    App.closeModal('modal-lcc');
                    Swal.fire({ icon: 'success', title: 'Call Number Applied', text: row.dataset.call, timer: 1500, showConfirmButton: false, toast: true, position: 'top-end' });
                });
            });
        }).catch(() => {
            loading.style.display = 'none';
            empty.style.display = ''; empty.textContent = 'Error connecting to LOC API.';
        });
    };

    load();
  </script>
</body>
</html>
