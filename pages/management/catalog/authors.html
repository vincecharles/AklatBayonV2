<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authors - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#3211d4', 50: '#eef0ff', 700: '#3211d4', 800: '#2e14a8', 900: '#281689' },
            accent: '#e94560',
            'bg-light': '#f6f6f8',
            'bg-dark': '#131022',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">
  <div class="flex min-h-screen">
    <header id="top-header"></header>
    <nav id="sidebar-nav"></nav>
    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
      <div id="alert-container"></div>

      <!-- Page Header -->
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
        <h1 class="text-2xl font-bold flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">edit</span>Authors
        </h1>
        <button id="btn-add" class="inline-flex items-center gap-1.5 px-4 py-2.5 text-sm font-semibold rounded-lg bg-primary text-white hover:bg-primary-800 transition-colors shadow-sm">
          <span class="material-symbols-outlined text-base">add_circle</span> Add Author
        </button>
      </div>

      <!-- Search / Filter Bar -->
      <div class="mb-5">
        <div class="relative max-w-sm">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
          <input type="text" id="search-input" placeholder="Search authors..." class="w-full h-11 pl-10 pr-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
      </div>

      <!-- Table Card -->
      <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left">
            <thead>
              <tr class="border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/60">
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">#</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Name</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Bio</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Books</th>
                <th class="px-5 py-3 font-semibold text-slate-600 dark:text-slate-300">Actions</th>
              </tr>
            </thead>
            <tbody id="data-table" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- Modal -->
  <div id="modal-form" class="modal-overlay fixed inset-0 bg-black/50 z-[2000] items-center justify-center">
    <div class="bg-white dark:bg-slate-900 rounded-2xl w-[95%] max-w-[600px] max-h-[90vh] overflow-y-auto shadow-2xl animate-modal-in">
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800">
        <h3 id="modal-title" class="text-lg font-bold">Add Author</h3>
        <button class="modal-close flex h-8 w-8 items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
          <span class="material-symbols-outlined text-base">close</span>
        </button>
      </div>
      <div class="p-6">
        <input type="hidden" id="edit-id">
        <div class="mb-4">
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Name</label>
          <input type="text" id="f-name" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Bio</label>
          <textarea id="f-bio" rows="3" class="w-full px-3.5 py-2.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary resize-none"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-2 px-6 py-4 border-t border-slate-200 dark:border-slate-800">
        <button class="modal-close px-4 py-2 text-sm rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Cancel</button>
        <button id="btn-save" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm rounded-lg bg-primary text-white hover:bg-primary-800 transition-colors">
          <span class="material-symbols-outlined text-base">save</span> Save
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) throw '';
    App.init(); App.bindModalCloses();
    function load() {
        var items = Store.getAll('authors'), books = Store.getAll('books');
        var s = document.getElementById('search-input').value.toLowerCase();
        if (s) items = items.filter(function(i) { return i.name.toLowerCase().indexOf(s) !== -1; });
        var tbody = document.getElementById('data-table');
        if (!items.length) { tbody.innerHTML = '<tr><td colspan="5" class="px-5 py-10 text-center text-slate-400">No authors found.</td></tr>'; return; }
        tbody.innerHTML = items.map(function(a, i) {
            var bookCount = books.filter(function(b) { return b.author_id === a.id; }).length;
            return '<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">'
                + '<td class="px-5 py-3 text-slate-500">' + (i+1) + '</td>'
                + '<td class="px-5 py-3 font-semibold">' + a.name + '</td>'
                + '<td class="px-5 py-3 text-slate-500 max-w-xs truncate">' + (a.bio || '\u2014') + '</td>'
                + '<td class="px-5 py-3"><span class="inline-flex items-center px-2 py-0.5 text-xs font-semibold rounded-full bg-sky-100 text-sky-700 dark:bg-sky-900/40 dark:text-sky-300">' + bookCount + '</span></td>'
                + '<td class="px-5 py-3"><div class="flex items-center gap-1">'
                + '<button class="btn-edit flex h-8 w-8 items-center justify-center rounded-lg text-primary hover:bg-primary-50 dark:hover:bg-slate-800 transition-colors" data-id="' + a.id + '" title="Edit"><span class="material-symbols-outlined text-[19px]">edit</span></button>'
                + '<button class="btn-del flex h-8 w-8 items-center justify-center rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors" data-id="' + a.id + '" data-name="' + a.name + '" title="Delete"><span class="material-symbols-outlined text-[19px]">delete</span></button>'
                + '</div></td></tr>';
        }).join('');
        bind();
    }
    function bind() {
        document.querySelectorAll('.btn-edit').forEach(function(b) { b.addEventListener('click', function() {
            var a = Store.getById('authors', this.dataset.id); if (!a) return;
            document.getElementById('modal-title').textContent = 'Edit Author'; document.getElementById('edit-id').value = a.id;
            document.getElementById('f-name').value = a.name; document.getElementById('f-bio').value = a.bio || '';
            App.openModal('modal-form');
        }); });
        document.querySelectorAll('.btn-del').forEach(function(b) { b.addEventListener('click', function() {
            var id = this.dataset.id, name = this.dataset.name;
            App.confirmDelete(name).then(function(r) { if (r.isConfirmed) { Store.remove('authors', id); App.showAlert('success', 'Author deleted.'); load(); } });
        }); });
    }
    document.getElementById('btn-add').addEventListener('click', function() {
        document.getElementById('modal-title').textContent = 'Add Author'; document.getElementById('edit-id').value = '';
        document.getElementById('f-name').value = ''; document.getElementById('f-bio').value = '';
        App.openModal('modal-form');
    });
    document.getElementById('btn-save').addEventListener('click', function() {
        var name = document.getElementById('f-name').value.trim(), bio = document.getElementById('f-bio').value.trim();
        if (!name) { App.showAlert('danger', 'Name required.'); return; }
        var eid = document.getElementById('edit-id').value;
        var promise = eid ? Store.update('authors', eid, { name: name, bio: bio }) : Store.create('authors', { name: name, bio: bio });
        promise.then(function() {
            App.showAlert('success', eid ? 'Author updated.' : 'Author added.');
            App.closeModal('modal-form'); load();
        }).catch(function(err) {
            Swal.fire({icon:'error',title:'Not Allowed',text:err.message||'Could not save.',confirmButtonColor:'#e94560'});
        });
    });
    document.getElementById('search-input').addEventListener('input', load);
    load();
  </script>
</body>
</html>
