<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publishers - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#3211d4', 50: '#eef0ff', 700: '#3211d4', 800: '#2e14a8', 900: '#281689' },
            accent: '#e94560',
            'bg-light': '#f6f6f8',
            'bg-dark': '#131022',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">
  <div class="flex min-h-screen">
    <header id="top-header"></header>
    <nav id="sidebar-nav"></nav>
    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
      <div id="alert-container"></div>

      <!-- Page Header -->
      <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-200 dark:border-slate-800">
        <h1 class="text-2xl font-bold flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-3xl">apartment</span>
          Publishers
        </h1>
        <button id="btn-add" class="inline-flex items-center gap-1.5 px-4 py-2.5 bg-primary text-white text-sm font-semibold rounded-lg hover:bg-primary-800 transition-colors">
          <span class="material-symbols-outlined text-lg">add_circle</span>
          Add Publisher
        </button>
      </div>

      <!-- Filter Bar -->
      <div class="flex flex-wrap items-center gap-3 bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 mb-5">
        <div class="relative flex-1 min-w-[200px]">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
          <input type="text" id="search-input" placeholder="Search publishers..."
            class="w-full h-11 pl-10 pr-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
      </div>

      <!-- Table Card -->
      <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left">
            <thead class="bg-slate-50 dark:bg-slate-800/60 text-xs uppercase tracking-wider text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700">
              <tr>
                <th class="px-4 py-3 font-semibold">#</th>
                <th class="px-4 py-3 font-semibold">Name</th>
                <th class="px-4 py-3 font-semibold">Address</th>
                <th class="px-4 py-3 font-semibold">Contact</th>
                <th class="px-4 py-3 font-semibold">Books</th>
                <th class="px-4 py-3 font-semibold">Actions</th>
              </tr>
            </thead>
            <tbody id="data-table" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay fixed inset-0 bg-black/50 z-[2000] items-center justify-center" id="modal-form">
    <div class="bg-white dark:bg-slate-900 rounded-xl w-full max-w-md mx-4 shadow-2xl animate-modal-in">
      <!-- Modal Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
        <h3 id="modal-title" class="text-lg font-bold">Add Publisher</h3>
        <button class="modal-close text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
          <span class="material-symbols-outlined text-2xl">close</span>
        </button>
      </div>
      <!-- Modal Body -->
      <div class="px-6 py-5 space-y-4">
        <input type="hidden" id="edit-id">
        <div>
          <label class="block text-sm font-semibold mb-1.5">Name</label>
          <input id="f-name" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1.5">Address</label>
          <input id="f-address" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1.5">Contact</label>
          <input id="f-contact" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary">
        </div>
      </div>
      <!-- Modal Footer -->
      <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-slate-200 dark:border-slate-700">
        <button class="modal-close px-4 py-2.5 text-sm font-semibold rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Cancel</button>
        <button id="btn-save" class="inline-flex items-center gap-1.5 px-4 py-2.5 bg-primary text-white text-sm font-semibold rounded-lg hover:bg-primary-800 transition-colors">
          <span class="material-symbols-outlined text-lg">save</span>
          Save
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
      if (!Auth.requireAuth()) { window.location.href = '/pages/auth/login.html'; throw ''; }
      App.init(); App.bindModalCloses();
      const load = () => {
          let items = Store.getAll('publishers');
          const books = Store.getAll('books');
          const s = document.getElementById('search-input').value.toLowerCase();
          if (s) items = items.filter((i) => i.name.toLowerCase().includes(s));
          const tbody = document.getElementById('data-table');
          if (!items.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-slate-400 py-8">No publishers found.</td></tr>'; return; }
          tbody.innerHTML = items.map((p, i) => {
              const cnt = books.filter((b) => b.publisher_id === p.id).length;
              return `<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors"><td class="px-4 py-3 text-slate-500">${i+1}</td><td class="px-4 py-3 font-semibold">${p.name}</td><td class="px-4 py-3 text-slate-500 dark:text-slate-400">${p.address || '\u2014'}</td><td class="px-4 py-3 text-slate-500 dark:text-slate-400">${p.contact || '\u2014'}</td><td class="px-4 py-3"><span class="inline-block px-2.5 py-1 rounded-full text-[11px] font-semibold bg-sky-100 text-sky-700 dark:bg-sky-900/40 dark:text-sky-300">${cnt}</span></td><td class="px-4 py-3"><div class="flex items-center gap-1"><button class="btn-edit p-1.5 rounded-lg text-primary hover:bg-primary-50 dark:hover:bg-primary-900/30 transition-colors" data-id="${p.id}" title="Edit"><span class="material-symbols-outlined text-lg">edit</span></button> <button class="btn-del p-1.5 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors" data-id="${p.id}" data-name="${p.name}" title="Delete"><span class="material-symbols-outlined text-lg">delete</span></button></div></td></tr>`;
          }).join('');
          bind();
      };
      const bind = () => {
          document.querySelectorAll('.btn-edit').forEach((b) => { b.addEventListener('click', () => {
              const p = Store.getById('publishers', b.dataset.id); if (!p) return;
              document.getElementById('modal-title').textContent = 'Edit Publisher'; document.getElementById('edit-id').value = p.id;
              document.getElementById('f-name').value = p.name; document.getElementById('f-address').value = p.address || '';
              document.getElementById('f-contact').value = p.contact || ''; App.openModal('modal-form');
          }); });
          document.querySelectorAll('.btn-del').forEach((b) => { b.addEventListener('click', () => {
              const id = b.dataset.id, name = b.dataset.name;
              App.confirmDelete(name).then((r) => { if (r.isConfirmed) { Store.remove('publishers', id); App.showAlert('success', 'Publisher deleted.'); load(); } });
          }); });
      };
      document.getElementById('btn-add').addEventListener('click', () => {
          document.getElementById('modal-title').textContent = 'Add Publisher'; document.getElementById('edit-id').value = '';
          ['f-name', 'f-address', 'f-contact'].forEach((id) => { document.getElementById(id).value = ''; });
          App.openModal('modal-form');
      });
      document.getElementById('btn-save').addEventListener('click', () => {
          const name = document.getElementById('f-name').value.trim();
          if (!name) { App.showAlert('danger', 'Name required.'); return; }
          const data = { name, address: document.getElementById('f-address').value.trim(), contact: document.getElementById('f-contact').value.trim() };
          const eid = document.getElementById('edit-id').value;
          const promise = eid ? Store.update('publishers', eid, data) : Store.create('publishers', data);
          promise.then(() => {
              App.showAlert('success', eid ? 'Publisher updated.' : 'Publisher added.');
              App.closeModal('modal-form'); load();
          }).catch((err) => {
              Swal.fire({icon:'error',title:'Not Allowed',text:err.message||'Could not save.',confirmButtonColor:'#e94560'});
          });
      });
      document.getElementById('search-input').addEventListener('input', load);
      load();
  </script>
</body>
</html>
