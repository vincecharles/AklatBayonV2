<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { DEFAULT: '#3211d4', 50: '#eef0ff', 700: '#3211d4', 800: '#2e14a8', 900: '#281689' }, accent: '#e94560', 'bg-light': '#f6f6f8', 'bg-dark': '#131022' } } }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">
  <div class="flex min-h-screen">
    <header id="top-header"></header>
    <nav id="sidebar-nav"></nav>
    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
      <div id="alert-container"></div>

      <!-- Page Header -->
      <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-200 dark:border-slate-800">
        <div>
          <h1 class="text-2xl font-black tracking-tight flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">inventory_2</span>
            Inventory
          </h1>
          <p class="text-sm text-slate-500 mt-1">Track book stock levels and availability</p>
        </div>
      </div>

      <!-- Stat Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <!-- Total Titles -->
        <div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-2">
            <span class="material-symbols-outlined text-primary bg-primary/10 p-2 rounded-lg">menu_book</span>
          </div>
          <p class="text-sm text-slate-500">Total Titles</p>
          <p class="text-2xl font-bold" id="inv-titles">0</p>
        </div>
        <!-- Total Copies -->
        <div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-2">
            <span class="material-symbols-outlined text-emerald-600 bg-emerald-100 dark:bg-emerald-900/30 p-2 rounded-lg">content_copy</span>
          </div>
          <p class="text-sm text-slate-500">Total Copies</p>
          <p class="text-2xl font-bold" id="inv-copies">0</p>
        </div>
        <!-- Available -->
        <div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-2">
            <span class="material-symbols-outlined text-sky-600 bg-sky-100 dark:bg-sky-900/30 p-2 rounded-lg">check_circle</span>
          </div>
          <p class="text-sm text-slate-500">Available</p>
          <p class="text-2xl font-bold" id="inv-avail">0</p>
        </div>
        <!-- Checked Out -->
        <div class="bg-white dark:bg-slate-900 rounded-xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between mb-2">
            <span class="material-symbols-outlined text-amber-600 bg-amber-100 dark:bg-amber-900/30 p-2 rounded-lg">warning</span>
          </div>
          <p class="text-sm text-slate-500">Checked Out</p>
          <p class="text-2xl font-bold" id="inv-out">0</p>
        </div>
      </div>

      <!-- Inventory Table -->
      <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-lg">list</span>
          <h2 class="text-sm font-bold uppercase tracking-wider text-slate-700 dark:text-slate-300">Book Inventory</h2>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead>
              <tr class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-800">
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">Title</th>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">Author</th>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">Category</th>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">Total Copies</th>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">Available</th>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500">Checked Out</th>
                <th class="px-5 py-3 text-xs font-bold uppercase tracking-wider text-slate-500 min-w-[160px]">Availability</th>
              </tr>
            </thead>
            <tbody id="data-table" class="divide-y divide-slate-100 dark:divide-slate-800 text-sm"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) { window.location.href = '/pages/auth/login.html'; return; }
    App.init();
    const books = Store.getAll('books');
    let totalCopies = 0, totalAvail = 0;
    books.forEach((b) => { totalCopies += b.copies; totalAvail += b.available; });
    document.getElementById('inv-titles').textContent = books.length;
    document.getElementById('inv-copies').textContent = totalCopies;
    document.getElementById('inv-avail').textContent = totalAvail;
    document.getElementById('inv-out').textContent = totalCopies - totalAvail;
    const tbody = document.getElementById('data-table');
    if (!books.length) { tbody.innerHTML = '<tr><td colspan="7" class="px-5 py-8 text-center text-slate-400"><span class="material-symbols-outlined block mb-2 text-3xl opacity-30">inventory_2</span>No books in inventory.</td></tr>'; }
    else {
        tbody.innerHTML = books.map((b) => {
            const out = b.copies - b.available;
            const pct = b.copies > 0 ? Math.round((b.available / b.copies) * 100) : 0;
            const color = pct > 50 ? '#22c55e' : (pct > 0 ? '#eab308' : '#ef4444');
            return `<tr class="hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors"><td class="px-5 py-3 font-semibold">${b.title}</td><td class="px-5 py-3 text-slate-600 dark:text-slate-400">${App.getAuthorName(b.author_id)}</td><td class="px-5 py-3"><span class="inline-block px-2.5 py-1 rounded-full text-[11px] font-semibold bg-sky-100 text-sky-700 dark:bg-sky-900/30 dark:text-sky-400">${App.getCategoryName(b.category_id)}</span></td><td class="px-5 py-3">${b.copies}</td><td class="px-5 py-3">${b.available}</td><td class="px-5 py-3">${out}</td><td class="px-5 py-3"><div class="flex items-center gap-2"><div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2"><div class="rounded-full h-2" style="width:${pct}%;background:${color}"></div></div><span class="text-xs font-semibold whitespace-nowrap" style="color:${color}">${pct}%</span></div></td></tr>`;
        }).join('');
    }
  </script>
</body>
</html>
