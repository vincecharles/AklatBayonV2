<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { DEFAULT: '#3211d4', 50: '#eef0ff', 700: '#3211d4', 800: '#2e14a8', 900: '#281689' }, accent: '#e94560', 'bg-light': '#f6f6f8', 'bg-dark': '#131022' } } }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen antialiased">
  <div class="flex min-h-screen">
    <header id="top-header"></header>
    <nav id="sidebar-nav"></nav>
    <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
      <div id="alert-container"></div>

      <!-- Page Header -->
      <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-200 dark:border-slate-800">
        <div>
          <h1 class="text-2xl font-black tracking-tight flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">description</span>
            Reports
          </h1>
          <p class="text-sm text-slate-500 mt-1">Library statistics and analytics overview</p>
        </div>
      </div>

      <!-- Stat Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <!-- Total Books -->
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm p-5">
          <div class="flex items-center gap-4">
            <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-900 text-white">
              <span class="material-symbols-outlined text-2xl">menu_book</span>
            </div>
            <div>
              <div class="text-2xl font-black" id="r-books">0</div>
              <div class="text-xs text-slate-500 font-medium">Total Books</div>
            </div>
          </div>
        </div>
        <!-- Total Students -->
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm p-5">
          <div class="flex items-center gap-4">
            <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-emerald-600 text-white">
              <span class="material-symbols-outlined text-2xl">group</span>
            </div>
            <div>
              <div class="text-2xl font-black" id="r-students">0</div>
              <div class="text-xs text-slate-500 font-medium">Total Students</div>
            </div>
          </div>
        </div>
        <!-- Total Transactions -->
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm p-5">
          <div class="flex items-center gap-4">
            <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-amber-500 text-white">
              <span class="material-symbols-outlined text-2xl">swap_horiz</span>
            </div>
            <div>
              <div class="text-2xl font-black" id="r-txns">0</div>
              <div class="text-xs text-slate-500 font-medium">Total Transactions</div>
            </div>
          </div>
        </div>
        <!-- Pending Fines -->
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm p-5">
          <div class="flex items-center gap-4">
            <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-red-600 text-white">
              <span class="material-symbols-outlined text-2xl">payments</span>
            </div>
            <div>
              <div class="text-2xl font-black" id="r-fines">&#8369;0</div>
              <div class="text-xs text-slate-500 font-medium">Pending Fines</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Charts -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- Books by Category -->
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm p-6">
          <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">bar_chart</span>
            Books by Category
          </h3>
          <canvas id="chart-cat" height="250"></canvas>
        </div>
        <!-- Transaction Status -->
        <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm p-6">
          <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">pie_chart</span>
            Transaction Status
          </h3>
          <canvas id="chart-txn" height="250"></canvas>
        </div>
      </div>

    </main>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) throw '';
    App.init();
    const books = Store.getAll('books'), students = Store.getAll('students'), txns = Store.getAll('transactions'), fines = Store.getAll('fines'), categories = Store.getAll('categories');
    document.getElementById('r-books').textContent = books.length;
    document.getElementById('r-students').textContent = students.length;
    document.getElementById('r-txns').textContent = txns.length;
    const pendingFines = fines.filter((f) => f.status === 'pending').reduce((sum, f) => sum + f.amount, 0);
    document.getElementById('r-fines').textContent = `\u20B1${pendingFines}`;
    new Chart(document.getElementById('chart-cat'), {
        type: 'bar',
        data: {
            labels: categories.map((c) => c.name),
            datasets: [{ label: 'Books', data: categories.map((c) => books.filter((b) => b.category_id === c.id).length), backgroundColor: ['#e94560','#0f3460','#28a745','#ffc107','#17a2b8'] }]
        },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });
    const borrowed = txns.filter((t) => t.status === 'borrowed').length;
    const returned = txns.filter((t) => t.status === 'returned').length;
    new Chart(document.getElementById('chart-txn'), {
        type: 'doughnut',
        data: { labels: ['Borrowed', 'Returned'], datasets: [{ data: [borrowed, returned], backgroundColor: ['#ffc107', '#28a745'] }] },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });
  </script>
</body>
</html>
