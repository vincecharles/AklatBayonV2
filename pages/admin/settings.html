<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - AklatBayon</title>
  <script src="/js/theme-init.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="/css/custom.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { DEFAULT: '#3211d4', 50: '#eef0ff', 700: '#3211d4', 800: '#2e14a8', 900: '#281689' }, accent: '#e94560', 'bg-light': '#f6f6f8', 'bg-dark': '#131022' } } }
    }
  </script>
</head>
<body class="bg-bg-light dark:bg-bg-dark font-sans text-slate-800 dark:text-slate-100 min-h-screen">
<div class="flex min-h-screen">
  <header id="top-header"></header>
  <nav id="sidebar-nav"></nav>
  <main class="lg:ml-72 mt-16 flex-1 p-6 md:p-8">
    <div id="alert-container"></div>

    <!-- Page Header -->
    <div class="flex items-center gap-3 mb-6">
      <span class="material-symbols-outlined text-3xl text-primary dark:text-primary-50">tune</span>
      <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Settings</h1>
    </div>

    <!-- Settings Card -->
    <div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
      <!-- Card Header -->
      <div class="flex items-center gap-2.5 px-6 py-4 border-b border-slate-200 dark:border-slate-800">
        <span class="material-symbols-outlined text-xl text-primary dark:text-primary-50">settings</span>
        <h2 class="text-base font-semibold text-slate-900 dark:text-white">System Configuration</h2>
      </div>

      <!-- Card Body -->
      <div class="p-6">
        <div id="settings-form"></div>

        <!-- Card Footer -->
        <div class="flex justify-end gap-3 pt-4 mt-4 border-t border-slate-200 dark:border-slate-800">
          <button id="btn-reset" class="inline-flex items-center gap-1.5 px-5 py-2.5 text-sm font-medium rounded-lg border border-red-300 dark:border-red-800 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
            <span class="material-symbols-outlined text-lg">refresh</span>
            Reset Data
          </button>
          <button id="btn-save" class="inline-flex items-center gap-1.5 px-5 py-2.5 text-sm font-medium rounded-lg bg-primary text-white hover:bg-primary-800 transition-colors">
            <span class="material-symbols-outlined text-lg">save</span>
            Save Settings
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/app.js"></script>
  <script>
    if (!Auth.requireAuth()) { window.location.href = '/pages/auth/login.html'; throw ''; }
    App.init();
    const load = () => {
      const settings = Store.getAll('settings');
      let html = '';
      settings.forEach((s) => {
        html += `<div class="mb-4"><label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">${s.label}</label><input type="text" class="w-full h-11 px-3.5 text-sm rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary setting-input" data-key="${s.key}" data-id="${s.id}" value="${s.value}"></div>`;
      });
      document.getElementById('settings-form').innerHTML = html;
    };
    document.getElementById('btn-save').addEventListener('click', () => {
      document.querySelectorAll('.setting-input').forEach((input) => {
        Store.update('settings', input.dataset.id, { value: input.value });
      });
      App.showAlert('success', 'Settings saved.');
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      Swal.fire({
        title: 'Reset All Data?',
        text: 'This will reset all data to the initial seed state. This cannot be undone.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#e94560',
        confirmButtonText: 'Yes, reset!'
      }).then((r) => {
        if (r.isConfirmed) {
          localStorage.removeItem('aklatbayon_seeded');
          const keys = Object.keys(localStorage);
          keys.forEach((k) => { if (k.startsWith('aklatbayon_')) localStorage.removeItem(k); });
          Store.seed();
          App.showAlert('success', 'Data reset to defaults.');
          load();
        }
      });
    });
    load();
  </script>
</body>
</html>
