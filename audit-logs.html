<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="page-header"><h1><i class="fas fa-clipboard-list me-2"></i>Audit Logs</h1></div>
        <div class="filter-bar">
            <div class="search-input-wrap"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="Search logs..."></div>
            <select class="form-select" id="filter-action" style="max-width:160px">
                <option value="">All Actions</option>
                <option value="CREATE">Create</option>
                <option value="UPDATE">Update</option>
                <option value="DELETE">Delete</option>
                <option value="LOGIN">Login</option>
                <option value="LOGOUT">Logout</option>
            </select>
        </div>
        <div class="card"><div class="card-body p-0"><div class="table-responsive">
            <table class="table">
                <thead><tr><th>#</th><th>Date/Time</th><th>User</th><th>Action</th><th>Entity</th><th>Details</th></tr></thead>
                <tbody id="data-table"></tbody>
            </table>
        </div></div></div>
    </main>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init();
        function load() {
            var logs = Store.getAll('audit_logs');
            var s = document.getElementById('search-input').value.toLowerCase();
            var af = document.getElementById('filter-action').value;
            if (s) logs = logs.filter(function(l) { return l.user.toLowerCase().indexOf(s) !== -1 || l.details.toLowerCase().indexOf(s) !== -1 || l.entity.toLowerCase().indexOf(s) !== -1; });
            if (af) logs = logs.filter(function(l) { return l.action === af; });
            var tbody = document.getElementById('data-table');
            if (!logs.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No logs found.</td></tr>'; return; }
            var colorMap = { CREATE: 'bg-success', UPDATE: 'bg-primary', DELETE: 'bg-danger', LOGIN: 'bg-info', LOGOUT: 'bg-secondary', SEED: 'bg-dark', RFID_LOGIN: 'bg-info' };
            tbody.innerHTML = logs.map(function(l, i) {
                return '<tr><td>' + (i+1) + '</td><td>' + App.formatDateTime(l.created_at) + '</td><td class="fw-semibold">' + l.user + '</td><td><span class="badge ' + (colorMap[l.action] || 'bg-secondary') + '">' + l.action + '</span></td><td>' + l.entity + '</td><td>' + l.details + '</td></tr>';
            }).join('');
        }
        document.getElementById('search-input').addEventListener('input', load);
        document.getElementById('filter-action').addEventListener('change', load);
        load();
    </script>
</body>
</html>
