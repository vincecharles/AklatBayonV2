<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fine Management - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="page-header"><h1><i class="fas fa-receipt me-2"></i>Fine Management</h1></div>
        <div class="filter-bar">
            <div class="search-input-wrap"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="Search fines..."></div>
            <select class="form-select" id="filter-status" style="max-width:160px">
                <option value="">All Status</option><option value="pending">Pending</option><option value="paid">Paid</option><option value="waived">Waived</option>
            </select>
        </div>
        <div class="card"><div class="card-body p-0"><div class="table-responsive">
            <table class="table">
                <thead><tr><th>#</th><th>Student</th><th>Reason</th><th>Amount</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                <tbody id="data-table"></tbody>
            </table>
        </div></div></div>
    </main>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init();
        function load() {
            var items = Store.getAll('fines');
            var s = document.getElementById('search-input').value.toLowerCase();
            var sf = document.getElementById('filter-status').value;
            if (sf) items = items.filter(function(f) { return f.status === sf; });
            if (s) items = items.filter(function(f) { return App.getStudentName(f.student_id).toLowerCase().indexOf(s) !== -1 || f.reason.toLowerCase().indexOf(s) !== -1; });
            var tbody = document.getElementById('data-table');
            if (!items.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No fines found.</td></tr>'; return; }
            tbody.innerHTML = items.map(function(f, i) {
                var statusMap = { pending: 'badge-pending', paid: 'badge-paid', waived: 'badge-waived' };
                var actions = f.status === 'pending' ? '<button class="btn btn-sm btn-success btn-collect" data-id="' + f.id + '"><i class="fas fa-check me-1"></i>Collect</button> <button class="btn btn-sm btn-info btn-waive" data-id="' + f.id + '"><i class="fas fa-hand-holding-heart me-1"></i>Waive</button>' : '<span class="text-muted small">Resolved</span>';
                return '<tr><td>' + (i+1) + '</td><td>' + App.getStudentName(f.student_id) + '</td><td>' + f.reason + '</td><td class="fw-semibold">₱' + f.amount + '</td><td><span class="badge ' + (statusMap[f.status] || 'bg-secondary') + '">' + f.status + '</span></td><td>' + App.formatDate(f.created_at) + '</td><td>' + actions + '</td></tr>';
            }).join('');
            document.querySelectorAll('.btn-collect').forEach(function(b) {
                b.addEventListener('click', function() { Store.update('fines', this.dataset.id, { status: 'paid' }); App.showAlert('success', 'Fine collected.'); load(); });
            });
            document.querySelectorAll('.btn-waive').forEach(function(b) {
                b.addEventListener('click', function() { Store.update('fines', this.dataset.id, { status: 'waived' }); App.showAlert('success', 'Fine waived.'); load(); });
            });
        }
        document.getElementById('search-input').addEventListener('input', load);
        document.getElementById('filter-status').addEventListener('change', load);
        load();
    </script>
</body>
</html>
