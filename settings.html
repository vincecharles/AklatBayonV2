<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="page-header"><h1><i class="fas fa-sliders-h me-2"></i>Settings</h1></div>
        <div class="card">
            <div class="card-header"><i class="fas fa-cog me-2"></i>System Configuration</div>
            <div class="card-body" id="settings-form"></div>
            <div class="modal-footer">
                <button class="btn btn-success" id="btn-save"><i class="fas fa-save me-1"></i> Save Settings</button>
                <button class="btn btn-warning" id="btn-reset"><i class="fas fa-redo me-1"></i> Reset Data</button>
            </div>
        </div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init();
        function load() {
            var settings = Store.getAll('settings');
            var html = '';
            settings.forEach(function(s) {
                html += '<div class="form-group"><label>' + s.label + '</label><input class="form-control setting-input" data-key="' + s.key + '" data-id="' + s.id + '" value="' + s.value + '"></div>';
            });
            document.getElementById('settings-form').innerHTML = html;
        }
        document.getElementById('btn-save').addEventListener('click', function() {
            document.querySelectorAll('.setting-input').forEach(function(input) {
                Store.update('settings', input.dataset.id, { value: input.value });
            });
            App.showAlert('success', 'Settings saved.');
        });
        document.getElementById('btn-reset').addEventListener('click', function() {
            Swal.fire({
                title: 'Reset All Data?',
                text: 'This will reset all data to the initial seed state. This cannot be undone.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e94560',
                confirmButtonText: 'Yes, reset!'
            }).then(function(r) {
                if (r.isConfirmed) {
                    localStorage.removeItem('aklatbayon_seeded');
                    var keys = Object.keys(localStorage);
                    keys.forEach(function(k) { if (k.startsWith('aklatbayon_')) localStorage.removeItem(k); });
                    Store.seed();
                    App.showAlert('success', 'Data reset to defaults.');
                    load();
                }
            });
        });
        load();
    </script>
</body>
</html>
