<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrower Profile - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="page-header"><h1><i class="fas fa-user-circle me-2"></i>Borrower Profile</h1></div>
        <div class="row g-4">
            <!-- Left Column: Profile Card -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body" id="profile-card" style="text-align:center">
                        <div style="font-size:64px;color:#0f3460;margin-bottom:12px"><i class="fas fa-user-circle"></i></div>
                        <div id="profile-name" style="font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:8px"></div>
                        <div id="profile-student-id" style="margin-bottom:16px"></div>
                        <div style="text-align:left;padding:0 8px">
                            <div style="margin-bottom:10px"><i class="fas fa-envelope me-2" style="color:#6c757d;width:16px"></i><span id="profile-email" style="font-size:14px"></span></div>
                            <div style="margin-bottom:10px"><i class="fas fa-layer-group me-2" style="color:#6c757d;width:16px"></i><span id="profile-section" style="font-size:14px"></span></div>
                            <div style="margin-bottom:10px"><i class="fas fa-graduation-cap me-2" style="color:#6c757d;width:16px"></i><span id="profile-grade" style="font-size:14px"></span></div>
                            <div style="margin-bottom:10px"><i class="fas fa-phone me-2" style="color:#6c757d;width:16px"></i><span id="profile-contact" style="font-size:14px"></span></div>
                            <div style="margin-bottom:16px"><i class="fas fa-circle me-2" style="width:16px"></i><span id="profile-status"></span></div>
                        </div>
                        <div style="border-top:1px solid #e9ecef;padding-top:16px;margin-top:8px">
                            <div style="font-weight:600;font-size:14px;color:#1a1a2e;margin-bottom:10px">Library QR Code</div>
                            <canvas id="qr-canvas" style="margin:0 auto 12px;display:block"></canvas>
                            <button class="btn btn-primary btn-sm" id="btn-print-qr"><i class="fas fa-print me-1"></i> Print QR Card</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Right Column: Stats + Tabs -->
            <div class="col-md-8">
                <!-- Stats Row -->
                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <div class="stat-card">
                            <div class="d-flex align-items-center">
                                <div class="stat-icon" style="background:#ffc107"><i class="fas fa-book-open"></i></div>
                                <div class="ms-3">
                                    <div class="stat-number" id="stat-borrowed">0</div>
                                    <div class="stat-label">Currently Borrowed</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card">
                            <div class="d-flex align-items-center">
                                <div class="stat-icon" style="background:#0f3460"><i class="fas fa-book"></i></div>
                                <div class="ms-3">
                                    <div class="stat-number" id="stat-total">0</div>
                                    <div class="stat-label">Total Books Borrowed</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card">
                            <div class="d-flex align-items-center">
                                <div class="stat-icon" style="background:#dc3545"><i class="fas fa-peso-sign"></i></div>
                                <div class="ms-3">
                                    <div class="stat-number" id="stat-fines">&#8369;0</div>
                                    <div class="stat-label">Outstanding Fines</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Tabs -->
                <div class="nav-tabs">
                    <button class="nav-tab active" data-tab="current">Currently Borrowed</button>
                    <button class="nav-tab" data-tab="history">Borrowing History</button>
                    <button class="nav-tab" data-tab="fines">Fines</button>
                    <button class="nav-tab" data-tab="reservations">Reservations</button>
                </div>
                <!-- Tab 1: Currently Borrowed -->
                <div class="tab-pane active" id="tab-current">
                    <div class="card"><div class="card-body p-0"><div class="table-responsive">
                        <table class="table">
                            <thead><tr><th>Book</th><th>Date Issued</th><th>Date Due</th><th>Status</th></tr></thead>
                            <tbody id="table-current"></tbody>
                        </table>
                    </div></div></div>
                </div>
                <!-- Tab 2: Borrowing History -->
                <div class="tab-pane" id="tab-history">
                    <div class="card"><div class="card-body p-0"><div class="table-responsive">
                        <table class="table">
                            <thead><tr><th>#</th><th>Book</th><th>Issued</th><th>Due</th><th>Returned</th><th>Status</th></tr></thead>
                            <tbody id="table-history"></tbody>
                        </table>
                    </div></div></div>
                </div>
                <!-- Tab 3: Fines -->
                <div class="tab-pane" id="tab-fines">
                    <div class="card"><div class="card-body p-0"><div class="table-responsive">
                        <table class="table">
                            <thead><tr><th>#</th><th>Reason</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
                            <tbody id="table-fines"></tbody>
                        </table>
                    </div></div></div>
                    <div id="fines-total" style="text-align:right;font-weight:700;font-size:15px;color:#1a1a2e;margin-top:8px"></div>
                </div>
                <!-- Tab 4: Reservations -->
                <div class="tab-pane" id="tab-reservations">
                    <div class="card"><div class="card-body p-0"><div class="table-responsive">
                        <table class="table">
                            <thead><tr><th>#</th><th>Book</th><th>Status</th><th>Reserved Date</th><th>Expires</th></tr></thead>
                            <tbody id="table-reservations"></tbody>
                        </table>
                    </div></div></div>
                </div>
            </div>
        </div>
    </main>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init();

        var studentId = new URLSearchParams(window.location.search).get('id');
        if (!studentId) {
            document.querySelector('.main-content').innerHTML = '<div id="alert-container"></div><div class="page-header"><h1><i class="fas fa-user-circle me-2"></i>Borrower Profile</h1></div><div class="empty-state"><i class="fas fa-user-slash"></i><p>No student ID provided. Please select a student first.</p></div>';
        } else {
            var student = Store.getById('students', studentId);
            if (!student) {
                document.querySelector('.main-content').innerHTML = '<div id="alert-container"></div><div class="page-header"><h1><i class="fas fa-user-circle me-2"></i>Borrower Profile</h1></div><div class="empty-state"><i class="fas fa-user-slash"></i><p>Student not found.</p></div>';
            } else {
                // Populate profile card
                document.getElementById('profile-name').textContent = student.name;
                document.getElementById('profile-student-id').innerHTML = '<span class="badge bg-primary" style="font-size:13px;padding:6px 14px">' + student.student_id + '</span>';
                document.getElementById('profile-email').textContent = student.email;
                document.getElementById('profile-section').textContent = student.section;
                document.getElementById('profile-grade').textContent = student.grade_level;
                document.getElementById('profile-contact').textContent = student.contact;
                var statusIcon = document.querySelector('#profile-status').parentElement.querySelector('i');
                if (student.status === 'active') {
                    statusIcon.style.color = '#28a745';
                    document.getElementById('profile-status').innerHTML = '<span class="badge badge-active">' + student.status + '</span>';
                } else {
                    statusIcon.style.color = '#6c757d';
                    document.getElementById('profile-status').innerHTML = '<span class="badge badge-inactive">' + student.status + '</span>';
                }

                // Generate QR Code
                var qrUrl = window.location.origin + '/borrower-profile.html?id=' + studentId;
                var canvas = document.getElementById('qr-canvas');
                QRCode.toCanvas(canvas, qrUrl, { width: 180 });

                // Print QR Card
                document.getElementById('btn-print-qr').addEventListener('click', function() {
                    var imgData = canvas.toDataURL();
                    var w = window.open('', '_blank', 'width=400,height=500');
                    w.document.write('<html><head><title>Library Card</title><style>body{font-family:Arial,sans-serif;text-align:center;padding:30px 20px;margin:0}h2{color:#1a1a2e;margin:0 0 4px}p{color:#555;margin:4px 0}img{margin:16px auto;display:block}.id-badge{display:inline-block;background:#1a1a2e;color:#fff;padding:4px 14px;border-radius:12px;font-size:13px;font-weight:600;margin:8px 0 12px}.label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-top:16px}hr{border:none;border-top:1px dashed #ccc;margin:16px 0}</style></head><body>');
                    w.document.write('<div class="label">AklatBayon Library</div>');
                    w.document.write('<h2>' + student.name + '</h2>');
                    w.document.write('<div class="id-badge">' + student.student_id + '</div>');
                    w.document.write('<p>' + student.section + ' &bull; ' + student.grade_level + '</p>');
                    w.document.write('<hr>');
                    w.document.write('<img src="' + imgData + '" width="180" height="180">');
                    w.document.write('<div class="label">Scan to view borrower profile</div>');
                    w.document.write('</body></html>');
                    w.document.close();
                    w.focus();
                    w.print();
                });

                // Load all data
                var allTransactions = Store.getAll('transactions');
                var studentTransactions = allTransactions.filter(function(t) { return t.student_id === studentId; });
                var currentlyBorrowed = studentTransactions.filter(function(t) { return t.status === 'borrowed'; });
                var allFines = Store.getAll('fines');
                var studentFines = allFines.filter(function(f) { return f.student_id === studentId; });
                var allReservations = Store.getAll('reservations');
                var studentReservations = allReservations.filter(function(r) { return r.student_id === studentId; });

                // Stats
                document.getElementById('stat-borrowed').textContent = currentlyBorrowed.length;
                document.getElementById('stat-total').textContent = studentTransactions.length;
                var outstandingFines = Store.getStudentFinesTotal(studentId);
                document.getElementById('stat-fines').innerHTML = '&#8369;' + outstandingFines;

                // Tab switching
                document.querySelectorAll('.nav-tab').forEach(function(tab) {
                    tab.addEventListener('click', function() {
                        document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
                        document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
                        this.classList.add('active');
                        document.getElementById('tab-' + this.dataset.tab).classList.add('active');
                    });
                });

                // Tab 1: Currently Borrowed
                (function() {
                    var tbody = document.getElementById('table-current');
                    if (!currentlyBorrowed.length) {
                        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No books currently borrowed.</td></tr>';
                        return;
                    }
                    tbody.innerHTML = currentlyBorrowed.map(function(t) {
                        var isOverdue = new Date(t.date_due) < new Date();
                        var statusBadge = isOverdue
                            ? '<span class="badge bg-danger">Overdue</span>'
                            : '<span class="badge bg-warning">Borrowed</span>';
                        return '<tr><td>' + App.getBookTitle(t.book_id) + '</td><td>' + App.formatDate(t.date_issued) + '</td><td>' + App.formatDate(t.date_due) + '</td><td>' + statusBadge + '</td></tr>';
                    }).join('');
                })();

                // Tab 2: Borrowing History
                (function() {
                    var tbody = document.getElementById('table-history');
                    if (!studentTransactions.length) {
                        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No borrowing history.</td></tr>';
                        return;
                    }
                    tbody.innerHTML = studentTransactions.map(function(t, i) {
                        var statusClass, statusLabel;
                        if (t.status === 'returned') {
                            statusClass = 'bg-success'; statusLabel = 'Returned';
                        } else if (new Date(t.date_due) < new Date()) {
                            statusClass = 'bg-danger'; statusLabel = 'Overdue';
                        } else {
                            statusClass = 'bg-warning'; statusLabel = 'Borrowed';
                        }
                        return '<tr><td>' + (i + 1) + '</td><td>' + App.getBookTitle(t.book_id) + '</td><td>' + App.formatDate(t.date_issued) + '</td><td>' + App.formatDate(t.date_due) + '</td><td>' + App.formatDate(t.date_returned) + '</td><td><span class="badge ' + statusClass + '">' + statusLabel + '</span></td></tr>';
                    }).join('');
                })();

                // Tab 3: Fines
                (function() {
                    var tbody = document.getElementById('table-fines');
                    if (!studentFines.length) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No fines found.</td></tr>';
                        document.getElementById('fines-total').textContent = '';
                        return;
                    }
                    var statusMap = { pending: 'badge-pending', paid: 'badge-paid', waived: 'badge-waived' };
                    var total = 0;
                    tbody.innerHTML = studentFines.map(function(f, i) {
                        total += parseFloat(f.amount) || 0;
                        return '<tr><td>' + (i + 1) + '</td><td>' + f.reason + '</td><td class="fw-semibold">&#8369;' + f.amount + '</td><td><span class="badge ' + (statusMap[f.status] || 'bg-secondary') + '">' + f.status + '</span></td><td>' + App.formatDate(f.created_at) + '</td></tr>';
                    }).join('');
                    document.getElementById('fines-total').innerHTML = 'Total: &#8369;' + total;
                })();

                // Tab 4: Reservations
                (function() {
                    var tbody = document.getElementById('table-reservations');
                    if (!studentReservations.length) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No reservations found.</td></tr>';
                        return;
                    }
                    var resStatusMap = { active: 'bg-primary', available: 'bg-success', expired: 'bg-secondary', cancelled: 'bg-danger', fulfilled: 'bg-info' };
                    tbody.innerHTML = studentReservations.map(function(r, i) {
                        return '<tr><td>' + (i + 1) + '</td><td>' + App.getBookTitle(r.book_id) + '</td><td><span class="badge ' + (resStatusMap[r.status] || 'bg-secondary') + '">' + r.status + '</span></td><td>' + App.formatDate(r.created_at) + '</td><td>' + App.formatDateTime(r.expires_at) + '</td></tr>';
                    }).join('');
                })();
            }
        }
    </script>
</body>
</html>
