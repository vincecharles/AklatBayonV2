<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="page-header">
            <h1><i class="fas fa-tags me-2"></i>Categories</h1>
            <button class="btn btn-primary" id="btn-add"><i class="fas fa-plus me-1"></i> Add Category</button>
        </div>
        <div class="card"><div class="card-body p-0"><div class="table-responsive">
            <table class="table">
                <thead><tr><th>#</th><th>Name</th><th>Description</th><th>Parent</th><th>Books</th><th>Actions</th></tr></thead>
                <tbody id="data-table"></tbody>
            </table>
        </div></div></div>
    </main>
    <div class="modal-overlay" id="modal-form">
        <div class="modal-box">
            <div class="modal-header"><h3 id="modal-title">Add Category</h3><button class="modal-close">&times;</button></div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="form-group"><label>Name</label><input class="form-control" id="f-name"></div>
                <div class="form-group"><label>Description</label><textarea class="form-control" id="f-desc"></textarea></div>
                <div class="form-group"><label>Parent Category</label><select class="form-select" id="f-parent"><option value="">None (Top Level)</option></select></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary modal-close">Cancel</button><button class="btn btn-success" id="btn-save"><i class="fas fa-save me-1"></i> Save</button></div>
        </div>
    </div>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init(); App.bindModalCloses();
        function loadParents() {
            var cats = Store.getAll('categories'); var sel = document.getElementById('f-parent');
            sel.innerHTML = '<option value="">None (Top Level)</option>';
            cats.forEach(function(c) { sel.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });
        }
        function load() {
            var items = Store.getAll('categories'), books = Store.getAll('books');
            var tbody = document.getElementById('data-table');
            if (!items.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No categories found.</td></tr>'; return; }
            tbody.innerHTML = items.map(function(c, i) {
                var parent = c.parent_id ? App.getCategoryName(c.parent_id) : '—';
                var cnt = books.filter(function(b) { return b.category_id === c.id; }).length;
                return '<tr><td>' + (i+1) + '</td><td class="fw-semibold">' + c.name + '</td><td class="text-muted">' + (c.description || '—') + '</td><td>' + parent + '</td><td><span class="badge bg-info">' + cnt + '</span></td><td><button class="btn btn-sm btn-outline-primary btn-edit" data-id="' + c.id + '"><i class="fas fa-edit"></i></button> <button class="btn btn-sm btn-danger btn-del" data-id="' + c.id + '" data-name="' + c.name + '"><i class="fas fa-trash"></i></button></td></tr>';
            }).join('');
            bind();
        }
        function bind() {
            document.querySelectorAll('.btn-edit').forEach(function(b) { b.addEventListener('click', function() {
                var c = Store.getById('categories', this.dataset.id); if (!c) return;
                loadParents(); document.getElementById('modal-title').textContent = 'Edit Category';
                document.getElementById('edit-id').value = c.id; document.getElementById('f-name').value = c.name;
                document.getElementById('f-desc').value = c.description || ''; document.getElementById('f-parent').value = c.parent_id || '';
                App.openModal('modal-form');
            }); });
            document.querySelectorAll('.btn-del').forEach(function(b) { b.addEventListener('click', function() {
                var id = this.dataset.id, name = this.dataset.name;
                App.confirmDelete(name).then(function(r) { if (r.isConfirmed) { Store.remove('categories', id); App.showAlert('success', 'Category deleted.'); load(); } });
            }); });
        }
        document.getElementById('btn-add').addEventListener('click', function() {
            loadParents(); document.getElementById('modal-title').textContent = 'Add Category';
            document.getElementById('edit-id').value = ''; document.getElementById('f-name').value = '';
            document.getElementById('f-desc').value = ''; document.getElementById('f-parent').value = '';
            App.openModal('modal-form');
        });
        document.getElementById('btn-save').addEventListener('click', function() {
            var name = document.getElementById('f-name').value.trim();
            if (!name) { App.showAlert('danger', 'Name required.'); return; }
            var data = { name: name, description: document.getElementById('f-desc').value.trim(), parent_id: document.getElementById('f-parent').value || null };
            var eid = document.getElementById('edit-id').value;
            if (eid) { Store.update('categories', eid, data); App.showAlert('success', 'Category updated.'); }
            else { Store.create('categories', data); App.showAlert('success', 'Category added.'); }
            App.closeModal('modal-form'); load();
        });
        load();
    </script>
</body>
</html>
