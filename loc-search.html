<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOC Book Search - AklatBayon</title>
    <meta name="description" content="Search the Library of Congress catalog and import books into AklatBayon.">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        .loc-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .loc-card { position: relative; overflow: hidden; }
        .loc-card .card-body { display: flex; flex-direction: column; min-height: 220px; }
        .loc-card .loc-title { font-size: 15px; font-weight: 700; color: var(--primary-navy); margin-bottom: 8px; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        body.dark-mode .loc-card .loc-title { color: #e0e4ec; }
        .loc-meta { font-size: 12px; color: var(--gray); margin-bottom: 4px; display: flex; align-items: flex-start; gap: 6px; }
        .loc-meta i { margin-top: 2px; width: 14px; text-align: center; flex-shrink: 0; }
        .loc-subjects { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .loc-subjects .badge { font-size: 10px; padding: 2px 8px; }
        .loc-call { display: inline-flex; align-items: center; gap: 4px; background: rgba(15,52,96,0.08); color: var(--primary-blue);
            padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; font-family: 'Consolas', monospace; }
        body.dark-mode .loc-call { background: rgba(100,181,246,0.15); color: #64b5f6; }
        .loc-card-footer { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--light-gray); display: flex; justify-content: space-between; align-items: center; }
        body.dark-mode .loc-card-footer { border-top-color: #2a2a40; }
        .btn-import { background: linear-gradient(135deg, #28a745, #20c997); color: #fff; border: none; padding: 6px 14px;
            border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: opacity 0.2s; }
        .btn-import:hover { opacity: 0.85; }
        .btn-import:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination-bar { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 24px; }
        .pagination-bar button { padding: 8px 20px; }
        .pagination-info { font-size: 13px; color: var(--gray); font-weight: 600; }
        .spinner-wrap { display: flex; justify-content: center; align-items: center; padding: 60px; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--light-gray); border-top-color: var(--primary-red);
            border-radius: 50%; animation: spin 0.8s linear infinite; }
        body.dark-mode .spinner { border-color: #2a2a40; border-top-color: var(--primary-red); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loc-hero { background: linear-gradient(135deg, var(--primary-navy), var(--primary-blue)); border-radius: 12px;
            padding: 28px 32px; margin-bottom: 24px; color: #fff; display: flex; align-items: center; gap: 20px; }
        .loc-hero-icon { width: 56px; height: 56px; background: rgba(255,255,255,0.12); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .loc-hero h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .loc-hero p { font-size: 13px; opacity: 0.7; margin: 0; }
        .search-big { display: flex; gap: 12px; margin-bottom: 24px; }
        .search-big input { flex: 1; padding: 12px 18px; font-size: 15px; border: 2px solid var(--light-gray); border-radius: 10px; font-family: inherit; }
        .search-big input:focus { outline: none; border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(15,52,96,0.1); }
        body.dark-mode .search-big input { background: #252540; border-color: #353550; color: #e0e4ec; }
        body.dark-mode .search-big input:focus { border-color: #5a5a80; }
        .search-big button { padding: 12px 28px; font-size: 15px; font-weight: 600; }
    </style>
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="loc-hero">
            <div class="loc-hero-icon"><i class="fas fa-landmark"></i></div>
            <div>
                <h2>Library of Congress Catalog</h2>
                <p>Search millions of books from the world's largest library</p>
            </div>
        </div>

        <div class="search-big">
            <input type="text" id="loc-query" placeholder="Search books by title, author, subject, or ISBN..." autofocus>
            <button class="btn btn-primary" id="btn-search"><i class="fas fa-search me-1"></i> Search LOC</button>
        </div>

        <div id="results-section" style="display:none">
            <div class="d-flex align-items-center justify-content-between mb-3">
                <div>
                    <span class="fw-semibold" style="color:var(--primary-navy)" id="results-heading"></span>
                    <span class="text-muted small ms-2" id="results-count"></span>
                </div>
            </div>
            <div class="loc-results" id="loc-results"></div>
            <div class="pagination-bar" id="pagination-bar" style="display:none">
                <button class="btn btn-outline-primary" id="btn-prev"><i class="fas fa-chevron-left me-1"></i> Previous</button>
                <span class="pagination-info" id="page-info"></span>
                <button class="btn btn-outline-primary" id="btn-next">Next <i class="fas fa-chevron-right ms-1"></i></button>
            </div>
        </div>

        <div id="loading" style="display:none">
            <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>

        <div id="empty-state" class="empty-state" style="display:none">
            <i class="fas fa-search"></i>
            <p id="empty-text">Enter a search term to browse the Library of Congress catalog.</p>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init();

        var LOC_API = 'https://www.loc.gov/books/';
        var PER_PAGE = 25;
        var currentPage = 1;
        var currentQuery = '';
        var paginationData = null;

        var queryInput = document.getElementById('loc-query');
        var btnSearch = document.getElementById('btn-search');
        var resultsSection = document.getElementById('results-section');
        var resultsGrid = document.getElementById('loc-results');
        var loadingEl = document.getElementById('loading');
        var emptyEl = document.getElementById('empty-state');
        var emptyText = document.getElementById('empty-text');
        var paginationBar = document.getElementById('pagination-bar');

        function showLoading() { loadingEl.style.display = ''; resultsSection.style.display = 'none'; emptyEl.style.display = 'none'; }
        function hideLoading() { loadingEl.style.display = 'none'; }

        function searchLOC(query, page) {
            if (!query.trim()) return;
            currentQuery = query.trim();
            currentPage = page || 1;
            showLoading();

            axios.get(LOC_API, {
                params: { q: currentQuery, fo: 'json', c: PER_PAGE, sp: currentPage }
            }).then(function(response) {
                hideLoading();
                var data = response.data;
                var results = data.results || [];
                paginationData = data.pagination || null;

                if (results.length === 0) {
                    emptyEl.style.display = '';
                    emptyText.textContent = 'No books found for "' + currentQuery + '". Try a different search term.';
                    resultsSection.style.display = 'none';
                    return;
                }

                resultsSection.style.display = '';
                document.getElementById('results-heading').textContent = 'Results for "' + currentQuery + '"';
                document.getElementById('results-count').textContent = (paginationData ? paginationData.of.toLocaleString() + ' total' : '');

                renderResults(results);
                renderPagination();
            }).catch(function(err) {
                hideLoading();
                emptyEl.style.display = '';
                if (err.response && err.response.status === 429) {
                    emptyText.textContent = 'Rate limited by LOC. Please wait a moment and try again.';
                } else {
                    emptyText.textContent = 'Error connecting to LOC API. Please check your connection.';
                }
                console.error('LOC API error:', err);
            });
        }

        function renderResults(results) {
            var html = '';
            results.forEach(function(r) {
                var title = (r.item && r.item.title) || r.title || 'Untitled';
                var authors = (r.item && r.item.contributors) || [];
                var authorStr = authors.length > 0 ? authors[0].replace(/\.$/, '') : (r.contributor && r.contributor.length > 0 ? r.contributor[0] : 'Unknown');
                var date = (r.item && r.item.date) || r.date || '';
                var callNums = (r.item && r.item.call_number) || [];
                var callNumber = callNums.length > 0 ? callNums[0] : '';
                var subjects = (r.item && r.item.subjects) || [];
                var published = (r.item && r.item.created_published) || [];
                var publisherStr = published.length > 0 ? published[0] : '';
                var locUrl = r.url || r.id || '';
                if (locUrl && !locUrl.startsWith('http')) locUrl = 'https://www.loc.gov' + (locUrl.startsWith('/') ? '' : '/') + locUrl;

                html += '<div class="card loc-card">';
                html += '<div class="card-body">';
                html += '<div class="loc-title" title="' + title.replace(/"/g, '&quot;') + '">' + escHtml(title) + '</div>';
                html += '<div class="loc-meta"><i class="fas fa-user"></i> ' + escHtml(authorStr) + '</div>';
                if (date && date !== '||||') html += '<div class="loc-meta"><i class="fas fa-calendar"></i> ' + escHtml(date) + '</div>';
                if (publisherStr) html += '<div class="loc-meta"><i class="fas fa-building"></i> ' + escHtml(truncate(publisherStr, 60)) + '</div>';
                if (callNumber) html += '<div class="loc-meta"><i class="fas fa-barcode"></i> <span class="loc-call">' + escHtml(callNumber) + '</span></div>';

                if (subjects.length > 0) {
                    html += '<div class="loc-subjects">';
                    subjects.slice(0, 3).forEach(function(s) {
                        html += '<span class="badge bg-info">' + escHtml(truncate(s.split('--')[0], 25)) + '</span>';
                    });
                    if (subjects.length > 3) html += '<span class="badge bg-secondary">+' + (subjects.length - 3) + '</span>';
                    html += '</div>';
                }

                html += '<div class="loc-card-footer">';
                if (locUrl) html += '<a href="' + locUrl + '" target="_blank" class="text-muted small" style="text-decoration:none"><i class="fas fa-external-link-alt me-1"></i>LOC</a>';
                else html += '<span></span>';
                html += '<button class="btn-import" onclick="importBook(this)" '
                    + 'data-title="' + escAttr(title) + '" '
                    + 'data-author="' + escAttr(authorStr) + '" '
                    + 'data-year="' + escAttr(date) + '" '
                    + 'data-call="' + escAttr(callNumber) + '" '
                    + 'data-publisher="' + escAttr(publisherStr) + '" '
                    + 'data-subject="' + escAttr(subjects.length > 0 ? subjects[0].split('--')[0] : '') + '" '
                    + '><i class="fas fa-download"></i> Import</button>';
                html += '</div></div></div>';
            });
            resultsGrid.innerHTML = html;
        }

        function renderPagination() {
            if (!paginationData || !paginationData.total || paginationData.total <= 1) {
                paginationBar.style.display = 'none';
                return;
            }
            paginationBar.style.display = '';
            document.getElementById('page-info').textContent = 'Page ' + paginationData.current + ' of ' + paginationData.total;
            document.getElementById('btn-prev').disabled = !paginationData.previous;
            document.getElementById('btn-next').disabled = !paginationData.next;
        }

        function importBook(btn) {
            var title = btn.dataset.title;
            var author = btn.dataset.author;
            var year = parseInt(btn.dataset.year) || 0;
            var callNumber = btn.dataset.call;
            var publisherRaw = btn.dataset.publisher;
            var subjectRaw = btn.dataset.subject;

            // Duplicate check
            var existing = Store.getAll('books');
            var dup = existing.find(function(b) { return b.title.toLowerCase() === title.toLowerCase(); });
            if (dup) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Book Already Exists',
                    text: '"' + title + '" is already in your local catalog.',
                    confirmButtonColor: '#e94560'
                });
                return;
            }

            // Auto-create author
            var authorId = '';
            if (author && author !== 'Unknown') {
                var authors = Store.getAll('authors');
                var found = authors.find(function(a) { return a.name.toLowerCase() === author.toLowerCase(); });
                if (found) { authorId = found.id; }
                else {
                    Store.create('authors', { name: author, bio: 'Imported from LOC' });
                    var all = Store.getAll('authors');
                    authorId = all[all.length - 1].id;
                }
            }

            // Auto-create publisher (parse from "City : Publisher, year")
            var pubName = '';
            if (publisherRaw) {
                var parts = publisherRaw.split(':');
                pubName = parts.length > 1 ? parts[1].replace(/,.*$/, '').trim() : publisherRaw.replace(/,.*$/, '').replace(/[\[\]]/g, '').trim();
            }
            var pubId = '';
            if (pubName) {
                var pubs = Store.getAll('publishers');
                var foundPub = pubs.find(function(p) { return p.name.toLowerCase() === pubName.toLowerCase(); });
                if (foundPub) { pubId = foundPub.id; }
                else {
                    Store.create('publishers', { name: pubName, address: '', contact: '' });
                    var allPubs = Store.getAll('publishers');
                    pubId = allPubs[allPubs.length - 1].id;
                }
            }

            // Auto-create category
            var catId = '';
            if (subjectRaw) {
                var cats = Store.getAll('categories');
                var foundCat = cats.find(function(c) { return c.name.toLowerCase() === subjectRaw.toLowerCase(); });
                if (foundCat) { catId = foundCat.id; }
                else {
                    Store.create('categories', { name: subjectRaw, description: 'Imported from LOC', parent_id: null });
                    var allCats = Store.getAll('categories');
                    catId = allCats[allCats.length - 1].id;
                }
            }

            Store.create('books', {
                title: title,
                isbn: 'LOC-' + Date.now(),
                author_id: authorId,
                publisher_id: pubId,
                category_id: catId,
                call_number: callNumber,
                year: year,
                copies: 1,
                available: 1,
                status: 'active'
            });

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-check"></i> Imported';

            Swal.fire({
                icon: 'success',
                title: 'Book Imported!',
                text: '"' + truncate(title, 50) + '" has been added to your local catalog.',
                timer: 2500,
                showConfirmButton: false,
                toast: true,
                position: 'top-end'
            });
        }

        function escHtml(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        function escAttr(str) { return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
        function truncate(str, max) { return str.length > max ? str.substring(0, max) + '…' : str; }

        // Event bindings
        btnSearch.addEventListener('click', function() { searchLOC(queryInput.value, 1); });
        queryInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') searchLOC(queryInput.value, 1); });
        document.getElementById('btn-prev').addEventListener('click', function() { if (paginationData && paginationData.previous) searchLOC(currentQuery, currentPage - 1); });
        document.getElementById('btn-next').addEventListener('click', function() { if (paginationData && paginationData.next) searchLOC(currentQuery, currentPage + 1); });

        // Show initial empty state
        emptyEl.style.display = '';
    </script>
</body>
</html>
