<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%); color: #fff; overflow: hidden; }
        .welcome-container { text-align: center; animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .welcome-avatar { width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; animation: pulse-glow 2s ease-in-out infinite; overflow: hidden; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.1); } 50% { box-shadow: 0 0 30px 10px rgba(255,255,255,0.08); } }
        .welcome-avatar img { width: 90px; height: 90px; object-fit: contain; }
        .welcome-label { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
        .welcome-name { font-size: 42px; font-weight: 900; letter-spacing: 1px; margin-bottom: 12px; }
        .welcome-role { display: inline-block; padding: 6px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; letter-spacing: 1px; margin-bottom: 32px; }
        .role-admin { background: rgba(233,69,96,0.2); border: 1px solid rgba(233,69,96,0.4); color: #e94560; }
        .role-librarian { background: rgba(40,167,69,0.2); border: 1px solid rgba(40,167,69,0.4); color: #28a745; }
        .role-faculty { background: rgba(23,162,184,0.2); border: 1px solid rgba(23,162,184,0.4); color: #17a2b8; }
        .role-student { background: rgba(255,193,7,0.2); border: 1px solid rgba(255,193,7,0.4); color: #ffc107; }
        .role-assistant { background: rgba(111,66,193,0.2); border: 1px solid rgba(111,66,193,0.4); color: #6f42c1; }
        .role-guest { background: rgba(108,117,125,0.2); border: 1px solid rgba(108,117,125,0.4); color: #6c757d; }
        .redirect-text { font-size: 13px; color: rgba(255,255,255,0.4); }
        .redirect-text .dots { display: inline-block; width: 20px; text-align: left; }
        .progress-bar-wrap { width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 16px auto 0; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #e94560; border-radius: 3px; animation: fill-bar 3s linear forwards; }
        @keyframes fill-bar { from { width: 0; } to { width: 100%; } }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle { position: absolute; width: 2px; height: 2px; background: rgba(224,230,240,0.15); border-radius: 50%; animation: float-up linear infinite; }
        @keyframes float-up { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="welcome-container" style="position:relative;z-index:1">
        <div class="welcome-avatar"><img src="images/logo.png" alt="AklatBayon"></div>

        <div class="welcome-label">Welcome Back</div>
        <div class="welcome-name" id="user-name">User</div>
        <div class="welcome-role" id="user-role">Role</div>
        <div class="redirect-text">Redirecting to dashboard<span class="dots" id="dots"></span></div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
    </div>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        var user = Auth.getCurrentUser();
        if (!user) { window.location.href = 'login.html'; }
        else {
            document.getElementById('user-name').textContent = user.name;
            var roleText = user.role_name;
            if (user.faculty_subtype) roleText += ' — ' + user.faculty_subtype;
            var roleEl = document.getElementById('user-role');
            roleEl.textContent = roleText;
            var roleClassMap = {
                'System Administrator': 'role-admin',
                'Librarian': 'role-librarian',
                'Faculty': 'role-faculty',
                'Student': 'role-student',
                'Student Assistant': 'role-assistant',
                'Guest': 'role-guest'
            };
            roleEl.classList.add(roleClassMap[user.role_name] || 'role-guest');
        }

        var dotCount = 0;
        setInterval(function() {
            dotCount = (dotCount + 1) % 4;
            document.getElementById('dots').textContent = '.'.repeat(dotCount);
        }, 500);

        (function() {
            var container = document.getElementById('particles');
            for (var i = 0; i < 20; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random()*100 + '%';
                p.style.animationDuration = (8+Math.random()*12) + 's';
                p.style.animationDelay = Math.random()*10 + 's';
                p.style.width = p.style.height = (1+Math.random()*3) + 'px';
                container.appendChild(p);
            }
        })();

        setTimeout(function() { window.location.href = 'dashboard.html'; }, 3000);
    </script>
</body>
</html>
