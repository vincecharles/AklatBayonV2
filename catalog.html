<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Catalog - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .catalog-header { background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%); color: #fff; padding: 40px 32px; border-radius: 0 0 16px 16px; margin: -24px -24px 24px; text-align: center; }
        .catalog-header h1 { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
        .catalog-header p { color: rgba(255,255,255,0.6); font-size: 14px; }
        .catalog-search { max-width: 500px; margin: 20px auto 0; position: relative; }
        .catalog-search input { width: 100%; padding: 14px 20px 14px 48px; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; backdrop-filter: blur(8px); }
        .catalog-search input::placeholder { color: rgba(255,255,255,0.4); }
        .catalog-search input:focus { outline: none; border-color: rgba(255,255,255,0.5); }
        .catalog-search i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); }
        .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .book-card { background: #fff; border-radius: 12px; border: 1px solid #e9ecef; padding: 24px; transition: all 0.2s; }
        .book-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .book-card .book-title { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
        .book-card .book-meta { font-size: 13px; color: #6c757d; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .book-card .book-avail { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; }
        .catalog-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .catalog-nav a { color: #0f3460; font-weight: 600; font-size: 14px; text-decoration: none; display: flex; align-items: center; gap: 6px; }
        .catalog-nav a:hover { text-decoration: underline; }
        .opac-filters { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 20px; padding: 16px; background: rgba(255,255,255,0.08); border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); }
        .opac-filters label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.5px; }
        .opac-filters select, .opac-filters input[type="number"] { padding: 8px 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.08); color: #fff; font-size: 13px; font-family: inherit; }
        .opac-filters select option { color: #333; background: #fff; }
        .opac-filters input[type="number"] { width: 80px; }
        .opac-filters .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .opac-filters .checkbox-group { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .opac-filters .checkbox-group input { width: 16px; height: 16px; }
        .new-arrivals-heading { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .new-arrivals-heading i { color: #0f3460; }
        .new-arrivals-heading .badge-new { background: linear-gradient(135deg, #e94560, #ff6b6b); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .book-card .book-call-number { font-size: 12px; color: #0f3460; background: rgba(15,52,96,0.08); padding: 3px 8px; border-radius: 6px; display: inline-block; margin-bottom: 8px; font-weight: 600; font-family: 'Courier New', monospace; }
        .avail-bar-wrap { margin-top: 8px; }
        .avail-bar { height: 6px; border-radius: 3px; background: #e9ecef; overflow: hidden; margin-top: 4px; }
        .avail-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
        .avail-bar-label { font-size: 11px; color: #6c757d; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <main class="main-content" style="margin-left:0;background:#f4f6f9">
        <div class="catalog-header">
            <h1><i class="fas fa-book-open" style="margin-right:12px"></i>AklatBayon Catalog</h1>
            <p>FEATI University Library — Browse our collection</p>
            <div class="catalog-search"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="Search books by title, author, or ISBN..."></div>
        </div>
        <div class="catalog-nav">
            <div>
                <select class="form-select" id="filter-cat" style="max-width:200px"><option value="">All Categories</option></select>
            </div>
            <div>
                <a href="index.html"><i class="fas fa-id-card"></i> RFID Tap</a>
                &nbsp;&nbsp;
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
            </div>
        </div>
        <div class="opac-filters" id="opac-filters">
            <div class="filter-group">
                <label>Author</label>
                <select id="filter-author"><option value="">All Authors</option></select>
            </div>
            <div class="filter-group">
                <label>Publisher</label>
                <select id="filter-publisher"><option value="">All Publishers</option></select>
            </div>
            <div class="filter-group">
                <label>Year From</label>
                <input type="number" id="filter-year-min" placeholder="Min" min="0" max="9999">
            </div>
            <div class="filter-group">
                <label>Year To</label>
                <input type="number" id="filter-year-max" placeholder="Max" min="0" max="9999">
            </div>
            <div class="filter-group">
                <label>Sort By</label>
                <select id="filter-sort">
                    <option value="title-az">Title A-Z</option>
                    <option value="title-za">Title Z-A</option>
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="most-borrowed">Most Borrowed</option>
                </select>
            </div>
            <div class="filter-group" style="justify-content:flex-end">
                <label>&nbsp;</label>
                <label class="checkbox-group">
                    <input type="checkbox" id="filter-available">
                    <span style="font-size:13px;color:#fff;text-transform:none;letter-spacing:0;font-weight:400">Show only available</span>
                </label>
            </div>
        </div>
        <div id="new-arrivals" style="margin-bottom: 24px; display: none;">
            <h5 class="new-arrivals-heading"><i class="fas fa-sparkles"></i> New Arrivals <span class="badge-new">New</span></h5>
            <div class="book-grid" id="new-arrivals-grid"></div>
        </div>
        <div id="did-you-mean" style="display:none; text-align:center; padding: 12px; color: rgba(255,255,255,0.7); font-size: 14px;">Did you mean: <a href="#" id="dym-link" style="color: #64b5f6; font-weight: 600;"></a>?</div>
        <div class="book-grid" id="book-grid"></div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // ── Populate filter dropdowns ───────────────────────────────
        var categories = Store.getAll('categories');
        var fcat = document.getElementById('filter-cat');
        categories.forEach(function(c) { fcat.innerHTML += '<option value="' + c.id + '">' + c.name + '</option>'; });

        var authors = Store.getAll('authors');
        var fauthor = document.getElementById('filter-author');
        authors.sort(function(a, b) { return a.name.localeCompare(b.name); });
        authors.forEach(function(a) { fauthor.innerHTML += '<option value="' + a.id + '">' + a.name + '</option>'; });

        var publishers = Store.getAll('publishers');
        var fpub = document.getElementById('filter-publisher');
        publishers.sort(function(a, b) { return a.name.localeCompare(b.name); });
        publishers.forEach(function(p) { fpub.innerHTML += '<option value="' + p.id + '">' + p.name + '</option>'; });

        // ── Levenshtein distance ────────────────────────────────────
        function levenshtein(a, b) {
            var m = a.length, n = b.length;
            var dp = [];
            for (var i = 0; i <= m; i++) {
                dp[i] = [i];
                for (var j = 1; j <= n; j++) {
                    if (i === 0) { dp[i][j] = j; continue; }
                    var cost = a[i - 1] === b[j - 1] ? 0 : 1;
                    dp[i][j] = Math.min(
                        dp[i - 1][j] + 1,
                        dp[i][j - 1] + 1,
                        dp[i - 1][j - 1] + cost
                    );
                }
            }
            return dp[m][n];
        }

        // ── Build a single book card ────────────────────────────────
        function buildBookCard(b) {
            var availColor = b.available > 0 ? '#28a745' : '#dc3545';
            var availText = b.available > 0 ? b.available + ' available' : 'Unavailable';
            var pct = b.copies > 0 ? Math.round((b.available / b.copies) * 100) : 0;
            var barColor = pct > 50 ? '#28a745' : pct > 20 ? '#ffc107' : '#dc3545';
            return '<div class="book-card">' +
                (b.call_number ? '<div class="book-call-number"><i class="fas fa-hashtag" style="font-size:10px;margin-right:3px"></i>' + b.call_number + '</div>' : '') +
                '<div class="book-title">' + b.title + '</div>' +
                '<div class="book-meta"><i class="fas fa-pen-fancy"></i> ' + App.getAuthorName(b.author_id) + '</div>' +
                '<div class="book-meta"><i class="fas fa-building"></i> ' + App.getPublisherName(b.publisher_id) + '</div>' +
                '<div class="book-meta"><i class="fas fa-tag"></i> ' + App.getCategoryName(b.category_id) + '</div>' +
                '<div class="book-meta"><i class="fas fa-barcode"></i> ' + b.isbn + '</div>' +
                '<div class="book-meta"><i class="fas fa-calendar"></i> ' + b.year + '</div>' +
                '<div class="book-avail"><span class="badge" style="background:' + availColor + '">' + availText + '</span><span class="small text-muted">' + b.copies + ' total copies</span></div>' +
                '<div class="avail-bar-wrap">' +
                    '<div class="avail-bar-label"><span>' + b.available + ' of ' + b.copies + '</span><span>' + pct + '%</span></div>' +
                    '<div class="avail-bar"><div class="avail-bar-fill" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
                '</div>' +
            '</div>';
        }

        // ── New Arrivals (books added in last 30 days) ──────────────
        function loadNewArrivals() {
            var allBooks = Store.getAll('books');
            var now = new Date();
            var thirtyDaysAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
            var newBooks = allBooks.filter(function(b) {
                return b.created_at && new Date(b.created_at) >= thirtyDaysAgo;
            });
            var container = document.getElementById('new-arrivals');
            var grid = document.getElementById('new-arrivals-grid');
            if (newBooks.length === 0) {
                container.style.display = 'none';
                return;
            }
            newBooks.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });
            container.style.display = 'block';
            grid.innerHTML = newBooks.map(buildBookCard).join('');
        }

        // ── Main load function ──────────────────────────────────────
        function load() {
            var books = Store.getAll('books');
            var s = document.getElementById('search-input').value.toLowerCase();
            var cf = document.getElementById('filter-cat').value;
            var af = document.getElementById('filter-author').value;
            var pf = document.getElementById('filter-publisher').value;
            var yearMin = document.getElementById('filter-year-min').value;
            var yearMax = document.getElementById('filter-year-max').value;
            var sortBy = document.getElementById('filter-sort').value;
            var onlyAvail = document.getElementById('filter-available').checked;

            // Text search
            if (s) books = books.filter(function(b) { return b.title.toLowerCase().indexOf(s) !== -1 || b.isbn.toLowerCase().indexOf(s) !== -1 || App.getAuthorName(b.author_id).toLowerCase().indexOf(s) !== -1; });

            // Category filter
            if (cf) books = books.filter(function(b) { return b.category_id === cf; });

            // Author filter
            if (af) books = books.filter(function(b) { return b.author_id === af; });

            // Publisher filter
            if (pf) books = books.filter(function(b) { return b.publisher_id === pf; });

            // Year range filter
            if (yearMin) books = books.filter(function(b) { return b.year >= parseInt(yearMin, 10); });
            if (yearMax) books = books.filter(function(b) { return b.year <= parseInt(yearMax, 10); });

            // Availability filter
            if (onlyAvail) books = books.filter(function(b) { return b.available > 0; });

            // Sorting
            if (sortBy === 'title-az') {
                books.sort(function(a, b) { return a.title.localeCompare(b.title); });
            } else if (sortBy === 'title-za') {
                books.sort(function(a, b) { return b.title.localeCompare(a.title); });
            } else if (sortBy === 'newest') {
                books.sort(function(a, b) { return (b.year || 0) - (a.year || 0); });
            } else if (sortBy === 'oldest') {
                books.sort(function(a, b) { return (a.year || 0) - (b.year || 0); });
            } else if (sortBy === 'most-borrowed') {
                var txns = Store.getAll('transactions');
                books.sort(function(a, b) {
                    var aCount = txns.filter(function(t) { return t.book_id === a.id; }).length;
                    var bCount = txns.filter(function(t) { return t.book_id === b.id; }).length;
                    return bCount - aCount;
                });
            }

            var grid = document.getElementById('book-grid');
            var dymContainer = document.getElementById('did-you-mean');
            dymContainer.style.display = 'none';

            if (!books.length) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-search"></i><p>No books found.</p></div>';

                // "Did you mean?" suggestions
                if (s) {
                    var allBooks = Store.getAll('books');
                    var bestMatch = null;
                    var bestDist = Infinity;
                    allBooks.forEach(function(b) {
                        var titleLower = b.title.toLowerCase();
                        var dist = levenshtein(s, titleLower);
                        // Also check individual words in the title
                        var words = titleLower.split(/\s+/);
                        words.forEach(function(w) {
                            var wDist = levenshtein(s, w);
                            if (wDist < dist) dist = wDist;
                        });
                        if (dist < bestDist) {
                            bestDist = dist;
                            bestMatch = b.title;
                        }
                    });
                    if (bestMatch && bestDist < 4) {
                        var dymLink = document.getElementById('dym-link');
                        dymLink.textContent = bestMatch;
                        dymContainer.style.display = 'block';
                    }
                }
                return;
            }

            grid.innerHTML = books.map(buildBookCard).join('');
        }

        // ── "Did you mean" click handler ────────────────────────────
        document.getElementById('dym-link').addEventListener('click', function(e) {
            e.preventDefault();
            var suggestion = this.textContent;
            document.getElementById('search-input').value = suggestion;
            document.getElementById('did-you-mean').style.display = 'none';
            load();
        });

        // ── Bind all filter events ──────────────────────────────────
        document.getElementById('search-input').addEventListener('input', load);
        document.getElementById('filter-cat').addEventListener('change', load);
        document.getElementById('filter-author').addEventListener('change', load);
        document.getElementById('filter-publisher').addEventListener('change', load);
        document.getElementById('filter-year-min').addEventListener('input', load);
        document.getElementById('filter-year-max').addEventListener('input', load);
        document.getElementById('filter-sort').addEventListener('change', load);
        document.getElementById('filter-available').addEventListener('change', load);

        // ── Initial render ──────────────────────────────────────────
        loadNewArrivals();
        load();
    </script>
</body>
</html>
