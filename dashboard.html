<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="page-header">
            <div>
                <h1>Dashboard</h1>
                <p class="text-muted" id="welcome-text"></p>
            </div>
        </div>
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon" style="background:#0f3460"><i class="fas fa-book"></i></div>
                        <div class="ms-3">
                            <div class="stat-number" id="stat-books">0</div>
                            <div class="stat-label">Total Books</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon" style="background:#28a745"><i class="fas fa-user-graduate"></i></div>
                        <div class="ms-3">
                            <div class="stat-number" id="stat-students">0</div>
                            <div class="stat-label">Active Students</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon" style="background:#ffc107"><i class="fas fa-hand-holding"></i></div>
                        <div class="ms-3">
                            <div class="stat-number" id="stat-issued">0</div>
                            <div class="stat-label">Books Issued</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon" style="background:#dc3545"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="ms-3">
                            <div class="stat-number" id="stat-overdue">0</div>
                            <div class="stat-label">Overdue Books</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon" style="background:#17a2b8"><i class="fas fa-calendar-day"></i></div>
                        <div class="ms-3">
                            <div class="stat-number" id="stat-due-today">0</div>
                            <div class="stat-label">Due Today</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon" style="background:#6f42c1"><i class="fas fa-bookmark"></i></div>
                        <div class="ms-3">
                            <div class="stat-number" id="stat-reservations">0</div>
                            <div class="stat-label">Active Reservations</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon" style="background:#e94560"><i class="fas fa-receipt"></i></div>
                        <div class="ms-3">
                            <div class="stat-number" id="stat-pending-fines">0</div>
                            <div class="stat-label">Pending Fines</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="d-flex align-items-center">
                        <div class="stat-icon" style="background:#333"><i class="fas fa-peso-sign"></i></div>
                        <div class="ms-3">
                            <div class="stat-number" id="stat-fine-total">₱0</div>
                            <div class="stat-label">Uncollected Fines</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="overdue-alert-area" class="mb-4"></div>
        <div class="row g-4 mb-4">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header"><i class="fas fa-clock me-2"></i>Recent Activity</div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table">
                                <thead><tr><th>Date</th><th>User</th><th>Action</th><th>Details</th></tr></thead>
                                <tbody id="activity-table"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header"><i class="fas fa-chart-pie me-2"></i>Collection Overview</div>
                    <div class="card-body">
                        <canvas id="chart-categories" height="220"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <h5 style="font-weight:700;color:#1a1a2e" class="mb-3">Quick Actions</h5>
        <div class="row g-4" id="quick-actions"></div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init();
        var user = Auth.getCurrentUser();
        document.getElementById('welcome-text').textContent = 'Welcome back, ' + user.name + '!';
        document.getElementById('stat-books').textContent = Store.count('books');
        document.getElementById('stat-students').textContent = Store.count('students');
        var txns = Store.getAll('transactions');
        var issued = txns.filter(function(t) { return t.status === 'borrowed'; }).length;
        var todayStr = new Date().toISOString().split('T')[0];
        var overdue = txns.filter(function(t) {
            return t.status === 'borrowed' && new Date(t.date_due) < new Date();
        }).length;
        var dueToday = txns.filter(function(t) {
            return t.status === 'borrowed' && t.date_due === todayStr;
        }).length;
        document.getElementById('stat-issued').textContent = issued;
        document.getElementById('stat-overdue').textContent = overdue;
        document.getElementById('stat-due-today').textContent = dueToday;

        // Active reservations count
        var activeReservations = Store.getAll('reservations').filter(function(r) {
            return r.status === 'active' || r.status === 'available';
        }).length;
        document.getElementById('stat-reservations').textContent = activeReservations;

        // Expire stale reservations
        Store.expireReservations();

        // Process overdue fines automatically
        var newFinesCount = Store.processOverdueFines();

        // Pending fines stats
        var allFines = Store.getAll('fines');
        var pendingFines = allFines.filter(function(f) { return f.status === 'pending'; });
        var pendingTotal = pendingFines.reduce(function(sum, f) { return sum + (parseFloat(f.amount) || 0); }, 0);
        document.getElementById('stat-pending-fines').textContent = pendingFines.length;
        document.getElementById('stat-fine-total').textContent = '₱' + pendingTotal.toFixed(0);

        // Show overdue alert if there are new auto-generated fines
        var alertArea = document.getElementById('overdue-alert-area');
        if (newFinesCount > 0) {
            alertArea.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i><strong>' + newFinesCount + ' new fine(s)</strong> auto-generated for overdue books. <a href="fines.html" style="color:#721c24;font-weight:600;text-decoration:underline">View Fines</a></div>';
        } else if (overdue > 0) {
            alertArea.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-triangle me-2"></i><strong>' + overdue + ' book(s)</strong> are currently overdue. <a href="circulation.html" style="color:#721c24;font-weight:600;text-decoration:underline">View Circulation</a></div>';
        }
        if (dueToday > 0) {
            alertArea.innerHTML += '<div class="alert alert-info"><i class="fas fa-calendar-day me-2"></i><strong>' + dueToday + ' book(s)</strong> are due today. <a href="circulation.html" style="color:#0c5460;font-weight:600;text-decoration:underline">View Circulation</a></div>';
        }

        var allLogs = Store.getAll('audit_logs');
        // Admin, Head Librarian, Librarian Staff see all activity; others see only their own
        var privilegedRoles = ['r1', 'r2', 'r3'];
        var logs;
        if (privilegedRoles.indexOf(user.role_id) !== -1) {
            logs = allLogs.slice(0, 10);
        } else {
            logs = allLogs.filter(function(l) { return l.user === user.name; }).slice(0, 10);
        }
        var tbody = document.getElementById('activity-table');
        if (logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No recent activity found.</td></tr>';
        } else {
            logs.forEach(function(log) {
                tbody.innerHTML += '<tr><td>' + App.formatDateTime(log.created_at) + '</td><td>' + log.user + '</td><td><span class="badge bg-primary">' + log.action + '</span></td><td>' + log.details + '</td></tr>';
            });
        }

        var categories = Store.getAll('categories');
        var books = Store.getAll('books');
        var catLabels = categories.map(function(c) { return c.name; });
        var catCounts = categories.map(function(c) {
            return books.filter(function(b) { return b.category_id === c.id; }).length;
        });
        new Chart(document.getElementById('chart-categories'), {
            type: 'doughnut',
            data: {
                labels: catLabels,
                datasets: [{ data: catCounts, backgroundColor: ['#e94560','#0f3460','#28a745','#ffc107','#17a2b8','#6f42c1'] }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 12 } } } } }
        });

        var actionsHtml = '';
        if (Auth.hasPermission('can_add_books')) {
            actionsHtml += '<div class="col-md-3"><a href="books.html" class="quick-action"><i class="fas fa-plus-circle" style="color:#0f3460"></i><div class="action-title">Add Book</div></a></div>';
        }
        if (Auth.hasPermission('can_manage_students')) {
            actionsHtml += '<div class="col-md-3"><a href="students.html" class="quick-action"><i class="fas fa-user-plus" style="color:#28a745"></i><div class="action-title">Add Student</div></a></div>';
        }
        if (Auth.hasPermission('can_issue_books')) {
            actionsHtml += '<div class="col-md-3"><a href="circulation.html" class="quick-action"><i class="fas fa-hand-holding" style="color:#ffc107"></i><div class="action-title">Issue Book</div></a></div>';
        }
        if (Auth.hasPermission('can_return_books')) {
            actionsHtml += '<div class="col-md-3"><a href="circulation.html" class="quick-action"><i class="fas fa-undo" style="color:#dc3545"></i><div class="action-title">Return Book</div></a></div>';
        }
        if (Auth.hasPermission('can_browse_catalog')) {
            actionsHtml += '<div class="col-md-3"><a href="books.html" class="quick-action"><i class="fas fa-search" style="color:#17a2b8"></i><div class="action-title">Browse Catalog</div></a></div>';
        }
        if (Auth.hasPermission('can_reserve_books')) {
            actionsHtml += '<div class="col-md-3"><a href="reservations.html" class="quick-action"><i class="fas fa-bookmark" style="color:#6f42c1"></i><div class="action-title">Reservations</div></a></div>';
        }
        document.getElementById('quick-actions').innerHTML = actionsHtml || '<div class="col-md-12"><div class="empty-state"><i class="fas fa-ban"></i><p>No quick actions available for your role.</p></div></div>';
    </script>
</body>
</html>
