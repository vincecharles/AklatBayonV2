<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Reservations - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="page-header"><h1><i class="fas fa-bookmark me-2"></i>Book Reservations</h1></div>
        <div class="nav-tabs" id="nav-tabs"></div>
        <div class="tab-pane active" id="tab-reserve">
            <div class="card">
                <div class="card-header"><i class="fas fa-plus-circle me-2"></i>Reserve a Book</div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6"><div class="form-group"><label>Student</label><select class="form-select" id="reserve-student"><option value="">-- Select Student --</option></select></div></div>
                        <div class="col-md-6"><div class="form-group"><label>Book</label><select class="form-select" id="reserve-book"><option value="">-- Select Book --</option></select></div></div>
                    </div>
                    <button class="btn btn-success" id="btn-reserve"><i class="fas fa-bookmark me-1"></i> Place Reservation</button>
                </div>
            </div>
        </div>
        <div class="tab-pane" id="tab-my">
            <div class="card">
                <div class="card-header"><i class="fas fa-list me-2"></i>My Reservations</div>
                <div class="card-body p-0"><div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>#</th><th>Book</th><th>Status</th><th>Position in Queue</th><th>Reserved Date</th><th>Expires At</th><th>Actions</th></tr></thead>
                        <tbody id="my-reservations-table"></tbody>
                    </table>
                </div></div>
            </div>
        </div>
        <div class="tab-pane" id="tab-queue">
            <div class="card">
                <div class="card-header"><i class="fas fa-layer-group me-2"></i>Reservation Queue</div>
                <div class="card-body p-0"><div class="table-responsive">
                    <div id="queue-container"></div>
                </div></div>
            </div>
        </div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init();

        var user = Auth.getCurrentUser();
        var canReserve = Auth.hasPermission('can_reserve_books');
        var canIssue = Auth.hasPermission('can_issue_books');

        // ── Build tabs dynamically based on permissions ──
        var tabsHtml = '';
        if (canReserve) {
            tabsHtml += '<button class="nav-tab active" data-tab="reserve">Reserve a Book</button>';
        }
        tabsHtml += '<button class="nav-tab' + (!canReserve ? ' active' : '') + '" data-tab="my">My Reservations</button>';
        if (canIssue) {
            tabsHtml += '<button class="nav-tab" data-tab="queue">Reservation Queue</button>';
        }
        document.getElementById('nav-tabs').innerHTML = tabsHtml;

        // If user cannot reserve, hide the reserve tab and make My Reservations active
        if (!canReserve) {
            document.getElementById('tab-reserve').style.display = 'none';
            document.getElementById('tab-reserve').classList.remove('active');
            document.getElementById('tab-my').classList.add('active');
        }
        // Hide queue tab pane if no permission
        if (!canIssue) {
            document.getElementById('tab-queue').style.display = 'none';
        }

        // ── Tab switching ──
        document.querySelectorAll('.nav-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
                if (this.dataset.tab === 'my') loadMyReservations();
                if (this.dataset.tab === 'queue') loadQueue();
            });
        });

        // ── Tab 1: Reserve a Book ──
        if (canReserve) {
            var students = Store.getAll('students');
            var books = Store.getAll('books');
            var ssel = document.getElementById('reserve-student');
            var bsel = document.getElementById('reserve-book');

            students.forEach(function(s) {
                ssel.innerHTML += '<option value="' + s.id + '">' + s.student_id + ' — ' + s.name + '</option>';
            });

            books.forEach(function(b) {
                var label = b.available > 0
                    ? b.title + ' (Available: ' + b.available + ')'
                    : b.title + ' (All copies out — reservable)';
                bsel.innerHTML += '<option value="' + b.id + '" data-available="' + b.available + '">' + label + '</option>';
            });

            document.getElementById('btn-reserve').addEventListener('click', function() {
                var studentId = document.getElementById('reserve-student').value;
                var bookId = document.getElementById('reserve-book').value;
                if (!studentId || !bookId) { App.showAlert('danger', 'Please select both a student and a book.'); return; }

                // Check: only allow reservation if ALL copies are currently checked out
                var book = Store.getById('books', bookId);
                if (!book) { App.showAlert('danger', 'Book not found.'); return; }
                if (book.available > 0) {
                    App.showAlert('danger', 'This book still has available copies (' + book.available + '). Reservations are only allowed when all copies are checked out.');
                    return;
                }

                // Check max reservation limit based on role
                var roleKey = Store.getBorrowerRoleKey(studentId);
                var isFaculty = roleKey.indexOf('faculty') !== -1;
                var maxSetting = isFaculty ? 'reservation_max_faculty' : 'reservation_max_student';
                var maxReservations = parseInt(Store.getSetting(maxSetting)) || (isFaculty ? 5 : 2);
                var activeCount = Store.getActiveReservationCount(studentId);

                if (activeCount >= maxReservations) {
                    App.showAlert('danger', 'This ' + (isFaculty ? 'faculty member' : 'student') + ' has reached the maximum reservation limit (' + maxReservations + ').');
                    return;
                }

                // Check no duplicate reservation for same student+book combo
                var allReservations = Store.getAll('reservations');
                var duplicate = allReservations.find(function(r) {
                    return r.student_id === studentId && r.book_id === bookId && (r.status === 'active' || r.status === 'available');
                });
                if (duplicate) {
                    App.showAlert('danger', 'This student already has an active reservation for this book.');
                    return;
                }

                // Create reservation
                Store.create('reservations', {
                    student_id: studentId,
                    book_id: bookId,
                    status: 'active',
                    notified_at: null,
                    expires_at: null
                }).then(function(result) {
                    App.showAlert('success', 'Reservation placed successfully!');
                    var studentName = App.getStudentName(studentId);
                    var bookTitle = App.getBookTitle(bookId);
                    var queue = Store.getReservationQueue(bookId);
                    Swal.fire({
                        icon: 'success',
                        title: 'Reservation Placed!',
                        text: bookTitle + ' reserved for ' + studentName + '. Position in queue: #' + queue.length,
                        timer: 3000,
                        showConfirmButton: false
                    });
                    // Refresh book dropdown to reflect updated data
                    refreshBookDropdown();
                }).catch(function(err) {
                    App.showAlert('danger', err.message || 'Failed to create reservation.');
                });
            });
        }

        function refreshBookDropdown() {
            var bsel = document.getElementById('reserve-book');
            if (!bsel) return;
            var books = Store.getAll('books');
            bsel.innerHTML = '<option value="">-- Select Book --</option>';
            books.forEach(function(b) {
                var label = b.available > 0
                    ? b.title + ' (Available: ' + b.available + ')'
                    : b.title + ' (All copies out — reservable)';
                bsel.innerHTML += '<option value="' + b.id + '" data-available="' + b.available + '">' + label + '</option>';
            });
        }

        // ── Tab 2: My Reservations ──
        function loadMyReservations() {
            // Auto-expire any past-due reservations
            var expiredCount = Store.expireReservations();
            if (expiredCount > 0) {
                App.showAlert('info', expiredCount + ' reservation(s) expired automatically.');
            }

            var allReservations = Store.getAll('reservations');
            var items;

            // Staff with can_issue_books see ALL reservations; otherwise only own
            if (canIssue) {
                items = allReservations;
            } else {
                items = allReservations.filter(function(r) {
                    return r.student_id === user.student_id;
                });
            }

            // Sort by created_at descending (newest first)
            items.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });

            var tbody = document.getElementById('my-reservations-table');
            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No reservations found.</td></tr>';
                return;
            }

            var statusClasses = {
                active: 'bg-primary',
                available: 'bg-success',
                claimed: 'bg-info',
                expired: 'bg-danger',
                cancelled: 'bg-secondary'
            };

            tbody.innerHTML = items.map(function(r, i) {
                var queue = Store.getReservationQueue(r.book_id);
                var position = '—';
                for (var q = 0; q < queue.length; q++) {
                    if (queue[q].id === r.id) { position = '#' + (q + 1); break; }
                }
                if (r.status === 'claimed' || r.status === 'expired' || r.status === 'cancelled') {
                    position = '—';
                }

                var badgeClass = statusClasses[r.status] || 'bg-secondary';
                var statusLabel = r.status.charAt(0).toUpperCase() + r.status.slice(1);

                var bookLabel = App.getBookTitle(r.book_id);
                if (canIssue) {
                    bookLabel = App.getStudentName(r.student_id) + ' — ' + bookLabel;
                }

                var actions = '';
                if (r.status === 'active' || r.status === 'available') {
                    actions = '<button class="btn btn-sm btn-danger btn-cancel-my" data-id="' + r.id + '"><i class="fas fa-times me-1"></i>Cancel</button>';
                } else {
                    actions = '<span class="text-muted small">No actions</span>';
                }

                return '<tr>' +
                    '<td>' + (i + 1) + '</td>' +
                    '<td>' + bookLabel + '</td>' +
                    '<td><span class="badge ' + badgeClass + '">' + statusLabel + '</span></td>' +
                    '<td>' + position + '</td>' +
                    '<td>' + App.formatDate(r.created_at) + '</td>' +
                    '<td>' + App.formatDateTime(r.expires_at) + '</td>' +
                    '<td>' + actions + '</td>' +
                    '</tr>';
            }).join('');

            // Bind cancel buttons
            document.querySelectorAll('.btn-cancel-my').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var resId = this.dataset.id;
                    Swal.fire({
                        title: 'Cancel Reservation?',
                        text: 'Are you sure you want to cancel this reservation?',
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#e94560',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'Yes, cancel it'
                    }).then(function(result) {
                        if (result.isConfirmed) {
                            Store.update('reservations', resId, { status: 'cancelled' }).then(function() {
                                App.showAlert('success', 'Reservation cancelled.');
                                loadMyReservations();
                            });
                        }
                    });
                });
            });
        }

        // ── Tab 3: Reservation Queue (staff only) ──
        function loadQueue() {
            // Auto-expire first
            Store.expireReservations();

            var allReservations = Store.getAll('reservations');
            var activeReservations = allReservations.filter(function(r) {
                return r.status === 'active' || r.status === 'available';
            });

            var container = document.getElementById('queue-container');
            if (!activeReservations.length) {
                container.innerHTML = '<div class="text-center text-muted py-4">No active reservations in queue.</div>';
                return;
            }

            // Group by book_id
            var bookGroups = {};
            activeReservations.forEach(function(r) {
                if (!bookGroups[r.book_id]) bookGroups[r.book_id] = [];
                bookGroups[r.book_id].push(r);
            });

            // Sort each group by created_at (FIFO)
            Object.keys(bookGroups).forEach(function(bookId) {
                bookGroups[bookId].sort(function(a, b) {
                    return new Date(a.created_at) - new Date(b.created_at);
                });
            });

            var statusClasses = {
                active: 'bg-primary',
                available: 'bg-success'
            };

            var html = '';
            Object.keys(bookGroups).forEach(function(bookId) {
                var bookTitle = App.getBookTitle(bookId);
                var book = Store.getById('books', bookId);
                var availableLabel = book ? ' (Available copies: ' + book.available + ')' : '';
                var queue = bookGroups[bookId];

                html += '<div style="margin-bottom:24px">';
                html += '<h3 style="padding:12px 16px;margin:0;font-size:15px;border-bottom:1px solid var(--border-color,#e0e0e0)"><i class="fas fa-book me-2"></i>' + bookTitle + availableLabel + ' <span class="badge bg-primary" style="font-size:11px">' + queue.length + ' in queue</span></h3>';
                html += '<table class="table"><thead><tr><th>Queue #</th><th>Student</th><th>Status</th><th>Reserved Date</th><th>Expires At</th><th>Actions</th></tr></thead><tbody>';

                queue.forEach(function(r, idx) {
                    var badgeClass = statusClasses[r.status] || 'bg-secondary';
                    var statusLabel = r.status.charAt(0).toUpperCase() + r.status.slice(1);
                    var studentName = App.getStudentName(r.student_id);

                    var actions = '';
                    if (r.status === 'active') {
                        actions += '<button class="btn btn-sm btn-success btn-notify" data-id="' + r.id + '" data-book="' + r.book_id + '"><i class="fas fa-bell me-1"></i>Notify Available</button> ';
                        actions += '<button class="btn btn-sm btn-danger btn-cancel-queue" data-id="' + r.id + '"><i class="fas fa-times me-1"></i>Cancel</button>';
                    } else if (r.status === 'available') {
                        actions += '<button class="btn btn-sm btn-info btn-claim" data-id="' + r.id + '"><i class="fas fa-check-circle me-1"></i>Mark Claimed</button> ';
                        actions += '<button class="btn btn-sm btn-danger btn-cancel-queue" data-id="' + r.id + '"><i class="fas fa-times me-1"></i>Cancel</button>';
                    }

                    html += '<tr>' +
                        '<td>#' + (idx + 1) + '</td>' +
                        '<td>' + studentName + '</td>' +
                        '<td><span class="badge ' + badgeClass + '">' + statusLabel + '</span></td>' +
                        '<td>' + App.formatDate(r.created_at) + '</td>' +
                        '<td>' + App.formatDateTime(r.expires_at) + '</td>' +
                        '<td>' + actions + '</td>' +
                        '</tr>';
                });

                html += '</tbody></table></div>';
            });

            container.innerHTML = html;

            // Bind "Notify Available" buttons
            document.querySelectorAll('.btn-notify').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var resId = this.dataset.id;
                    var bookId = this.dataset.book;
                    var expiryHours = parseInt(Store.getSetting('reservation_expiry_hours')) || 48;
                    var expiresAt = new Date();
                    expiresAt.setHours(expiresAt.getHours() + expiryHours);

                    Store.update('reservations', resId, {
                        status: 'available',
                        notified_at: new Date().toISOString(),
                        expires_at: expiresAt.toISOString()
                    }).then(function() {
                        App.showAlert('success', 'Student notified. Reservation expires in ' + expiryHours + ' hours.');
                        Swal.fire({
                            icon: 'info',
                            title: 'Student Notified',
                            text: 'The student has been notified that ' + App.getBookTitle(bookId) + ' is available. They have ' + expiryHours + ' hours to claim it.',
                            timer: 3000,
                            showConfirmButton: false
                        });
                        loadQueue();
                    });
                });
            });

            // Bind "Mark Claimed" buttons
            document.querySelectorAll('.btn-claim').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var resId = this.dataset.id;
                    Swal.fire({
                        title: 'Mark as Claimed?',
                        text: 'Confirm that this reservation has been claimed by the student.',
                        icon: 'question',
                        showCancelButton: true,
                        confirmButtonColor: '#17a2b8',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'Yes, mark claimed'
                    }).then(function(result) {
                        if (result.isConfirmed) {
                            Store.update('reservations', resId, { status: 'claimed' }).then(function() {
                                App.showAlert('success', 'Reservation marked as claimed.');
                                loadQueue();
                            });
                        }
                    });
                });
            });

            // Bind "Cancel" buttons in queue
            document.querySelectorAll('.btn-cancel-queue').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var resId = this.dataset.id;
                    Swal.fire({
                        title: 'Cancel Reservation?',
                        text: 'Are you sure you want to cancel this reservation?',
                        icon: 'warning',
                        showCancelButton: true,
                        confirmButtonColor: '#e94560',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'Yes, cancel it'
                    }).then(function(result) {
                        if (result.isConfirmed) {
                            Store.update('reservations', resId, { status: 'cancelled' }).then(function() {
                                App.showAlert('success', 'Reservation cancelled.');
                                loadQueue();
                            });
                        }
                    });
                });
            });
        }

        // ── Initial load for the default active tab ──
        if (canReserve) {
            // Reserve tab is active by default
        } else {
            loadMyReservations();
        }
    </script>
</body>
</html>
