<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circulation - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .scanner-bar { background: #fff; border: 1px solid #e9ecef; border-radius: 10px; padding: 14px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .scanner-bar i.fa-barcode { font-size: 20px; color: var(--primary-blue); }
        .scanner-bar input { flex: 1; padding: 10px 14px; border: 1px solid #dee2e6; border-radius: 6px; font-size: 14px; font-family: inherit; }
        .scanner-bar input:focus { outline: none; border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(15,52,96,0.12); }
        .scanner-bar .scan-hint { font-size: 11px; color: var(--gray); white-space: nowrap; }
        .reservation-notice { background: #e8f4f8; border: 1px solid #b8daef; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--primary-blue); }
        .reservation-notice i { font-size: 16px; }
        body.dark-mode .scanner-bar { background: #1e1e30; border-color: #2a2a40; }
        body.dark-mode .scanner-bar input { background: #252540; border-color: #353550; color: #e0e4ec; }
        body.dark-mode .reservation-notice { background: rgba(15,52,96,0.2); border-color: rgba(15,52,96,0.4); color: #7db8e0; }
    </style>
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="page-header"><h1><i class="fas fa-exchange-alt me-2"></i>Circulation</h1></div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="issue">Issue Book</button>
            <button class="nav-tab" data-tab="return">Return Book</button>
            <button class="nav-tab" data-tab="history">Borrowing History</button>
        </div>
        <div class="tab-pane active" id="tab-issue">
            <div class="card">
                <div class="card-header"><i class="fas fa-hand-holding me-2"></i>Issue a Book</div>
                <div class="card-body">
                    <div class="scanner-bar">
                        <i class="fas fa-barcode"></i>
                        <input type="text" id="scan-issue-isbn" placeholder="Scan barcode or type ISBN to auto-select book...">
                        <span class="scan-hint">Press Enter after scan</span>
                    </div>
                    <div class="row">
                        <div class="col-md-6"><div class="form-group"><label>Student</label><select class="form-select" id="issue-student"></select></div></div>
                        <div class="col-md-6"><div class="form-group"><label>Book</label><select class="form-select" id="issue-book"></select></div></div>
                    </div>
                    <div class="row">
                        <div class="col-md-6"><div class="form-group"><label>Date Issued</label><input class="form-control" id="issue-date" type="date"></div></div>
                        <div class="col-md-6"><div class="form-group"><label>Due Date</label><input class="form-control" id="issue-due" type="date"></div></div>
                    </div>
                    <button class="btn btn-success" id="btn-issue"><i class="fas fa-check me-1"></i> Issue Book</button>
                </div>
            </div>
        </div>
        <div class="tab-pane" id="tab-return">
            <div class="card">
                <div class="card-header"><i class="fas fa-undo me-2"></i>Return a Book</div>
                <div class="card-body">
                    <div class="scanner-bar">
                        <i class="fas fa-barcode"></i>
                        <input type="text" id="scan-return-isbn" placeholder="Scan barcode to highlight borrowed book...">
                        <span class="scan-hint">Press Enter after scan</span>
                    </div>
                    <div id="reservation-notice-area"></div>
                    <div class="table-responsive">
                        <table class="table">
                            <thead><tr><th>Student</th><th>Book</th><th>Issued</th><th>Due</th><th>Renewals</th><th>Status</th><th>Actions</th></tr></thead>
                            <tbody id="return-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <div class="tab-pane" id="tab-history">
            <div class="card">
                <div class="card-header"><i class="fas fa-history me-2"></i>Borrowing History</div>
                <div class="card-body p-0"><div class="table-responsive">
                    <table class="table">
                        <thead><tr><th>#</th><th>Student</th><th>Book</th><th>Issued</th><th>Due</th><th>Returned</th><th>Renewals</th><th>Status</th></tr></thead>
                        <tbody id="history-table"></tbody>
                    </table>
                </div></div>
            </div>
        </div>
    </main>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init();

        // ── Tab switching ─────────────────────────────────────────
        document.querySelectorAll('.nav-tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
                document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
                if (this.dataset.tab === 'return') loadReturns();
                if (this.dataset.tab === 'history') loadHistory();
            });
        });

        // ── Populate dropdowns ────────────────────────────────────
        var students = Store.getAll('students'), books = Store.getAll('books');
        var ssel = document.getElementById('issue-student'), bsel = document.getElementById('issue-book');
        students.forEach(function(s) { ssel.innerHTML += '<option value="' + s.id + '">' + s.student_id + ' — ' + s.name + '</option>'; });
        function refreshBookDropdown() {
            var bks = Store.getAll('books');
            bsel.innerHTML = '';
            bks.filter(function(b) { return b.available > 0; }).forEach(function(b) {
                bsel.innerHTML += '<option value="' + b.id + '" data-isbn="' + b.isbn + '">' + b.title + ' (' + b.available + ' avail.)</option>';
            });
        }
        refreshBookDropdown();

        var today = new Date().toISOString().split('T')[0];
        var due = new Date(); due.setDate(due.getDate() + 14);
        document.getElementById('issue-date').value = today;
        document.getElementById('issue-due').value = due.toISOString().split('T')[0];

        // ── Barcode scanner for Issue tab ─────────────────────────
        document.getElementById('scan-issue-isbn').addEventListener('keydown', function(e) {
            if (e.key !== 'Enter') return;
            var isbn = this.value.trim().replace(/-/g, '');
            if (!isbn) return;
            var allBooks = Store.getAll('books');
            var found = allBooks.find(function(b) { return b.isbn.replace(/-/g, '') === isbn; });
            if (found) {
                bsel.value = found.id;
                if (!bsel.value) {
                    App.showAlert('info', 'Book "' + found.title + '" found but has 0 copies available.');
                } else {
                    App.showAlert('success', 'Book selected: ' + found.title);
                }
            } else {
                App.showAlert('danger', 'No book found with ISBN: ' + this.value.trim());
            }
            this.value = '';
        });

        // ── Barcode scanner for Return tab ────────────────────────
        document.getElementById('scan-return-isbn').addEventListener('keydown', function(e) {
            if (e.key !== 'Enter') return;
            var isbn = this.value.trim().replace(/-/g, '');
            if (!isbn) return;
            var allBooks = Store.getAll('books');
            var found = allBooks.find(function(b) { return b.isbn.replace(/-/g, '') === isbn; });
            if (found) {
                // Highlight matching rows
                var rows = document.querySelectorAll('#return-table tr');
                var matched = false;
                rows.forEach(function(row) {
                    var bookCell = row.cells && row.cells[1];
                    if (bookCell && bookCell.textContent === found.title) {
                        row.style.background = 'rgba(15,52,96,0.08)';
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        matched = true;
                    } else if (row.style) {
                        row.style.background = '';
                    }
                });
                if (matched) App.showAlert('success', 'Found: ' + found.title);
                else App.showAlert('info', 'Book "' + found.title + '" is not currently borrowed.');
            } else {
                App.showAlert('danger', 'No book found with that ISBN.');
            }
            this.value = '';
        });

        // ── Issue Book ────────────────────────────────────────────
        document.getElementById('btn-issue').addEventListener('click', function() {
            var studentId = document.getElementById('issue-student').value;
            var bookId = document.getElementById('issue-book').value;
            var dateIssued = document.getElementById('issue-date').value;
            var dateDue = document.getElementById('issue-due').value;
            if (!studentId || !bookId || !dateIssued || !dateDue) { App.showAlert('danger', 'Fill all fields.'); return; }

            // Check fine block threshold
            var fineThreshold = parseFloat(Store.getSetting('fine_block_threshold')) || 100;
            var totalFines = Store.getStudentFinesTotal(studentId);
            if (totalFines >= fineThreshold) {
                Swal.fire({ icon: 'error', title: 'Borrowing Blocked', text: 'This student has ₱' + totalFines.toFixed(2) + ' in unpaid fines (limit: ₱' + fineThreshold + '). Fines must be settled first.', confirmButtonColor: '#e94560' });
                return;
            }

            var book = Store.getById('books', bookId);
            if (!book || book.available <= 0) { App.showAlert('danger', 'Book not available.'); return; }
            Store.create('transactions', { student_id: studentId, book_id: bookId, type: 'borrow', date_issued: dateIssued, date_due: dateDue, date_returned: null, status: 'borrowed', renewal_count: 0 });
            Store.update('books', bookId, { available: book.available - 1 });
            refreshBookDropdown();
            App.showAlert('success', 'Book issued successfully!');
            Swal.fire({ icon: 'success', title: 'Book Issued!', text: book.title + ' issued to ' + App.getStudentName(studentId), timer: 2000, showConfirmButton: false });
        });

        // ── Return Tab ────────────────────────────────────────────
        function loadReturns() {
            var txns = Store.getAll('transactions').filter(function(t) { return t.status === 'borrowed'; });
            var tbody = document.getElementById('return-table');
            var noticeArea = document.getElementById('reservation-notice-area');
            noticeArea.innerHTML = '';

            // Check for books with active reservations
            var reservations = Store.getAll('reservations');
            var booksWithReservations = {};
            reservations.forEach(function(r) {
                if (r.status === 'active') {
                    if (!booksWithReservations[r.book_id]) booksWithReservations[r.book_id] = 0;
                    booksWithReservations[r.book_id]++;
                }
            });

            if (!txns.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No outstanding borrowings.</td></tr>'; return; }
            tbody.innerHTML = txns.map(function(t) {
                var isOverdue = new Date(t.date_due) < new Date();
                var renewals = t.renewal_count || 0;
                var hasReservation = booksWithReservations[t.book_id] > 0;
                var reservationBadge = hasReservation ? ' <span class="badge bg-info" style="font-size:10px" title="Has pending reservations"><i class="fas fa-bookmark"></i></span>' : '';

                var actions = '<button class="btn btn-sm btn-success btn-return" data-id="' + t.id + '" data-book="' + t.book_id + '"><i class="fas fa-undo me-1"></i>Return</button>';
                actions += ' <button class="btn btn-sm btn-outline-primary btn-renew" data-id="' + t.id + '" data-book="' + t.book_id + '" data-student="' + t.student_id + '" data-renewals="' + renewals + '"><i class="fas fa-sync me-1"></i>Renew</button>';

                return '<tr><td>' + App.getStudentName(t.student_id) + '</td><td>' + App.getBookTitle(t.book_id) + reservationBadge + '</td><td>' + App.formatDate(t.date_issued) + '</td><td>' + App.formatDate(t.date_due) + '</td><td><span class="badge bg-secondary">' + renewals + '</span></td><td><span class="badge ' + (isOverdue ? 'bg-danger' : 'bg-warning') + '">' + (isOverdue ? 'Overdue' : 'Borrowed') + '</span></td><td>' + actions + '</td></tr>';
            }).join('');

            // Bind return buttons
            document.querySelectorAll('.btn-return').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var txnId = this.dataset.id, bookId = this.dataset.book;
                    Store.update('transactions', txnId, { status: 'returned', date_returned: new Date().toISOString().split('T')[0] });
                    var book = Store.getById('books', bookId);
                    if (book) Store.update('books', bookId, { available: book.available + 1 });

                    // Check reservation queue for this book
                    var queue = Store.getReservationQueue(bookId);
                    if (queue.length > 0) {
                        var nextReservation = queue[0];
                        var expiryHours = parseInt(Store.getSetting('reservation_expiry_hours')) || 48;
                        var expiresAt = new Date();
                        expiresAt.setHours(expiresAt.getHours() + expiryHours);
                        Store.update('reservations', nextReservation.id, {
                            status: 'available',
                            notified_at: new Date().toISOString(),
                            expires_at: expiresAt.toISOString()
                        });
                        var studentName = App.getStudentName(nextReservation.student_id);
                        Swal.fire({
                            icon: 'info',
                            title: 'Reservation Triggered',
                            html: 'Book returned successfully.<br><br><strong>' + studentName + '</strong> has a reservation for <strong>' + App.getBookTitle(bookId) + '</strong>.<br>They have <strong>' + expiryHours + ' hours</strong> to claim it.',
                            confirmButtonColor: '#0f3460'
                        });
                    } else {
                        App.showAlert('success', 'Book returned successfully.');
                    }
                    refreshBookDropdown();
                    loadReturns();
                });
            });

            // Bind renew buttons
            document.querySelectorAll('.btn-renew').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var txnId = this.dataset.id;
                    var bookId = this.dataset.book;
                    var studentId = this.dataset.student;
                    var currentRenewals = parseInt(this.dataset.renewals) || 0;

                    // Get max renewals for this borrower's role
                    var roleKey = Store.getBorrowerRoleKey(studentId);
                    var maxRenewals = parseInt(Store.getSetting('borrow_' + roleKey + '_max_renewals')) || 1;
                    var loanDays = parseInt(Store.getSetting('borrow_' + roleKey + '_loan_days')) || 7;

                    // Check: max renewals reached?
                    if (currentRenewals >= maxRenewals) {
                        Swal.fire({ icon: 'error', title: 'Renewal Denied', text: 'Maximum renewals (' + maxRenewals + ') reached for this borrower role.', confirmButtonColor: '#e94560' });
                        return;
                    }

                    // Check: book has active reservations?
                    var queue = Store.getReservationQueue(bookId);
                    if (queue.length > 0) {
                        Swal.fire({ icon: 'error', title: 'Renewal Denied', text: 'This book has ' + queue.length + ' pending reservation(s). Cannot renew.', confirmButtonColor: '#e94560' });
                        return;
                    }

                    // Check: student has unpaid fines exceeding threshold?
                    var fineThreshold = parseFloat(Store.getSetting('fine_block_threshold')) || 100;
                    var totalFines = Store.getStudentFinesTotal(studentId);
                    if (totalFines >= fineThreshold) {
                        Swal.fire({ icon: 'error', title: 'Renewal Denied', text: 'Outstanding fines of ₱' + totalFines.toFixed(2) + ' exceed the ₱' + fineThreshold + ' limit.', confirmButtonColor: '#e94560' });
                        return;
                    }

                    // Do the renewal
                    var txn = Store.getById('transactions', txnId);
                    if (!txn) return;
                    var newDue = new Date(txn.date_due);
                    newDue.setDate(newDue.getDate() + loanDays);

                    Swal.fire({
                        title: 'Confirm Renewal',
                        html: 'Renew <strong>' + App.getBookTitle(bookId) + '</strong>?<br>New due date: <strong>' + newDue.toISOString().split('T')[0] + '</strong><br>Renewal ' + (currentRenewals + 1) + ' of ' + maxRenewals,
                        icon: 'question',
                        showCancelButton: true,
                        confirmButtonColor: '#0f3460',
                        confirmButtonText: 'Renew'
                    }).then(function(result) {
                        if (result.isConfirmed) {
                            Store.update('transactions', txnId, {
                                date_due: newDue.toISOString().split('T')[0],
                                renewal_count: currentRenewals + 1
                            });
                            Store.logActivity('RENEW', 'transactions', App.getBookTitle(bookId) + ' for ' + App.getStudentName(studentId));
                            App.showAlert('success', 'Book renewed! New due date: ' + App.formatDate(newDue.toISOString()));
                            loadReturns();
                        }
                    });
                });
            });
        }

        // ── History Tab ───────────────────────────────────────────
        function loadHistory() {
            var txns = Store.getAll('transactions');
            var tbody = document.getElementById('history-table');
            if (!txns.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No history.</td></tr>'; return; }
            tbody.innerHTML = txns.map(function(t, i) {
                var statusClass = t.status === 'returned' ? 'bg-success' : (new Date(t.date_due) < new Date() ? 'bg-danger' : 'bg-warning');
                var statusLabel = t.status === 'returned' ? 'Returned' : (new Date(t.date_due) < new Date() ? 'Overdue' : 'Borrowed');
                var renewals = t.renewal_count || 0;
                return '<tr><td>' + (i+1) + '</td><td>' + App.getStudentName(t.student_id) + '</td><td>' + App.getBookTitle(t.book_id) + '</td><td>' + App.formatDate(t.date_issued) + '</td><td>' + App.formatDate(t.date_due) + '</td><td>' + App.formatDate(t.date_returned) + '</td><td><span class="badge bg-secondary">' + renewals + '</span></td><td><span class="badge ' + statusClass + '">' + statusLabel + '</span></td></tr>';
            }).join('');
        }
    </script>
</body>
</html>
