<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCC Classification Browser - AklatBayon</title>
    <meta name="description" content="Browse Library of Congress Classification outline and find books by class.">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        .lcc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .lcc-tile { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; }
        .lcc-tile:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .lcc-tile.active { border: 2px solid var(--primary-red); }
        .lcc-tile .card-body { padding: 16px; }
        .lcc-letter { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 800; color: #fff; flex-shrink: 0; }
        .lcc-tile-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .lcc-class-name { font-size: 14px; font-weight: 700; color: var(--primary-navy); }
        body.dark-mode .lcc-class-name { color: #e0e4ec; }
        .lcc-subs { display: flex; flex-wrap: wrap; gap: 4px; }
        .lcc-subs .badge { font-size: 10px; padding: 2px 6px; background: rgba(15,52,96,0.07); color: var(--primary-blue); border: 1px solid rgba(15,52,96,0.12); }
        body.dark-mode .lcc-subs .badge { background: rgba(100,181,246,0.1); color: #64b5f6; border-color: rgba(100,181,246,0.2); }
        .lcc-icon { font-size: 16px; color: rgba(255,255,255,0.9); }

        /* Results panel */
        .lcc-results-panel { display: none; margin-top: 8px; margin-bottom: 24px; animation: fadeIn 0.3s ease; }
        .lcc-results-panel.show { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .lcc-results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .lcc-results-header h3 { font-size: 16px; font-weight: 700; color: var(--primary-navy); margin: 0; }
        body.dark-mode .lcc-results-header h3 { color: #e0e4ec; }
        .btn-close-results { background: none; border: none; font-size: 20px; color: var(--gray); cursor: pointer; padding: 4px 8px; }
        .btn-close-results:hover { color: var(--primary-red); }

        .loc-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .loc-card .card-body { display: flex; flex-direction: column; min-height: 200px; }
        .loc-card .loc-title { font-size: 15px; font-weight: 700; color: var(--primary-navy); margin-bottom: 8px; line-height: 1.4;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        body.dark-mode .loc-card .loc-title { color: #e0e4ec; }
        .loc-meta { font-size: 12px; color: var(--gray); margin-bottom: 4px; display: flex; align-items: flex-start; gap: 6px; }
        .loc-meta i { margin-top: 2px; width: 14px; text-align: center; flex-shrink: 0; }
        .loc-subjects { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .loc-subjects .badge { font-size: 10px; padding: 2px 8px; }
        .loc-call { display: inline-flex; align-items: center; gap: 4px; background: rgba(15,52,96,0.08); color: var(--primary-blue);
            padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; font-family: 'Consolas', monospace; }
        body.dark-mode .loc-call { background: rgba(100,181,246,0.15); color: #64b5f6; }
        .loc-card-footer { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--light-gray); display: flex; justify-content: space-between; align-items: center; }
        body.dark-mode .loc-card-footer { border-top-color: #2a2a40; }
        .btn-import { background: linear-gradient(135deg, #28a745, #20c997); color: #fff; border: none; padding: 6px 14px;
            border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: opacity 0.2s; }
        .btn-import:hover { opacity: 0.85; }
        .btn-import:disabled { opacity: 0.5; cursor: not-allowed; }
        .spinner-wrap { display: flex; justify-content: center; align-items: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--light-gray); border-top-color: var(--primary-red);
            border-radius: 50%; animation: spin 0.8s linear infinite; }
        body.dark-mode .spinner { border-color: #2a2a40; border-top-color: var(--primary-red); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pagination-bar { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 20px; }
        .pagination-bar button { padding: 8px 20px; }
        .pagination-info { font-size: 13px; color: var(--gray); font-weight: 600; }
        .loc-hero { background: linear-gradient(135deg, #1a5276, #2ecc71); border-radius: 12px;
            padding: 28px 32px; margin-bottom: 24px; color: #fff; display: flex; align-items: center; gap: 20px; }
        .loc-hero-icon { width: 56px; height: 56px; background: rgba(255,255,255,0.12); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .loc-hero h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .loc-hero p { font-size: 13px; opacity: 0.7; margin: 0; }
    </style>
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="loc-hero">
            <div class="loc-hero-icon"><i class="fas fa-sitemap"></i></div>
            <div>
                <h2>LCC Classification Browser</h2>
                <p>Browse the Library of Congress Classification system &mdash; click any class to explore books</p>
            </div>
        </div>

        <div class="lcc-grid" id="lcc-grid"></div>

        <div class="lcc-results-panel" id="results-panel">
            <div class="card">
                <div class="card-header lcc-results-header">
                    <h3 id="results-heading"><i class="fas fa-book me-2"></i>Books</h3>
                    <button class="btn-close-results" id="btn-close-results" title="Close">&times;</button>
                </div>
                <div class="card-body">
                    <div id="results-loading" style="display:none"><div class="spinner-wrap"><div class="spinner"></div></div></div>
                    <div class="loc-results" id="loc-results"></div>
                    <div id="results-empty" class="text-center text-muted py-4" style="display:none">No books found for this classification.</div>
                    <div class="pagination-bar" id="pagination-bar" style="display:none">
                        <button class="btn btn-outline-primary" id="btn-prev"><i class="fas fa-chevron-left me-1"></i> Previous</button>
                        <span class="pagination-info" id="page-info"></span>
                        <button class="btn btn-outline-primary" id="btn-next">Next <i class="fas fa-chevron-right ms-1"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init();

        var LOC_API = 'https://www.loc.gov/books/';
        var PER_PAGE = 25;
        var currentClass = null;
        var currentPage = 1;
        var paginationData = null;

        // Color palette for tile letters
        var colors = ['#e94560','#0f3460','#16213e','#1a5276','#2ecc71','#e67e22','#9b59b6','#3498db','#1abc9c','#e74c3c',
                      '#2c3e50','#27ae60','#8e44ad','#2980b9','#f39c12','#c0392b','#16a085','#d35400','#7f8c8d','#34495e','#1e8449'];

        function renderGrid() {
            var classes = Store.getAll('lcc_classes');
            var grid = document.getElementById('lcc-grid');
            grid.innerHTML = classes.map(function(cls, i) {
                var bg = colors[i % colors.length];
                var html = '<div class="card lcc-tile" data-id="' + cls.id + '" data-letter="' + cls.letter + '" data-name="' + cls.name + '">';
                html += '<div class="card-body">';
                html += '<div class="lcc-tile-header">';
                html += '<div class="lcc-letter" style="background:' + bg + '"><i class="fas ' + cls.icon + ' lcc-icon"></i></div>';
                html += '<div><div class="lcc-class-name">' + cls.letter + ' — ' + cls.name + '</div></div>';
                html += '</div>';
                html += '<div class="lcc-subs">';
                cls.subclasses.slice(0, 5).forEach(function(sc) {
                    html += '<span class="badge">' + sc + '</span>';
                });
                if (cls.subclasses.length > 5) html += '<span class="badge">+' + (cls.subclasses.length - 5) + '</span>';
                html += '</div></div></div>';
                return html;
            }).join('');

            grid.querySelectorAll('.lcc-tile').forEach(function(tile) {
                tile.addEventListener('click', function() {
                    grid.querySelectorAll('.lcc-tile').forEach(function(t) { t.classList.remove('active'); });
                    tile.classList.add('active');
                    var name = tile.dataset.name;
                    var letter = tile.dataset.letter;
                    currentClass = { letter: letter, name: name };
                    currentPage = 1;
                    searchClass(name, 1);
                });
            });
        }

        function searchClass(className, page) {
            currentPage = page;
            var panel = document.getElementById('results-panel');
            var loading = document.getElementById('results-loading');
            var results = document.getElementById('loc-results');
            var empty = document.getElementById('results-empty');
            var pagBar = document.getElementById('pagination-bar');

            panel.classList.add('show');
            loading.style.display = '';
            results.innerHTML = '';
            empty.style.display = 'none';
            pagBar.style.display = 'none';
            document.getElementById('results-heading').innerHTML = '<i class="fas fa-book me-2"></i>' + currentClass.letter + ' — ' + currentClass.name;

            panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

            axios.get(LOC_API, {
                params: { q: className, fo: 'json', c: PER_PAGE, sp: currentPage }
            }).then(function(response) {
                loading.style.display = 'none';
                var data = response.data;
                var items = data.results || [];
                paginationData = data.pagination || null;

                if (items.length === 0) {
                    empty.style.display = '';
                    return;
                }
                renderResults(items, results);
                renderPagination();
            }).catch(function(err) {
                loading.style.display = 'none';
                empty.style.display = '';
                empty.textContent = err.response && err.response.status === 429
                    ? 'Rate limited. Please wait a moment.'
                    : 'Error connecting to LOC API.';
                console.error('LOC API error:', err);
            });
        }

        function renderResults(items, container) {
            var html = '';
            items.forEach(function(r) {
                var title = (r.item && r.item.title) || r.title || 'Untitled';
                var authors = (r.item && r.item.contributors) || [];
                var authorStr = authors.length > 0 ? authors[0].replace(/\.$/, '') : (r.contributor && r.contributor.length > 0 ? r.contributor[0] : 'Unknown');
                var date = (r.item && r.item.date) || r.date || '';
                var callNums = (r.item && r.item.call_number) || [];
                var callNumber = callNums.length > 0 ? callNums[0] : '';
                var subjects = (r.item && r.item.subjects) || [];
                var published = (r.item && r.item.created_published) || [];
                var publisherStr = published.length > 0 ? published[0] : '';
                var locUrl = r.url || r.id || '';
                if (locUrl && !locUrl.startsWith('http')) locUrl = 'https://www.loc.gov' + (locUrl.startsWith('/') ? '' : '/') + locUrl;

                html += '<div class="card loc-card"><div class="card-body">';
                html += '<div class="loc-title" title="' + escAttr(title) + '">' + escHtml(title) + '</div>';
                html += '<div class="loc-meta"><i class="fas fa-user"></i> ' + escHtml(authorStr) + '</div>';
                if (date && date !== '||||') html += '<div class="loc-meta"><i class="fas fa-calendar"></i> ' + escHtml(date) + '</div>';
                if (callNumber) html += '<div class="loc-meta"><i class="fas fa-barcode"></i> <span class="loc-call">' + escHtml(callNumber) + '</span></div>';

                if (subjects.length > 0) {
                    html += '<div class="loc-subjects">';
                    subjects.slice(0, 3).forEach(function(s) {
                        html += '<span class="badge bg-info">' + escHtml(truncate(s.split('--')[0], 25)) + '</span>';
                    });
                    html += '</div>';
                }

                html += '<div class="loc-card-footer">';
                if (locUrl) html += '<a href="' + locUrl + '" target="_blank" class="text-muted small" style="text-decoration:none"><i class="fas fa-external-link-alt me-1"></i>LOC</a>';
                else html += '<span></span>';
                html += '<button class="btn-import" onclick="importBook(this)" '
                    + 'data-title="' + escAttr(title) + '" '
                    + 'data-author="' + escAttr(authorStr) + '" '
                    + 'data-year="' + escAttr(date) + '" '
                    + 'data-call="' + escAttr(callNumber) + '" '
                    + 'data-publisher="' + escAttr(publisherStr) + '" '
                    + 'data-subject="' + escAttr(subjects.length > 0 ? subjects[0].split('--')[0] : '') + '" '
                    + '><i class="fas fa-download"></i> Import</button>';
                html += '</div></div></div>';
            });
            container.innerHTML = html;
        }

        function renderPagination() {
            var bar = document.getElementById('pagination-bar');
            if (!paginationData || !paginationData.total || paginationData.total <= 1) { bar.style.display = 'none'; return; }
            bar.style.display = '';
            document.getElementById('page-info').textContent = 'Page ' + paginationData.current + ' of ' + paginationData.total;
            document.getElementById('btn-prev').disabled = !paginationData.previous;
            document.getElementById('btn-next').disabled = !paginationData.next;
        }

        function importBook(btn) {
            var title = btn.dataset.title;
            var author = btn.dataset.author;
            var year = parseInt(btn.dataset.year) || 0;
            var callNumber = btn.dataset.call;
            var publisherRaw = btn.dataset.publisher;
            var subjectRaw = btn.dataset.subject;

            var existing = Store.getAll('books');
            var dup = existing.find(function(b) { return b.title.toLowerCase() === title.toLowerCase(); });
            if (dup) {
                Swal.fire({ icon: 'warning', title: 'Book Already Exists', text: '"' + title + '" is already in your local catalog.', confirmButtonColor: '#e94560' });
                return;
            }

            var authorId = '';
            if (author && author !== 'Unknown') {
                var authors = Store.getAll('authors');
                var found = authors.find(function(a) { return a.name.toLowerCase() === author.toLowerCase(); });
                if (found) { authorId = found.id; }
                else { Store.create('authors', { name: author, bio: 'Imported from LOC' }); var all = Store.getAll('authors'); authorId = all[all.length - 1].id; }
            }
            var pubName = '';
            if (publisherRaw) { var parts = publisherRaw.split(':'); pubName = parts.length > 1 ? parts[1].replace(/,.*$/, '').trim() : publisherRaw.replace(/,.*$/, '').replace(/[\[\]]/g, '').trim(); }
            var pubId = '';
            if (pubName) {
                var pubs = Store.getAll('publishers');
                var foundPub = pubs.find(function(p) { return p.name.toLowerCase() === pubName.toLowerCase(); });
                if (foundPub) { pubId = foundPub.id; }
                else { Store.create('publishers', { name: pubName, address: '', contact: '' }); var allPubs = Store.getAll('publishers'); pubId = allPubs[allPubs.length - 1].id; }
            }
            var catId = '';
            if (subjectRaw) {
                var cats = Store.getAll('categories');
                var foundCat = cats.find(function(c) { return c.name.toLowerCase() === subjectRaw.toLowerCase(); });
                if (foundCat) { catId = foundCat.id; }
                else { Store.create('categories', { name: subjectRaw, description: 'Imported from LOC', parent_id: null }); var allCats = Store.getAll('categories'); catId = allCats[allCats.length - 1].id; }
            }

            Store.create('books', { title: title, isbn: 'LOC-' + Date.now(), author_id: authorId, publisher_id: pubId, category_id: catId, call_number: callNumber, year: year, copies: 1, available: 1, status: 'active' });
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-check"></i> Imported';
            Swal.fire({ icon: 'success', title: 'Book Imported!', text: '"' + truncate(title, 50) + '" added to your catalog.', timer: 2500, showConfirmButton: false, toast: true, position: 'top-end' });
        }

        function escHtml(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        function escAttr(str) { return str.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
        function truncate(str, max) { return str.length > max ? str.substring(0, max) + '…' : str; }

        document.getElementById('btn-close-results').addEventListener('click', function() {
            document.getElementById('results-panel').classList.remove('show');
            document.querySelectorAll('.lcc-tile').forEach(function(t) { t.classList.remove('active'); });
        });
        document.getElementById('btn-prev').addEventListener('click', function() { if (paginationData && paginationData.previous && currentClass) searchClass(currentClass.name, currentPage - 1); });
        document.getElementById('btn-next').addEventListener('click', function() { if (paginationData && paginationData.next && currentClass) searchClass(currentClass.name, currentPage + 1); });

        renderGrid();
    </script>
</body>
</html>
