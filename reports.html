<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - AklatBayon</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header class="top-header" id="top-header"></header>
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main-content">
        <div id="alert-container"></div>
        <div class="page-header"><h1><i class="fas fa-file-alt me-2"></i>Reports</h1></div>
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="stat-card"><div class="d-flex align-items-center"><div class="stat-icon" style="background:#0f3460"><i class="fas fa-book"></i></div><div class="ms-3"><div class="stat-number" id="r-books">0</div><div class="stat-label">Total Books</div></div></div></div>
            </div>
            <div class="col-md-3">
                <div class="stat-card"><div class="d-flex align-items-center"><div class="stat-icon" style="background:#28a745"><i class="fas fa-users"></i></div><div class="ms-3"><div class="stat-number" id="r-students">0</div><div class="stat-label">Total Students</div></div></div></div>
            </div>
            <div class="col-md-3">
                <div class="stat-card"><div class="d-flex align-items-center"><div class="stat-icon" style="background:#ffc107"><i class="fas fa-exchange-alt"></i></div><div class="ms-3"><div class="stat-number" id="r-txns">0</div><div class="stat-label">Total Transactions</div></div></div></div>
            </div>
            <div class="col-md-3">
                <div class="stat-card"><div class="d-flex align-items-center"><div class="stat-icon" style="background:#dc3545"><i class="fas fa-coins"></i></div><div class="ms-3"><div class="stat-number" id="r-fines">₱0</div><div class="stat-label">Pending Fines</div></div></div></div>
            </div>
        </div>
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card"><div class="card-header"><i class="fas fa-chart-bar me-2"></i>Books by Category</div><div class="card-body"><canvas id="chart-cat" height="250"></canvas></div></div>
            </div>
            <div class="col-md-6">
                <div class="card"><div class="card-header"><i class="fas fa-chart-pie me-2"></i>Transaction Status</div><div class="card-body"><canvas id="chart-txn" height="250"></canvas></div></div>
            </div>
        </div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (!Auth.requireAuth()) throw '';
        App.init();
        var books = Store.getAll('books'), students = Store.getAll('students'), txns = Store.getAll('transactions'), fines = Store.getAll('fines'), categories = Store.getAll('categories');
        document.getElementById('r-books').textContent = books.length;
        document.getElementById('r-students').textContent = students.length;
        document.getElementById('r-txns').textContent = txns.length;
        var pendingFines = fines.filter(function(f) { return f.status === 'pending'; }).reduce(function(sum, f) { return sum + f.amount; }, 0);
        document.getElementById('r-fines').textContent = '₱' + pendingFines;
        new Chart(document.getElementById('chart-cat'), {
            type: 'bar',
            data: {
                labels: categories.map(function(c) { return c.name; }),
                datasets: [{ label: 'Books', data: categories.map(function(c) { return books.filter(function(b) { return b.category_id === c.id; }).length; }), backgroundColor: ['#e94560','#0f3460','#28a745','#ffc107','#17a2b8'] }]
            },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
        });
        var borrowed = txns.filter(function(t) { return t.status === 'borrowed'; }).length;
        var returned = txns.filter(function(t) { return t.status === 'returned'; }).length;
        new Chart(document.getElementById('chart-txn'), {
            type: 'doughnut',
            data: { labels: ['Borrowed', 'Returned'], datasets: [{ data: [borrowed, returned], backgroundColor: ['#ffc107', '#28a745'] }] },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
    </script>
</body>
</html>
